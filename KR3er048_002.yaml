body:
  text: 卷二傷寒類傷寒辨傷寒者冬令感寒之正病也類傷寒者與傷寒相似而實不同也世人一見發熱輒曰傷寒率爾發表表之不去則以和解清涼諸法繼之其間有對證而即愈者有不對證而不愈者有幸愈而垂危復生者皆由施治之初辨證未明也夫有一病即有一證初時錯治則輕者轉重重者轉危即幸安全性命已如懸縷大可懼耳豫因著六氣相雜須辨論提醒斯世茲更反復叮嚀條列於下俾入門診視先取而明辨之初劑不瘥勝於救逆良多矣學者其致思焉一霜降以後天令嚴寒感之而即病者正傷寒也其症發熱惡寒頭項痛腰脊強身體痛但脈浮緊無汗為傷寒脈浮緩有汗為傷風寒用麻黃湯風用桂枝湯豫以加味香蘇散代之隨手而愈一冬時感寒不即發伏藏於肌膚至春因溫氣感觸而發者曰溫病春猶不發至夏因熱氣感觸而後發者曰熱病其症頭痛發熱與正傷寒同但不惡寒而口渴與正傷寒異爾柴葛解肌湯主之一四時之中有不頭痛發熱卒然惡寒厥冷口鼻氣冷嘔吐痛瀉面青脈遲者中寒也薑附湯主之一冬時當寒不寒乃更溫暖因而衣被單薄以致感寒而病者冬溫也冬溫之症表寒內熱香蘇散加清藥主之一夏秋之間天時暴寒人感之而即病者時行寒疫也亦有時非寒疫而其人乘風取冷遂至頭痛發熱者名曰感冒其見症與正傷寒略同但較輕爾香蘇散主之一夏月有病頭痛身熱自汗煩渴者傷暑也加減香薷飲主之暑證與熱病相似但熱病初起無汗暑病初起自汗熱病脈盛暑病脈虛此為異爾然有傷暑中暑閉暑之別治法詳本門一夏月有病頭痛發熱身重腹滿譫語自汗兩脛逆冷者濕溫也其人常傷於濕因而中暑暑濕相搏名曰濕溫切忌發汗汗之名重暍為難治蒼朮白虎湯主之按傷寒發厥脛冷臂亦冷濕溫發厥脛冷臂不冷以此為別一頭痛身熱與傷寒同而其人身重默默但欲眠鼻息鼾語言難出四肢不收者風溫也不可發汗加減葳蕤湯主之一發熱惡寒似傷寒而脈細身重不能自轉側或頭汗出者風濕也不嘔不渴桂枝加附子湯主之一病人嘔吐而利或頭痛腹痛惡寒發熱者霍亂也藿香正氣散主之一病人身熱面赤目脈赤項強獨頭搖卒然口噤背反僵者痙也無汗為剛痙有汗為柔痙加減續命湯主之痙病有外感內傷之異有三陽三陰之別詳見本門一發熱似傷寒但身不痛右手氣口脈緊中脘痞悶噯腐吞酸者此傷食也保和湯主之一病人煩熱似傷寒而脈來虛軟無力頭痛時止時作肢體倦怠語言懶怯者虛煩也補中益氣湯主之一病痰喘似傷寒但胸滿氣急脈弦滑者痰也二陳湯主之痰亦有挾風寒而發者宜加散劑一惡寒發熱與傷寒相似而病起自腳兩脛腫滿者腳氣也腳氣不離乎濕檳榔散主之然亦有兩足忽然枯細者俗名乾腳氣此為風燥之症四物加牛膝木瓜主之一病人脈浮數發熱惡寒而痛偏著一處飲食如常者蓄積有膿也外癰內癰皆見此候何謂內癰大抵口內咳胸中隱隱而痛吐唾腥臭者肺癰也腹皮膨急按之則痛便數如淋轉側作水聲者腸癰也胃脘隱隱而痛手不可近時吐膿者胃脘癰也書云嘔家有膿不須治嘔膿儘自愈不可誤也一發熱似傷寒而其人或從高墜下跌撲損傷或盛怒叫呼七情過度或過於作勞以致胸腹脅間有痛處著而不移手不可按者蓄血也澤蘭湯主之此與癰腫有別也以上諸證有與傷寒相類而治法不同者有與傷寒相似而實不同類者亦有傷寒與雜證相兼而互至者務在臨病之初辨明投劑庶一匕回春實實虛虛之禍可免矣傷寒六經見證法六經者太陽陽明少陽太陰少陰厥陰也三陽有經有腑三陰有傳有中有太陽之經即有太陽之腑膀胱是也有陽明之經即有陽明之腑胃是也有少陽之經即有少陽之腑膽是也然膽為清淨之腑無出入之路故治法如經也三陰有傳經者由三陽而傳入三陰此熱邪也有直中者初起不由陽經傳入而直中三陰此寒邪也茲數者乃傷寒見證之綱領也太陽經證太陽經病頭痛發熱項脊強身體痛鼻鳴乾嘔惡風自汗脈浮緩者名曰中風宜解肌桂枝湯主之若前證悉具惡寒無汗脈浮緊或喘嗽者名曰傷寒宜發表麻黃湯主之桂枝湯方桂枝去皮錢五分芍藥錢五分甘草炙錢生薑錢五分大棗去核四枚上五味㕮咀以水四大鐘微火煮取二鍾半去滓溫服服已須臾啜稀粥數升以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病瘥停後服若不汗更服依前法若病重者一日一夜周時觀之若病症猶在者乃服至二三劑禁生冷黏滑肉面五辛酒酪等物麻黃湯方此方不宜於東南多宜於西北西北稟厚風氣剛徑必須此藥開發乃可疏通實為冬令正傷寒之的劑若東南則不可輕用體虛脈弱者受之恐有汗多亡陽之慮麻黃去節四錢桂枝去皮二錢甘草炙一錢杏仁泡去皮尖十二枚上四味以水四大鐘先煮麻黃減一鍾去上沫納諸藥煮取二鍾去滓溫服復取微似汗不須啜粥余如桂枝湯法加味香蘇散有汗不得服麻黃無汗不得服桂枝今用此方以代前二方之用藥穩而效亦醫門之良法也不論冬月正傷寒及春夏秋三時感冒皆可取效其麻黃湯若在溫熱之時則不可妄用又體虛氣弱腠理空疏者亦不可用其桂枝湯乃治太陽經中風自汗之證若裡熱自汗者誤用之則危殆立至又暑風證有用白虎湯加桂枝者桂枝微石膏重不相妨也更有春溫夏熱之證自里達表其症不惡寒而口濕則不可用桂宜另用柴葛解肌之類或以本方加柴葛及清涼之味大凡一切用藥必須相天時審地利觀風氣看體質辨經絡問舊疾的確對證方為良劑紫蘇葉一錢五分陳皮香附各一錢二分甘草炙七分荊芥秦艽防風蔓荊子各一錢川芎五分生薑三片上銼一劑水煎溫服微覆似汗前症若頭腦痛甚者加羌活八分蔥白二根自汗惡風者加桂枝白芍各一錢若在春夏之交惟恐夾雜溫暑之邪不便用桂加白朮一錢五分若兼停食胸膈痞悶加山楂麥芽卜子各一錢五分若太陽本證未罷更兼口渴溺澀者此為膀胱腑證加茯苓木通各一錢五分喘嗽加桔梗前胡一錢五分杏仁七枚鼻衄或吐血本方去生薑加生地赤芍丹參丹皮各一錢五分咽喉腫痛加桔梗蒡子各一錢五分薄荷五分便祕加卜子枳殼若兼四肢厥冷口鼻氣冷是兼中寒也加乾薑肉桂之類雖有表證其散藥只用一二味不必盡方若挾暑氣加入知母黃芩之類乾嘔發熱而咳為表有水氣加半夏茯苓各一錢五分時行疫癘加蒼朮四分梅核氣症喉中如有物吞不入吐不出者加桔梗蘇梗各八分婦人經水適來加當歸丹參産後受風寒加黑薑當歸其散劑減去大半若稟質極虛不任發散者更用補中兼散之法柴葛解肌湯治春溫夏熱之病其症發熱頭痛與正傷寒同但不惡寒而口渴與正傷寒異耳本方主之柴胡一錢二分葛根一錢五分赤芍一錢甘草五分黃芩一錢五分知母一錢貝母一錢生地二錢丹皮一錢五分水煎服心煩加淡竹葉十片譫語加石膏三錢頭痛問曰頭痛何以是太陽證答曰三陽經上至於頭皆有頭痛惟太陽經脈最長其痛居多故頭痛為表證又問曰三陽頭痛有別乎答曰太陽之脈從巔入絡腦還出別下項循肩膊由夾脊抵腰中故太陽頭痛頭腦痛而連項脊也陽明之脈起於鼻絡於目交額中凡陽明頭痛頭額痛而連面目也少陽之脈起於目鋭眥下耳後凡少陽頭痛耳前後痛而上連頭角也以此為別又問曰三陰本無頭痛今見直中證亦有頭痛何也答曰此直中而兼外感也又問曰傷寒傳經至厥陰亦有頭痛何也答曰厥陰證頭痛脈浮是里邪達表欲得汗解也宜微表之又問曰陽明腑病口渴便閉亦有頭痛何也答曰陽明之經絡於頭目因其腑熱熏蒸上攻於頭目之間以致頭痛夫經病可以傳腑腑病亦可以連經此相因之至理然必有其實有腑證方可用白虎清之若在惡寒發熱初起之時則為外感風寒不得與陽明腑病同類混稱也項脊強問曰項脊強何以是太陽證答曰項脊者太陽經所過之地太陽病則項脊強也又問曰仲景云結胸症項脊強如柔痙狀何謂也答曰本太陽病為醫誤下而成結胸胸中脹痛俯仰不舒有似於項強非真項強也蓋太陽項強強在項後經脈拘攣而疼痛胸無病也結胸項強強在項前胸中俯仰不舒項無病也且結胸證誤下而後成太陽病初起而即見自不同耳身痛問曰身痛何以是太陽證答曰人身之中氣為衛血為榮風則傷衛寒則傷榮風寒客之則榮衛不通故身痛經云寒甚則痛熱甚則肉消咽破凡內經舉痛諸證皆以寒名未有以熱而曰痛者也故見身痛即宜用辛甘發散令氣血流通而痛愈耳又問曰身痛既為表證諸書言里證亦有身痛何也答曰里證身痛屬直中而不屬傳經也寒邪直侵臟腑陽氣衰微氣血凝滯致有身痛宜急溫之若傳經里證則屬熱熱主血行則無身痛總之外有頭痛發熱而身痛如繩束者太陽表證也無頭痛發熱而身痛如受杖者直中寒證也一發散一溫中若誤投之終難取效可不辨乎四肢拘急問曰四肢拘急何以是太陽證答曰寒主收引熱主舒伸天道之常秋冬則萬物斂藏春夏則萬物發舒此定理也內經曰寒則筋攣骨痛熱則筋弛肉緩故拘急為太陽感寒證又問曰里證亦有拘急何也答曰直中陰證臟受寒侵經脈因而斂束若傳經入里則為熱熱則體舒又焉得拘急乎總之發熱頭痛而拘急者太陽證也無發熱頭痛而拘急者直中證也仲景治法太陽表證及風濕相搏而見攣急者皆處以桂枝加附子湯甘草附子湯之類矧三陰直中者乎亦有汗吐下後四肢拘急者此津液內竭血不能榮潤筋骨或補或溫相機而行也又問曰拘急屬寒固無疑矣常見內熱極甚身如枯柴四肢僵硬不能屈伸者何也答曰此熱甚血枯肝臟將絶之候名曰搐搦非拘急也仲景云四肢漐習唇吻反青為肝絶此之謂也發熱問曰發熱何以是表證答曰風寒鬱於腠理則閉塞而為熱翕翕然作摸之烙手此熱即發於皮膚之外而臟腑無熱名曰表病里和試以內經諸論證之曰風寒客於人使人毫毛畢直皮膚閉而為熱可汗而已又曰因於寒體若燔炭汗出而散又曰人之傷於寒也則不免於病熱大汗熱自解也由是觀之熱之屬表明矣故一見發熱即屬表邪未解雖一月半月之久還當發散又問曰發熱固為表邪倘譫語發狂里證復急者治從表乎從里乎答曰經云解表不開切勿攻裡攻之為大逆若里證甚急須用清中兼表之法加芩連知母之類以清裡而用荊防葛根之類以發表大便閉結裡熱極甚者先用清散之法然後用大柴胡湯下之攻散並行不相妨也又問曰溫熱病亦發熱不用麻黃桂枝而用柴葛以解之何也對曰溫熱病者寒邪伏於肌膚之間醞釀成熱一旦自里達表其證但發熱不惡寒而口渴故用柴葛解肌湯辛涼以散之不用麻黃桂枝之辛溫以助熱邪也然既曰解肌即為表證設亦未嘗以發熱為里證也又問曰據子之言凡發熱皆在陽經而不在陰經仲景云少陰證反發熱者當用麻黃附子細辛湯何以故對曰少陰發熱者表裡皆寒是直中而兼外感非傳經少陰也故用麻黃細辛附子溫中發散令表裡兩解夫直中少陰本無發熱而曰反發熱者蓋兼太陽表證也總之傳經入里而發熱清藥中必兼發散直中入里而發熱溫藥中必兼發散可見發熱屬表證無可疑惑故曰三陰無頭痛無身熱惡寒或曰惡寒何以是表證答曰人身外為陽為表寒邪屬陰由表虛為寒所乘名曰陰盛陽虛也陽虛不能溫其膚衛致表空虛雖在密室亦引衣蓋覆謂之惡寒經云陰盛陽虛汗之則愈故惡寒屬表證又問曰諸書言里證亦惡寒何也答曰里證惡寒直中也非傳經也傳經入里則為熱邪必然惡熱豈有惡寒之理然太陽惡寒與直中惡寒何以別之病人頭痛發熱而惡寒者表證也無頭痛發熱而惡寒者直中里證也經云發熱惡寒發於陽無熱惡寒發於陰也又問曰陽明腑病口燥渴而背微惡寒者豈非傳經里證乎答曰惡寒者表未盡也因其燥渴之甚故用白虎加人參湯此活法也仲景云發熱無汗表未解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之此證微惡寒則表邪將解口燥渴則裡熱已熾故用此方設口不燥渴亦安得而用之乎又問曰誤下而成結胸脹痛甚急倘惡寒者何以治之答曰結胸為醫誤下而成今惡寒者是表邪未盡結於胸中必先解表方服陷胸湯丸若誤攻之表邪又結於胸則更危矣故結胸證有一毫惡寒必先散之而後攻之可見惡寒屬太陽表證也喘問曰喘何以是太陽證答曰肺主皮毛司氣之升降寒邪侵於皮毛肺氣不得升降故喘試以麻黃湯論之內有杏仁為定喘設也又云喘家作桂枝湯加厚朴杏子佳明言喘屬表邪也又問曰喘既為肺為表指掌賦云喘滿而不惡寒者當下而痊何也答曰傳經里證內熱閉結大便不通熱氣上衝致肺金清肅之令不得下行因而喘急此因胃熱攻肺故可下之俾其熱氣流通而喘定矣然或有惡寒等證則不可遽攻恐成逆候又問曰陰證喘促者何以治之答曰陰證喘者乃少陰中寒真陽衰微腎不納氣以致四肢厥冷脈沉細氣促而喘急宜理中四逆以溫之八味以佐之若汗出發潤喘不休者為難治也脈浮或問曰脈浮何以是太陽表證答曰按之不足舉之有餘故曰浮內經曰寸口脈浮主病在外浮而緊者為傷寒浮而緩者為傷風皆主表邪也設若邪氣入里則脈必沉又焉得浮故浮脈為太陽表證又問曰脈浮固屬表證倘里證見而脈尚浮者治當何如答曰里證脈浮恐表邪未盡也必先解表而後攻裡書云解表不開切勿攻裡仲景云結胸證脈浮者不可下可見脈浮為在表矣然有表證已罷便閉譫語腹痛口渴而脈尚浮者又當從權下之仲景云脈浮而大有熱屬臟者攻之不令發汗此之謂也此取證不取脈也脈伏問曰脈不出何以是表證答曰脈者血之府熱則血行豈有脈伏之理惟表受寒深故脈伏一手無脈曰單伏兩手無脈曰雙伏外顯太陽證而脈伏不出者寒氣閉塞也然此實將汗之機欲愈之候也書云天氣燠蒸必有大雨雨過而天氣清猶汗出而精神爽也又問曰里證脈伏者何也答曰里證脈伏惟直中有之亦寒氣閉塞也宜用四逆湯加豬膽汁蔥白以溫之若傳經里證則屬熱熱則血行何得脈伏又問曰亦有陽證脈伏者何也答曰陽證脈伏者乃鬱熱極深反見假寒之象脈澀滯之甚似伏而非伏也然必有唇焦口燥飲冷便閉諸症與陰寒脈伏者相隔霄壤又或有痛處痛極則脈伏痛止則脈出也至於尋常脈伏非表證即直中矣陽明經證陽明經病目痛鼻乾唇焦漱水不欲咽脈長此陽明本經證其經去太陽不遠亦有頭痛發熱宜用葛根湯解肌不可誤認為腑病而用清涼攻下之法葛根湯葛根二錢升麻秦艽荊芥赤芍各一錢蘇葉白芷各八分甘草五分生薑二片上水煎服若無汗而口渴者加知母自汗而口渴者加石膏人參凡陽明證口渴之甚即為入腑故加入清涼之藥若自汗而口不渴者乃陽明經中風去蘇葉加桂枝若春夏之交惟恐夾雜溫暑之邪不便用桂加白朮一錢五分目痛鼻乾問曰目痛鼻乾何以知邪在陽明經也答曰目鼻者足陽明胃所布之經絡也經云陽明之脈起於鼻交額中旁納太陽之脈連目眥下循鼻外入上齒中挾口環唇邪氣傳之則目痛鼻乾至於他經各行其道何目痛鼻乾之有唇焦漱水不欲咽問曰唇焦漱水不欲咽何以知邪在陽明經也答曰唇者陽明經所過之地也今唇焦思漱水以潤之是知邪在陽明經絡中然不欲咽者則知本腑無熱表病而里和也又問曰表證既除里證已見或亦有漱水而不咽者治法從表乎從里乎答曰既無表證里必有熱熱則能消水漱當咽下若不咽者是內有瘀血也何以知之外無表證小腹硬滿而痛小便自利大便黑色是也當用桃仁承氣湯攻之總之腹滿而痛小便不利是燥糞也大便自如小便不利此溺澀也今小便自利腹中硬痛其為瘀血明矣脈長問曰尺寸俱長何以知邪在陽明經也答曰長者泛溢也言脈過於本位也陽明為氣血俱多之經邪一傳之則血氣淖溢故尺寸俱長又問曰脈長者邪在陽明而用藥有葛根承氣白虎不等者何也答曰陽明用葛根者治陽明經病也陽明用承氣者治陽明腑病邪氣結實也不用葛根承氣而用白虎者治陽明經病初傳於腑邪未結實也陽明經病目痛鼻乾漱水不欲咽而無便閉譫語燥渴之症是為表病里和則用葛根湯散之假如邪已入腑發熱轉為潮熱致有譫語燥渴便閉腹脹等症是為邪氣結聚則用承氣湯下之假如陽明經病初傳於腑蒸熱自汗燥渴譫語而無便閉腹脹之症是為散漫之熱邪未結實則用白虎湯清中達表而和解之此治陽明三法也倘經腑不明臨證差忒誤人非淺因知仲景用攻者攻陽明之腑不攻陽明之經用表者表陽明之經非表陽明之腑辛涼和解者治腑病散漫之邪大便未結腹無所若也此陽明經腑之説所宜急講也少陽經證少陽經病目眩口苦耳聾胸滿脅痛寒熱往來嘔吐頭汗盜汗舌滑脈弦此少陽經受病宜用小柴胡湯和解之仲景云少陽證但見一二症即是不必悉具此經有三禁吐汗下是也然少陽有兼表兼里者務在隨時變通不得以三禁之説而拘泥也小柴胡湯柴胡二錢赤芍一錢五分甘草半夏各一錢黃芩一錢五分人參五分生薑二片大棗去核三個水四鍾煎二鍾半溫服若胸中煩而不嘔是熱氣結聚去半夏人參加栝蔞實以瀉熱若渴者是津液少去半夏加栝蔞根倍人參以生津液若腹中痛是邪氣壅去黃芩加白芍藥以通壅若脅下痞硬去大棗加牡蠣以耎堅若心下悸小便不利是水氣去黃芩加茯苓以滲泄若不渴外有微熱是表邪未解去人參加桂枝以解肌若咳者為肺寒氣逆去人參大棗黃芩加前胡橘皮乾薑以散寒降氣耳聾問曰耳聾何以是少陽證答曰足少陽膽經上絡於耳邪在少陽則耳聾也又問曰厥陰亦耳聾何也答曰肝膽相為表裡肝病連膽故亦耳聾也但少陽耳聾必往來寒熱厥陰耳聾則舌蜷囊縮自有別耳胸滿問曰胸滿何以是半表半裡證答曰胸半以上乃清陽之分正在半表半裡邪至此將入里而未深入於裡也故胸滿而腹未滿者乃邪氣而非有物也若腹中脹滿則為有物矣又問曰痞氣亦胸前脹滿何以別之答曰邪入三陰經而未結聚成實醫遽下之致成痞氣必須問其曾經下否若經下而後胸滿者痞氣也若未經下而胸前脹滿即屬少陽也陶氏治法少陽證兼胸滿者小柴胡加枳桔如未效本方對小陷胸湯一服如神為妙是知用藥亦自有相通者脅痛問曰脅痛何以是半表半裡證答曰足少陽膽經布之脅下故有脅痛至於他經或出於巔背或布於面目則無此症又問曰水氣亦有脅痛何也答曰水氣脅痛必見乾嘔咳引脅下痛小半夏加茯苓湯主之極重者十棗湯攻之若半表半裡脅痛外必兼見少陽證目眩口苦問曰目眩口苦何以是半表半裡證答曰目者肝之竅也膽附於肝今少陽膽病故目眩口苦者膽之汁也熱泄膽汁故口苦凡目眩口苦者即是少陽半表半裡證當和解之嘔吐問曰嘔吐何以是半表半裡證答曰邪氣將入里裡氣上衝邪正分爭故嘔吐仲景云傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也由此觀之是知嘔吐者邪氣入陰之機然猶在將入未入之間故和解可愈也然亦有胃熱而嘔者有胃寒而嘔者有停飲而嘔者有食積而嘔者病人口燥渴嘔吐黃水者胃熱也嘔吐清涎沫口鼻氣冷手足厥冷者胃寒也渴飲水而復嘔咳引脅下痛者停飲也嘔吐飲食胸膈脹痛吞酸噯腐者食積也以此為別往來寒熱問曰寒熱往來何以是半表半裡證答曰人身外陽內陰足少陽膽經正陰陽交界之所邪傳至此陰陽相爭故寒熱往來又問曰陽明亦有寒熱往來何也答曰陽明經病邪在肌肉中則身發熱焉得有往來寒熱由少陽傳入陽明之腑表證未除裡熱已結故兼見往來寒熱當用大柴胡湯攻之書曰陽明內實則為寒熱往來此説非也蓋由少陽邪氣未除故見寒熱並非陽明正病也頭汗問曰頭汗何以是半表半裡證答曰諸陽經上至於頭則有頭汗若諸陰經皆至頸而還則頭無汗故見頭汗出即半表半裡證又問曰諸陽脈上至於頭今頭汗出當是表證何以為半表半裡也答曰若是表證尚有寒邪閉塞焉得有汗今既有汗是寒邪將化為熱也但名曰里證則頭與身皆出汗但名曰表證則頭無汗故曰半表半裡也又問曰瘀血發黃水氣皆有頭汗出何也答曰瘀血頭汗出小便自利小腹滿痛大便黑色發黃頭汗出小便不利目珠黃水氣頭汗出胸脅痞滿咳引脅下痛若少陽證頭汗出必見往來寒熱諸證以此為別盜汗問曰盜汗何以是半表半裡證答曰熱邪熏灼腠理開令人自汗寒則腠理閉塞而無汗今汗睡而出覺而收是邪將盛於陰而未深入於陰故曰半表半裡也又問曰雜症盜汗何也答曰雜症盜汗乃陰虛之證傷寒盜汗乃外感之邪自不同類舌苔滑問曰舌苔滑何以是半表半裡證答曰舌司腸胃寒熱之變在表則津液如常在裡則胎燥黃黑今舌苔滑尚有津液但不如常是邪將入腑而未深入於腑也既不在表亦不在裡故曰半表半裡證脈弦問曰脈弦何以是半表半裡證答曰弦者肝之本脈也肝膽相為表裡且膽為乙木木主風於時為春故脈弦也太陽脈浮陽明脈長少陽脈弦此三陽診候之法也太陰經證太陰經病自古混同立言故方藥多錯亂今細按之有三法焉夫太陰有傳經之邪有直中之邪有誤下內陷之邪不可不辨也如經所謂腹滿嗌乾者此傳經之陽邪也法當用小柴胡去人參加芍藥以和之不已則下之經又謂腹滿而吐食不下自利益甚時腹自痛者此直中之寒邪也法當理中湯以溫之又謂太陽證醫反下之因爾腹滿時痛者此誤下內陷之邪也法當用桂枝加芍藥大實痛者桂枝加大黃湯以是知傳經之邪宜用大小柴胡輩直中之邪宜理中誤下內陷之邪宜用桂枝湯加減法今先舉傳入太陰者言之其見症也腹滿痛嗌乾脈沉實大柴胡湯主之若自利去大黃加黃連以清之大柴胡湯柴胡一錢五分半夏洗七分黃芩芍藥各二錢枳實一錢大黃二錢水煎服若兼寒熱往來加生薑五分大棗三個腹滿痛問曰腹滿痛何以是太陰證答曰脾為坤土坤為腹陰中之至陰也邪氣傳之則腹滿而痛又問曰腹痛既為里證當投大黃而先用柴胡芍藥者何也答曰此少陽傳入太陰者也少陽之邪傳入太陰肝木乘脾致成腹痛故用柴胡加芍藥以和之痛甚者加大黃以下之又如太陽證為醫誤下以致邪氣內陷而成腹痛用桂枝湯加芍藥大實痛者桂枝湯加大黃意正相等然腹痛雖屬太陰又有傳經直中之分大抵傳經之邪由三陽傳入直中之邪猝然驟至也傳經之邪則脈沉實直中之邪則脈沉細也傳經之邪則嗌乾口燥直中之邪則口鼻氣冷也以此為別下利問曰自下利何以是太陰證答曰下利出於腸胃熱傳脾臟熏灼腸胃故有下利又問曰三陽合病以及少陽陽明合病俱有下利何也答曰三陽合病有下利者外合三陽之經內合陽明之腑也少陽陽明合病自下利者亦合陽明之腑也陽明內主胃腑故有下利若不入腑必無下利今少陽之邪傳入太陰太陰為臟與腑相連故有下利也但宜分傳經直中傳經則下利腸垢直中則下利清穀寒熱之藥由此而分不可不謹脈沉實問曰脈沉實何以是太陰熱證答曰沉者病脈也主病在裡實者有力也主病為熱今脈沉實故知太陰經有實熱也少陰經證少陰經病有傳有中今先舉傳經者言之其見症也口燥咽乾而渴或咽痛或下利清水色純青心下硬或下利腸垢目不明大小承氣湯並主之小承氣湯治邪傳少陰口燥咽乾而渴或目不明宜急下之大黃酒洗三錢厚朴一錢枳實一錢五分水煎服加芒硝三錢即大承氣湯甘桔湯治少陰咽痛甘草炙三錢桔梗三錢水煎服按本方加大力子炒研三錢薄荷葉五分更效若不瘥對前小承氣湯服口燥咽乾而渴問曰口燥咽乾而渴何以屬傳經少陰也答曰少陰之脈循喉嚨挾舌本熱邪傳入少陰消爍腎水則真水不得上注於華池故乾燥異常而渴之甚也須急下之以救腎家將涸之水又問曰腎氣虛寒而亦口渴者何也答曰腎者水臟也虛故引水自救小便必色白白者因下焦虛有寒不能制水故令色白也若傳經熱邪則小便短澀而赤且傳經證口燥咽乾舌燥唇焦而渴之甚腎氣虛寒則無此等熱症惟見頻飲熱湯以自灌而已又或思飲冷而不能下咽此內真寒而外假熱之候與口燥咽乾而渴相隔霄壤咽痛問曰咽痛何以屬傳經少陰證答曰咽者少陰經脈所過之地也熱邪攻之則咽痛又問曰寒證亦有咽痛何也答曰寒邪直中下焦逼其無根失守之火發揚於上亦令咽痛然必有下利清穀四肢厥冷等症不若傳經熱邪口燥咽乾而渴之甚也下利清水問曰下利清水何以是傳經少陰證答曰邪傳少陰熱氣熏灼結糞如磊石在內所進湯水不能滲入遂從結糞空中走出按其腹必硬痛宜急下之若直中證下利清穀俗名漏底傷寒設誤認此證為漏底而用熱藥是抱薪救火矣仲景云少陰證下利清水色純青心下硬痛急下之宜大承氣湯正謂此也目不明問曰目不明何以是傳經少陰證答曰目能照物全在瞳人瞳人屬水邪氣熏灼則腎水枯涸不能照物故知目不明屬少陰熱邪宜急下之以救腎家將絶之水又問曰虛證亦有目不明何也答曰虛證目不明者氣弱也血枯也丹溪用人參膏補氣也六味地黃湯補血也此皆內傷之治法若傷寒目不明實為熱邪消爍腎水急宜清涼攻下以救援也如大便自利腹無所苦則用三黃解毒湯清之大便不利腹中硬痛則用承氣下之不可緩也厥陰經證厥陰經病亦有傳有中今先舉傳經者言之其見症也少腹滿舌蜷囊縮煩燥厥逆消渴大承氣湯主之大承氣湯見少陰少腹滿問曰少腹滿何以是傳經厥陰證答曰胸膈以上乃清陽之分為少陽之分野胸膈以下少腹以上乃清濁交界之所為太陰之分野當臍者少陰之分野少腹者厥陰之分野傷寒傳至厥陰少腹脹滿乃濁陰凝聚實為有物矣宜急下之又問曰瘀血與溺澀亦少腹滿何也答曰瘀血者太陽膀胱經蓄血也溺澀者太陽膀胱經蓄水也膀胱繫於臍下故少腹滿也但蓄血證少腹滿小便自利大便黑色溺澀證小腹滿小便不利大便如常若邪傳厥陰則大便閉結小便短赤是為燥糞證也且厥陰必有煩滿囊縮厥逆消渴諸症與太陽膀胱經證迥然不同也舌蜷囊縮問曰舌蜷囊縮何以是傳經厥陰證答曰肝主周身之筋熱邪內灼則津液枯不能榮養於筋故舌蜷而囊縮宜急下之又問曰直中證亦舌蜷囊縮何也答曰直中於寒陽氣衰微而斂縮此冬令萬物閉藏之象今內熱消爍此夏令津液乾枯之象然直中證脈必沉遲或見下利清穀口鼻氣冷諸寒證邪傳厥陰必煩滿消渴之極或唇焦口燥身如枯柴形情大不相同且直中證舌雖短縮而潤澤邪傳厥陰則舌斂束如荔枝必然焦燥毫無津液又問曰婦人之診如何答曰婦人乳縮男人囊縮先驗其舌已自明白不待細問矣是以傷寒驗舌之法不可不講厥逆問曰厥逆何以屬傳經厥陰證答曰傷寒之邪自表入里邪在三陽則手足熱傳至太陰則手足溫至少陰則漸冷至厥陰則逆冷矣所謂熱深厥亦深是也蓋自熱至溫自溫至厥自厥而至逆冷乃傳經之邪由淺入深是知厥逆屬傳經厥陰證又問曰寒證厥逆者何也答曰直中寒邪初時即厥不比傳經之厥以漸而至也又問曰仲景云發熱四日厥反三日復熱四日厥少熱多其病當愈厥四日熱反三日復厥四日厥多熱少其病當進何謂也答曰此指熱厥而言也傷寒發熱者其熱尚淺傷寒發厥者其熱更深所謂熱深厥亦深熱微厥亦微者此也厥少熱多則熱漸退厥多熱少則熱更進也至於直中寒邪初起即厥不比傳經熱邪初時發熱而後至於厥厥與熱復相間互發而進退無常也消渴問曰消渴何以屬厥陰熱證答曰消渴者熱甚能消水也邪傳太陰則嗌乾未甚渴也至少陰則口燥舌乾而渴至厥陰則消渴矣消渴者飲水多而小便少不知消歸何有也可見厥陰熱甚則大渴而能消水也又問曰三陽經亦口渴何也答曰太陽證本無渴其小便不利而渴者太陽腑病也外顯太陽證而又兼口渴故用五苓散以分利之俾小便通而渴自止矣陽明經病亦無渴不過唇焦漱水爾其有渴者則陽明腑病也邪未結聚熱勢散漫而口渴者白虎湯邪已結實腹脹便閉而口渴者承氣湯此陽明腑病之治法也至於少陽乃表裡交界之所在表為寒在裡為熱兼有口渴者駸駸乎欲入里矣故於小柴胡中去半夏加栝蔞根以清其熱倍人參以生津液此少陽經之治法也至於太陰雖嗌乾而渴猶未甚也少陰則燥渴渴漸甚矣厥陰則消渴渴之至而無復加者也又問曰陽明腑病口大渴與厥陰消渴何以別之答曰陽明居中土也萬物所歸也三陽三陰之邪皆得傳之今厥陰經消渴者陽明胃中消之也夫飲與食皆入胃者也胃熱則消胃寒則不能消也厥陰邪熱極盛攻入胃腑則消渴之證生非厥陰肝經另有一口而能飲能消也因其有囊縮煩滿厥逆諸證故名曰厥陰因其由厥陰證而發消渴故以消渴屬厥陰也又問曰熱甚亦有不渴者何也答曰此熱極神昏不知渴也其始極渴其後則不知渴口燥唇焦身如稿木勢亦危矣又問曰直中寒證亦有渴者何也答曰此陰盛隔陽於上渴欲飲水而不能飲名曰假渴其人煩躁欲坐臥泥水之中此內真寒而外假熱也又或因汗下重亡津液胃中乾燥致令思水所飲常少而喜溫又少陰證腎經虛寒頻飲熱湯以自救乃同氣相求之理但小便色白而外見清穀厥逆諸寒證以上諸證與厥陰囊縮而消渴者相隔千里是不可以不辨太陽腑病太陽腑者足太陽膀胱是也膀胱有經有腑邪在於經則頭痛發熱邪在於腑則口渴溺赤外顯太陽經病而兼口渴溺赤者此溺澀不通乃太陽腑病與他臟無涉也五苓散主之若表證未罷可與散劑同用五苓散茯苓三錢豬苓澤瀉各八分桂枝一錢白朮一錢五分水煎服以利為度愚按前症自汗脈浮者由中風入本腑可用此方無汗脈緊者由傷寒入本腑即於香蘇散中加茯苓澤瀉應手而效口渴溺赤問曰膀胱有水何以反渴也答曰水有清濁濁水不去則津液不生故渴也且水停有濕邪入則熱濕熱相聚則渴今分利之俾濕熱流通而渴自止矣若病在經而未入腑者切不可用滲利藥反引邪氣入本腑也陽明腑病足陽明胃有經有腑經者徑也猶路徑然腑者器也所以盛水穀者也邪在於經不過目痛鼻乾唇焦漱水而已邪既入腑則潮熱譫語狂亂不得眠煩渴自汗便閉諸症生焉白虎湯承氣湯並主之但陽明腑病有由本經入本腑者有由太陽少陽入本腑者有由三陰經入本腑者來路不同見證則一治者詳之白虎湯方治陽明腑病脈洪大蒸熱潮熱譫語燥渴自汗或胃熱發斑但腹中未堅硬大便未閉結此陽明散漫之熱邪未結聚故用本方辛涼和解之劑石膏五錢知母三錢甘草二錢粳米一撮水煎服若熱甚者倍之大法自汗多者加人參名人參白虎湯挾濕者加蒼朮名蒼朮白虎湯治濕溫證按此方必燥渴潮熱自汗脈洪有此八字方可與之若表證仍在而不燥渴者切不可用也又太陽證發熱而渴小便不利者為膀胱腑病不可與白虎湯若直中陰寒面赤煩熱似渴非渴欲坐臥泥水中此真寒假熱之證必須溫補又有血虛發熱證象白虎宜用當歸補血湯若誤投石膏知母則傾危可立而待矣調胃承氣湯治陽明腑病潮熱譫語便閉繞臍硬痛為有燥屎此結聚之熱邪已堅實宜下之大黃三錢芒硝二錢甘草五分水煎服本方去甘草加枳實厚朴名大承氣湯竊按枳實消痞厚朴去滿芒硝潤燥大黃瀉實必痞滿燥實四症兼全者方可用也若痞滿而未燥實者宜用小承氣湯不用芒硝恐傷下焦陰血也燥實而未痞滿者即用本方不用枳朴恐傷上焦陽氣也論承氣湯有八禁一者表不解惡寒未除小便清長知不在裡仍在表也法當汗解二者心下硬滿心下滿則邪氣尚淺若誤攻之利遂不止恐正氣下脫也三者合面赤色面赤色為邪在表浮火聚於上而未結於下故未可攻也又面赤為戴陽尤宜細辨四者平素食少或病中反能食平素食少則胃氣虛故不可攻然病中有燥屎即不能食若反能食則無燥屎不過便硬耳亦未可攻也五者嘔多嘔吐屬少陽邪在上焦故未可攻也六者脈遲遲為寒攻之則厄七者津液內竭病人自汗出小便自利此為津液內竭不可攻之宜蜜煎導而通之八者小便少病人平日小便日三四行今日再行知其不久即入大腸宜姑待之不可妄攻也潮熱問曰潮熱何以屬陽明腑證答曰潮熱者如潮之汛不失其時今日午後發熱明日亦午後發熱故名潮熱若一日發至晚者便是發熱而非潮熱矣若寒熱相間便是往來寒熱矣仲景云其熱不潮不可與承氣湯可見潮熱合用承氣湯也又問曰潮熱固當下設有表證何以治之答曰潮熱兼表必先解表然後攻裡若里證甚急則用大柴胡法表裡並治可也譫語問曰譫語何以屬陽明腑證答曰心者胃之母肺者胃之子心主藏神精明者也肺主出聲清肅者也今胃中熱盛上乘心肺故神氣昏憒而語言錯亂輕則呢喃謬妄重則喊叫罵詈不避親疏由其熱有輕重故譫語亦有輕重也又問曰經云譫語有虛有實者何也答曰實則譫語虛則鄭聲譫語者亂言無次數數更端鄭聲者鄭重其辭重迭頻言不換他説也蓋氣有餘則能機變而亂語氣不足則無機變而只守一音也又問曰婦人傷寒晝則明瞭夜則譫語者何也答曰此熱入血室證也婦人經水適來血海空虛邪氣乘之致有此證治法無犯胃氣及上二焦必自愈宜用小柴胡湯去半夏加紅花桃仁生地丹皮之屬狂亂問曰狂亂何以屬陽明腑病答曰重陰為顛重陽為狂諸經之狂皆陽盛也傷寒陽熱極盛至於發狂勢亦危矣狂之發也少臥不飢妄語妄行或登高而歌棄衣而走甚至逾垣上屋皆陽熱亢極使之非下不除又太陽病不解熱結膀胱其人如狂此乃下焦蓄血少腹當硬滿小便自利大便黑色雖則如狂初不若發狂之甚也又有以火劫汗遂至亡陽發為驚狂有慌亂恐懼之象實非狂也是知如狂者膀胱蓄血驚狂者劫汗亡陽發狂者陽明胃腑實熱也又問曰寒證有發狂者何也答曰此陰盛隔陽之證其人煩躁欲坐臥泥水中是名陰燥脈必沉遲或見下利清穀諸寒證急宜溫補不可誤用寒涼也不得眠問曰不得眠何以是陽明腑證答曰不得眠陰陽皆有之其狂亂不得眠者陽明胃熱故也經云胃不和則臥不安胃受熱邪故不和不和故不眠也若初時目痛鼻乾不得眠者陽明經病也葛根湯主之若蒸熱自汗燥渴脈洪不得眠者陽明經腑同病散漫之熱也白虎加人參湯主之若潮熱自汗便閉譫語不得眠者陽明腑病結聚之熱也調胃承氣湯下之若傷寒邪氣已解或因食復遂至煩悶乾嘔口燥呻吟不得眠者以保和湯加芩連主之又問曰不眠固屬熱證有投寒藥轉甚者何也答曰因汗下重亡津液心蘊虛煩致不得眠宜用酸棗仁湯或真武湯主之不眠似屬尋常若少陰脈沉細自利厥逆煩躁不得眠者為難治也燥渴問曰燥渴何以屬陽明腑證答曰寒邪在表則不渴邪氣傳裡化而為熱則渴太陽證有口渴者膀胱腑病也其渴微陽明經病但漱水爾不為渴也入腑則大渴矣少陽證但口苦亦無渴其有渴者將轉入陽明也仲景云服柴胡湯已而渴者屬陽明也三陰皆有渴因其連於胃腑故渴也是知燥渴的屬陽明證余詳辨厥陰證消渴條下自汗問曰自汗何以是陽明腑病答曰傷寒在表則腠理致密而無汗入腑則熱氣發越而汗自出矣今無汗忽變為有汗者乃熱邪入腑熏蒸如鼎沸然故令汗出也又問曰自汗有用桂枝乃桂枝加附子湯者何也答曰自汗用桂枝者太陽傷風症也用桂枝加附子湯者因發汗太多遂漏不止惡風寒而為表虛也若陽明腑病燥渴譫語孰敢用桂枝者仲景於桂枝加附子條下注曰不嘔不渴可見陽明燥渴則無用桂枝之理矣大抵頭痛發熱悉具者傷風自汗也因發汗遂漏不止者陽虛自汗也煩躁口渴能消水不惡風寒而反惡熱者陽明腑病自汗也又問曰直中證亦自汗何也答曰直中證冷汗自出脈沉遲手足厥冷乃真陽衰微之象與陽明胃熱自汗熏蒸騰沸之狀天淵相隔矣又問曰中暑自汗亦口渴何以別之答曰中暑自汗口雖渴脈必弦細芤遲也經云脈盛身熱得之傷寒脈虛身熱得之傷暑實者人參白虎湯虛者十味香薷飲主之手足心腋下有汗問曰手足心腋下有汗何以是陽明腑病答曰胃主四肢為津液之主今熱聚於胃致令出汗乃津液之旁流也經云手足濈然汗出大便難而譫語宜下之又問曰陽明中寒不能食亦令手足汗出者何也答曰此胃中虛冷所致與傳經熱證便難譫語者自是不同便閉問曰便閉何以屬陽明腑證答曰陽明居中土也萬物所歸無所復傳傷寒三陽三陰之邪皆得傳入以作胃實不大便之證法當下之然經有八禁詳例於前不可不辨轉矢氣問曰轉矢氣何以屬陽明腑證答曰矢氣者氣下泄也病人內有燥糞結而不通則氣常下失仲景云欲行大承氣先與小承氣腹中轉矢氣者方與大承氣湯若不轉矢氣慎未可再攻是知轉矢氣屬陽明腑也論里中之裡傷寒之邪三陽為表三陰為里人皆知之而里中之裡人所不知也何謂里中之裡陽明胃腑是也三陽三陰之邪一入胃腑則無復傳故曰里中之裡也或謂三陰經臟也陽明胃腑也豈有腑深於臟者乎答曰陽明居乎中土萬物所歸無所復傳猶之溪谷為衆水之所趨也夫以陽經與陰經較則三陰為深以陰經與胃腑較則胃腑為尤深也三陽三陰之經環繞乎胃腑處處可入有自太陽入腑者有自本經入腑者有自少陽入腑者有自太陰入腑者有自少陰入腑者有自厥陰入腑者一入胃腑則無復傳故曰里中之裡也治傷寒者先明傳經直中即於傳經之中辨明表裡更於表裡之中辨明裡中之裡如此則觸目洞然治療無不切中矣復論陽明本證用藥法陽明有經有腑陽明經病發熱頭痛目痛鼻乾唇焦漱水宜解肌葛根湯陽明經病傳腑蒸熱自汗口渴飲冷白虎加人參湯此散漫之熱可清而不可下陽明腑病熱邪悉入於裡其證潮熱譫語腹滿便閉宜攻之調胃承氣湯此結聚之熱徒清無益也夫病當用承氣而只用白虎則結聚之熱不除當用白虎而遽用承氣則散漫之邪復聚而為結熱之證夫石膏大黃同一清劑而舉用不當尚關成敗何況寒熱相反者乎甚矣司命之難也論陽明兼證用藥法或問經曰有太陽陽明有少陽陽明有正陽陽明何也答曰太陽陽明由太陽經傳入陽明之腑也少陽陽明由少陽經傳入陽明之腑也正陽陽明由陽明本經而傳入本腑也大法太陽陽明太陽證不解必從太陽解表為主若表證不解醫誤下之轉屬陽明宜下之小承氣湯若因誤下而成結胸先服小陷胸湯若不瘥再服大陷胸湯餘邪未盡投以枳實理中丸應手而愈少陽陽明脈純弦者名曰負負者勝負也為難治若少陽證多者必從少陽和解為先小柴胡湯若腹滿硬痛便閉譫語者下之大柴胡湯正陽陽明在表者葛根湯表邪入里未結聚者白虎湯邪已入腑結聚成實者下之調胃承氣湯凡用下藥必以腹滿硬痛便閉為主或兼下利腸垢或下利清黃水色純青心下硬其中有燥屎也攻之否則雖不大便亦未可攻但清之潤之而已合病並病合併病者傷寒傳經之別名也或兩經同病或三經同病名曰合病若一經病未已復連及一經名曰並病傷寒書云三陽有合病有並病三陰無合病無並病果爾則太陰必不與少陰同病乎少陰必不與厥陰同病乎且太陰病未瘥必不至並於少陰少陰病未瘥必不至並於厥陰乎若然則三陰之證何以相兼而並見乎又何以三陽三陰之邪互相交錯而為病乎是知合病並病有合於陽者即有合於陰者有並於陽者即有並於陰者仲景謂三陽合病閉目則汗面垢譫語遺尿治用白虎湯此外合三陽之經內合陽明之腑故用辛涼和解之若不入腑白虎將焉用乎治法不論三陽三陰凡兩經合病則用兩經藥同治之三經合病則用三經藥同治之若一經病未瘥復並一經則相其先後緩急輕重而藥之斯無弊耳然則合並病者豈非傷寒傳經之別名歟直中三陰諸證直中者初起不由陽經傳入而徑中三陰者也中太陰宜用理中湯中少陰宜用四逆湯中厥陰宜用白通加豬膽汁湯大抵臟受寒侵不溫則殆急投辛熱不可遲緩附子理中湯治寒邪中於太陰嘔吐清涎沫腹中冷痛或下利清穀吐蛔蟲脈來沉細急宜溫之乾薑附子炙甘草各一錢人參二錢白朮二錢水煎服寒甚者加乾薑二錢渴欲得水加人參白朮各一錢當臍有動氣去白朮加肉桂一錢吐多者加生薑一錢五分下利多者倍加白朮悸者加茯苓一錢五分腹滿者去參術加陳皮半夏砂仁各八分附子一錢五分蓋溫即是補四逆湯治少陰中寒手足厥冷下利清穀脈沉細但欲寐附子五錢乾薑五錢甘草炙二錢水煎服如面赤加蔥白二莖腹痛加白芍藥二錢酒炒嘔者加生薑二錢咽痛加桔梗一錢利止脈不出加人參二錢小便不利身重疼痛或咳此為有水氣去乾薑加白朮茯苓二錢五分生薑三片白通加豬膽汁湯治少陰中寒陰盛隔陽熱藥相拒不入故加寒味以立從治之法附子五錢乾薑五錢蔥白二莖人尿半杯豬膽汁五茶匙水煎服虛者加人參三錢理中安蛔散人參三錢白朮白茯苓乾薑各一錢五分川椒十粒烏梅二個上作一服水二鍾煎七分服凡治蛔不可用甘草及甜物蓋蛔得甘則動得苦則安得酸則靜故也如未止加黃連黃柏各三分川椒倍之若足冷加附子五七分甚者倍之腹中冷痛問曰腹中冷痛何以屬直中寒證答曰寒氣內攻腹中驟然暴痛手足口鼻俱冷或腹中寒冷欲得熱物尉之不比傳經腹痛由漸而至也且寒痛綿綿不止熱痛時作時止也嘔吐清涎沫問曰嘔吐清涎沫何以是直中寒證答曰胃腑寒熱之氣必見於涎沫經曰諸水渾濁皆屬於熱諸病水液澄徹清冷皆屬於寒今見嘔吐清涎沫故知為直中寒證下利清穀問曰下利清穀何以是直中寒證答曰寒邪內侵真陽衰少無以運行三焦腐化水穀經曰食下即化腐臭而出是有火也食下不化完穀而出是有寒也又曰天寒則水清天熱則水濁今見下利清穀即是直中寒證若傳經熱證則下利腸垢而不下利清穀矣又問書云邪熱不殺穀何謂也答曰邪熱不殺穀者乃火性急速不及變化而出然必雜於腸垢之中不比直中寒邪谷和清水形如鴨溏也但欲寐問曰但欲寐何以是直中寒證答曰寒邪屬陰陰主靜靜則多眠若傳經熱證則屬陽陽主動則令人煩躁不眠也又問曰表證多眠者何也答曰表證多眠是寒邪外束陽氣不舒必見頭痛發熱諸證若直中多眠則見下利清穀手足厥冷諸證與表邪自是不同至於傳經里證則心煩惡熱揭去衣被甚則譫語發狂安得多眠又問曰熱證亦有昏昏而睡者何也答曰此熱邪傳入心胞令人神昏不語或睡中獨語一二句與之以水則咽不與則不思此乃熱甚神昏非欲寐也又風溫證風熱相搏亦令神氣昏憒其證鼻鼾語言難出與直中寒邪厥逆清穀諸證迥然大異矣蜷臥問曰蜷臥何以是直中寒證答曰熱則手足舒伸寒則手足斂束譬如春夏則萬物發舒秋冬則萬物收藏此定理也又問曰表證亦蜷臥何也答曰表證有蜷臥者表受寒侵經絡因而斂束法當溫散至於直中蜷臥必有厥逆清穀諸證相兼須溫中為主也又問曰熱證亦蜷臥何也答曰此熱邪消爍津液不能榮養於筋致有攣急之象乃肝臟將絶名曰搐搦不得與蜷臥同語矣四肢厥冷問曰四肢厥冷何以是直中寒證答曰四肢為陽寒邪屬陰今中寒邪則陽衰不能溫其四肢故厥冷其甚者過乎肘膝肘膝為人之四關今冷過之則陰寒極矣宜大溫之又問曰陽證亦厥逆何也答曰此物極則反熱極而反見厥也別之凡病初起即厥者寒厥也初起發熱日久變厥者熱厥也且熱厥必煩躁口渴惡熱小便短赤大便或閉或下利腸垢脈必沉實有力寒厥則不渴必惡寒身痛小便清長或下利清穀脈必沉細無力安危之機禍如反掌不可不辨身痛如被杖問曰身痛如被杖何以是直中寒證答曰寒邪客於人則身痛痛如被杖寒之極甚者也又問曰表證亦身痛何也答曰表證身痛痛如繩縛也里證身痛痛如被杖也雖為表裡之殊而為寒則一也宜急溫之表寒則溫散裡寒則溫中寒氣散痛自除矣囊縮問曰囊縮何以是直中寒證答曰熱主舒寒主斂定理也春夏則萬物發舒秋冬則萬物斂藏即此觀之可見囊縮為寒矣又問曰指掌用承氣治囊縮何也答曰此傳經厥陰證也傷寒傳至厥陰六經已盡厥陰者肝也肝主周身之筋又厥陰之脈絡陰器因熱邪爍其津液筋脈不榮故舌卷而囊縮其證必口渴煩滿唇焦舌燥與直中陰寒之證迥然不同爾舌黑而潤問曰舌黑而潤何以是直中寒證答曰黑者北方水色也黑而且潤則知其為寒證矣若傳經熱邪舌苔先黃而後黑必乾燥而無津液此火極似水之象譬如燔柴變炭之意乃熱甚也若舌黑而潤津液如常乃寒氣乘心北方之水色見也宜急溫之故曰舌黑而潤為直中寒證也脈沉細無力問曰脈沉細無力何以是直中寒證答曰脈者陽氣主之也氣盛則脈旺氣弱則脈細今脈沉細無力則為中寒無疑矣又問曰經云諸緊為寒何也答曰緊者脈如引繩轉索有風起水湧之象北方剛徑之氣也與數脈不同數以至數名緊以形象論也經云諸緊為寒寒之診不一緊為寒沉細無力亦為寒遲為寒又脈洪大搏指按之空虛者亦為寒譬如數則為熱洪大為熱沉實有力為熱脈澀滯鬱而不通者亦為熱全在以證互相參考時而舍脈從證時而舍證從脈活活潑潑不膠己見其於診法庶矣乎吐蛔問曰吐蛔何以是直中寒證答曰病人胃寒食少蛔泛上隔聞食臭而出故吐蛔也宜用理中安蛔散以溫之不可輕用涼藥又問曰陽證亦有吐蛔者何也答曰病久胃空既無穀氣蛔上隔求食至咽而出須看兼證如何若陽黃髮斑口瘡咽燥大渴消水或用清劑可以收功然而寒證吐蛔者多熱證吐蛔者少最宜斟酌兩感兩感者表裡雙傳也一日太陽與少陰同病二日陽明與太陰同病三日少陽與厥陰同病如在太陽則發熱頭痛在少陰則咽乾口燥在陽明則目痛鼻乾在太陰則腹滿自利在少陽則耳聾脅痛在厥陰則煩滿囊縮表裡並傳為禍最速此論傳經之兩感也又如仲景所謂少陰證反發熱用麻黃附子細辛湯者此論直中之兩感也傳經兩感以解表為主而清裡佐之直中兩感以溫中為主而發表次之此治兩感之大法也或問曰太陽初得病尚未傳經何以即有少陰熱證也答曰此溫熱之候多有之本有積熱在內而外為風寒鼓之故表裡並見陰陽雙傳也其病至暴倘治失其宜去生遠矣傷寒兼症傷寒兼症者非傳經六經之正病亦非直中三陰之正病而實為傷寒所恆有之症故皆以兼症名之其間有見於手經者有因誤治而變症者有病中調攝失宜而變症者有病氣相傳染而變症者臨症之工按法取之曲盡其情則傷寒無餘蘊矣咳嗽咳嗽者肺寒也經云形寒飲冷則傷肺是也肺主皮毛寒邪侵於皮毛連及於肺故令人咳宜用止嗽散加荊芥防風紫蘇子主之或問曰少陽證與直中證水氣證皆令咳嗽何也答曰少陽證兼咳嗽者以其肺有寒也仲景用小柴胡去參棗加乾薑者所以溫肺散寒也直中證兼咳嗽者亦寒氣上束於肺也但溫其中而咳自止水氣證兼咳嗽者以寒水上射於肺也宜分表裡水氣治之表有水氣而發熱用小青龍湯發散以行水里有水氣而下利則用本方去麻黃加蕘花以攻之輕則用小半夏加茯苓湯以疏之俾水飲流通而咳自止矣以上三證皆感寒水之氣而咳故謂咳為肺寒也又問曰俗稱熱傷風咳嗽者何也答曰熱傷風者如冬溫之候天應寒而反溫自人受之則為頭痛喉腫咽乾咳嗽之屬與正風寒之咳稍異又或其人素有鬱熱而外為風寒束之熱在內而寒在外諺云寒包火是也又問曰咳嗽有不兼風寒而專屬火者何也答曰此雜證嗽也或夏令暑熱之火或飲食辛辣之火或脾肺氣虛之火或龍雷儧上之火皆令咳嗽各有兼證與傷寒鼻塞聲重頭痛發熱惡寒之狀自是不同並與熱傷風之咳迥別宜於本門求之不得與傷寒同日語矣止嗽散桔梗一錢五分甘草五分炙白前一錢五分橘紅一錢百部一錢五分紫菀一錢五分水煎服風寒初起加防風荊芥紫蘇子小半夏加茯苓湯半夏薑汁炒三錢茯苓三錢甘草炙一錢生薑三片水煎服咽痛咽痛有表裡寒熱之分不可不辨也風寒在表而兼咽痛者此風火聚於肺也宜用甘桔湯加荊芥防風薄荷牛蒡之類以散之少陰里證兼咽痛者以少陰之脈循喉嚨挾舌本也宜分寒熱治之凡傳經少陰口燥舌乾而痛者熱也甘桔湯主之甚至加黃連元參牛蒡之屬凡咽痛以蒡子為主直中少陰腎氣虛寒逼其無根失守之火浮遊於上以致咽痛必兼下利清穀手足厥冷諸症但溫其中而痛自止薑附湯加桔梗主之夫同一少陰咽痛而寒熱之別相隔千里不可不察復有陰毒陽毒咽痛者治如少陰證更有發汗過多遂至汗多亡陽內損津液而成咽痛者宜用參耆歸術調補元氣收斂汗液而痛自除凡咽痛通用甘桔湯在表者加散藥在裡者分別寒熱而加入溫涼之劑仲景立法精粹學者宜致思焉甘桔湯見前少陰證傷寒吐血傷寒吐血者熱迫血而上行也然有表裡之殊如當汗失汗以致邪蘊於經而吐血者用麻黃湯散之後人以加味參蘇飲代之其法至穩若邪氣入里醞釀成熱以致吐血者宜用犀角地黃湯清之若大便閉結熱邪上攻者生地四物湯加大黃下之釜底抽薪則火氣頓平而釜中之水無騰沸之患矣切忌尋常滋補藥姑息容姦使邪氣流連反成敗症更有以熱濟熱而為動陰血者詳辨於後犀角地黃湯犀角鎊一錢五分生地黃四錢牡丹皮麥冬白芍各一錢五分水煎服衄衄者鼻中出血也寒氣初客於經則血凝滯而不行何得有衄今見衄者是寒邪將散榮血周流病當解也古人謂血為紅汗是也然衄症亦有表裡之殊寒邪在經頭痛發熱而衄者表也宜微汗之加味香蘇散主之若邪氣入里燥渴煩心而成衄者宜急清之犀角地黃湯主之或問曰動陰血與鼻衄何以別之答曰動陰血者乃傳經里證熱極而反發厥醫家誤認為寒投以乾薑附子以火濟火迫血妄行或從耳目口鼻湧出名曰動陰血又謂下厥上竭為難治與鼻衄症天淵相隔矣便膿血便膿血者熱迫血而下行也此傳經熱邪所致也法當清之若瘀血凝聚少腹痛拒按小便自利者下之然亦有陰寒為病下利膿血者此下焦虛寒腸胃不固譬如天寒地凍水凝成冰非溫劑不化附子理中湯加歸芍主之斯二者一為血熱一為血寒臨證時不可不辨蓄血蓄血者瘀血蓄於下焦也仲景云太陽證不解熱結膀胱其人如狂血自下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯此表證甫除瘀積始聚為蓄血之輕者故用前方若表邪已盡裡熱既深乃蓄血之重者則用抵當湯攻之但蓄血證與溺澀燥糞證相似而不同宜分別施治凡傷寒少腹脹滿按之不痛小便不利者為溺澀也若按之繞臍硬痛小便短澀大便不通者此有燥屎也若按之少腹硬痛小便自利或大便黑色喜忘如狂者為蓄血也此辨證之大法也桃核承氣湯桃仁十個大黃二錢五分芒硝一錢五分甘草一錢桂枝五分水煎服抵當湯水蛭虻蟲去翅各十枚桃仁十枚大黃五錢水煎服動陰血傷寒傳經熱症漸至手足厥冷是為熱極而反見厥所謂熱深厥亦深熱微厥亦微是也醫者不識誤投熱藥以火濟火迫血妄行其血或從耳目或從目鼻一擁而出名曰動陰血又名下厥上竭為難治大抵傷寒初起即發厥者寒厥也初起發熱燥渴漸次而厥者熱厥也寒厥者必下利清穀口鼻氣冷口舌常潤脈沉遲熱厥者必便閉譫語或下利腸垢口渴唇焦或舌黑而燥脈滑數寒熱之際朗然明白則無動陰血之禍矣鼻鼾鼻鳴鼻鼾者鼻中發聲如鼾睡也此為風熱壅閉鼻鳴者鼻氣不清言響如從甕中出也多屬風寒壅塞須按兼症治之不能言及語言難出不能言及語言難出者有表裡之分其一太陽證發汗已身猶灼熱者名曰風溫其脈尺寸俱浮自汗身重多眠鼻息鼾語言難出此表邪蘊其內熱也治用葳蕤湯去麻黃加秦艽主之其一少陰病咽中傷生瘡不能言古方治以苦酒湯然苦酒湯恐傳寫之訛宜用甘桔湯加蒡子薄荷元參白前之屬以清之復有風寒客於肺中聲啞不能言者當用半夏生薑荊防等辛溫以散之更有中寒之證口鼻氣冷口噤難言者當用溫熱之劑大抵唇焦齒燥舌乾口渴者熱也唇清口和口鼻氣冷者寒也傷寒辨證莫先於此學者宜致思焉葳蕤湯葳蕤石膏乾葛各一錢白薇羌活杏仁甘草川芎各六分防風七分用此以代麻黃為穩當青木香五分水煎服溫瘧傷寒邪熱未除復感風邪變為溫瘧溫瘧之狀寒熱依時而作大抵熱多寒少或先熱後寒每致神昏譫語與時行正瘧不同治用小柴胡湯去半夏加黃連知母貝母以清之然溫瘧寒熱以時又與少陽病寒熱往來無定時者自是不同身重難轉側身重大都屬寒然亦有熱者經曰風濕相搏骨節煩疼不能自轉側不嘔不渴脈虛浮而澀者桂枝附子湯主之此表寒也經曰少陰病腹痛四肢沉重疼痛下利者治以真武湯此裡寒也經曰發汗已身猶灼熱名曰風溫其證脈浮汗出身重多眠鼻息鼾治以葳蕤湯此表寒束其裡熱也經曰三陽合病腹滿身重口不仁面垢譫語遺尿自汗出白虎湯主之此表裡皆熱也又陰陽易病身重少氣少腹裡急氣上衝胸眼中生花宜用附子理中湯主之此裡虛且寒也真武湯見筋惕肉瞤發黃濕熱俱盛則發身黃傷寒至於發黃為病亦甚矣熱而兼濕如盦曲相似日久則變為黃也然不特濕熱發黃而寒濕亦令人發黃但寒濕之黃身如熏黃色暗而不明濕熱之黃黃如橘色出染著衣正黃如柏也又如瘀血發黃亦濕熱所致瘀血與積熱熏蒸故見黃色也去瘀生新而黃自退矣梔子柏皮湯傷寒發熱頭汗出小便不利渴飲水漿者此鬱熱在裡必發黃宜此湯主之梔子三錢甘草炙一錢黃柏二錢水煎服茵陳蒿湯身黃如橘子色腹滿便閉者可下茵陳三錢梔子二錢大黃二錢水煎服小便當如皂角汁一宿而腹減黃從小便去也茵陳五苓散陰黃之症身冷脈沉細乃太陰經中寒濕身如熏黃不若陽黃之明如橘子色也當問其小便利與不利小便不利宜本方小便自利茵陳朮附湯主之茵陳白朮茯苓各一錢五分豬苓澤瀉各七分薄桂五分水煎服茵陳朮附湯茵陳一錢白朮二錢附子五分乾薑五分甘草炙一錢肉桂去皮三分水煎服痙痙者項背強頭動搖口噤背反張是也此太陽傷風復感寒濕所致其有汗惡風為柔痙無汗惡寒為剛痙加減小續命湯主之然痙病有三陽經絡之殊有胃腑實熱所致有三陰中寒所發有內傷氣血虛弱而發不可不辨假如頭搖口噤背反張者太陽痙也頭低視下手足牽引肘膝相抅陽明痙也若眼目斜視一手一足搐搦者少陽痙也又如口噤胸滿臥不著席腳攣急大便閉結不通必齘齒此陽明胃腑實熱所致宜用三一承氣湯下之又如發熱脈沉細手足厥冷冷汗自出者為陰痙風寒中於臟也附子理中湯加防風肉桂主之然也有內傷發痙者病人肝血不足血燥生風目斜手搐逍遙散加人參桑寄生主之經云諸風掉眩皆屬於肝也若脾虛木旺反傷脾土用五味異功散加柴胡芍藥木香鉤藤之屬脾氣鬱結用加味歸脾湯若大病後或産後氣血大虛用十全大補湯加鉤藤桑寄生如不應急加附子此治痙病之大法也加減小續命湯麻黃去節人參黃芩芍藥甘草川芎杏仁防己各一錢肉桂五分防風一錢五分附子三分水煎服此症若兼陽明須加葛根升麻此症若兼少陽另用小柴胡加桂枝鉤藤三一承氣湯大黃二錢枳實一錢厚朴八分甘草一錢元明粉一錢五分水煎服斑疹凡發斑有四症一曰傷寒二曰溫毒三曰時氣四曰陰症傷寒發斑者蓋因當汗不汗當下不下或妄投熱藥以致熱毒蘊結發為斑疹千金方云紅赤者胃熱紫赤者熱甚紫黑者胃爛也凡斑既出須得脈洪大有力身溫足暖為順若脈沉小足冷元氣弱者為逆候也凡治斑症不宜發汗汗之則增斑爛又不宜早下下早則斑毒內陷如脈洪數熱甚煩渴者用三黃解毒湯或犀角大青湯以清之若脈弱者加人參主之倘昏悶譫語大便四五日不通以調胃承氣湯微利之如未可下即用前犀角大青湯加梨汁蜜糖以潤之大抵解胃熱胃爛之毒必以黃連大青犀角元參升麻真青黛石膏知母黃芩山梔黃柏之類要在審察病情合宜而用之溫毒發斑者冬應寒而反溫或冬令感寒春夏之交發為溫熱之病熱毒蘊蓄發為斑也犀角大青湯主之時氣發斑者天時不正之氣也人感之或憎寒壯熱發為斑疹凡大紅點發於皮膚之上者謂之斑小紅點行於皮膚之中者謂之疹蓋疹輕而斑重也疹發於肺宜用升麻葛根湯加大力子以散之斑出於胃犀角大青湯以清之若時氣傳染中無實熱加味逍遙散去白朮加元參生地以解之陰症發斑者寒伏於下逼其無根失守之火聚於胸中上熏於肺致發斑點如蚊蚤咬痕此非斑也與調中溫胃之劑其點自退理中湯主之三黃解毒湯黃連二錢黃芩黃柏黑山梔各一錢五分水煎服犀角大青湯治斑出已盛心煩大熱錯語呻吟不得眠或咽痛不利犀角屑大青元參甘草升麻黃連黃芩黃柏黑山梔各一錢五分水煎服口大渴加石膏虛者加人參結胸痞氣經云病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞陽三陽也陰三陰也傷寒邪在三陽固不可下下之則為結胸之惡候即邪已入三陰而未結聚成實猶宜清解之若下之太早尚不免於痞氣結胸證重痞氣較輕也大抵從胸至腹硬滿而痛手不可近者為結胸胸前痞滿不舒者為痞氣結胸證先用小陷胸湯如或結實難解更用大陷胸湯攻之痞氣證半夏瀉心湯主之又有水結胸證水飲停蓄也小半夏加茯苓湯主之復有寒實結胸證乃寒氣結聚不應誤下而成須用白散主之凡一切結胸痞氣等證服藥不效者乃濁氣結而未散活人俱用枳實理中丸應手而愈小陷胸湯本太陽證為醫誤下從心下至少腹硬滿而痛手不可近者為結胸應服大陷胸湯若不按不痛者為小結胸應服本方然用藥之道宜先緩後急有如探試之法半夏湯泡二錢黃連一錢五分栝蔞實大者一枚杵細上三味以水六鍾先煮栝蔞減半去渣納諸藥煮取二鍾溫服按此方加枳實一錢五分更效大陷胸湯結胸證服前藥不效須用此方大黃去皮生用六錢芒硝四錢甘遂為末二分五釐上三味以水六鍾先煮大黃減半去渣納芒硝煮二三沸和甘遂末溫服得快利止後服半夏瀉心湯傷寒傳入三陰而未結聚成實醫早下之以致胸中痞悶不舒者為痞氣宜用此方半夏洗黃芩乾薑各一錢五分人參甘草炙各五分黃連一錢大棗去核二個水煎服本方加枳實五七分為妙白散治寒實結胸無熱證者此寒痰積食結於胸中故用此方亦救急之良法桔梗貝母各三錢巴豆去皮心熬黑研如脂一分上三味為末納巴豆更於臼中杵之以白飲和勻分二服病在膈上必吐在膈下必利如不利進熱粥一杯若利不止進冷粥一杯即止枳實理中丸枳實麵炒一兩五錢茯苓白朮陳土炒各二兩甘草炙七錢五分人參五錢乾薑炮四錢上為末米飲糊丸如緑豆大每服三錢開水下日二三服以瘥為度臟結病人素有宿積連於臍旁更加新邪痛引陰筋此邪氣結實之候為難治振戰栗振者聳動也戰者戰搖也栗者心跳也虛證多有之而邪正交爭亦發戰栗也須按兼症治之筋惕肉瞤經云陽氣者精則養神柔則養筋發汗多津液枯少陽氣大虛筋肉失養故惕惕而跳瞤瞤然而動也急宜溫經益陽真武湯主之真武湯治傷寒發汗後筋惕肉瞤並治中寒下利里有水氣而發咳或嘔吐腹痛茯苓三錢白芍酒炒三錢白朮二錢生薑二錢附子炮一錢五分水煎服若咳者加五味子十粒乾薑一錢五分若小便利去茯苓若下利去芍藥若嘔者去附子加生薑一倍義手冒心發汗過多義手自冒心心下悸欲得按者桂枝甘草湯主之驚悸心忪也惕惕然跳動也有氣虛者有汗下過多損津液者有水氣者當按兼症施治可也小便不利小便不利有數種因汗下而小便不利者津液不足也黃疸熱病小便不利者鬱熱內蓄也風濕相搏與夫陽明中風而小便不利者寒氣所乘也更有氣虛而小便不利者宜詳辨之遺溺傷寒遺溺乃危急之候下焦虛寒不能攝水多致遺溺理中四逆輩主之然三陽合病每兼此症有用白虎湯者此熱甚而陰挺失職也大抵熱甚神昏者可治虛寒逆冷為難治也若雜症遺尿多屬氣虛參耆歸術主之厄逆即噎也氣自臍下直衝胸也或謂咳逆即厄逆非也咳逆為咳嗽與厄逆有何干涉大法傷寒當下失下胃火上衝而厄者其證燥渴內熱大便閉結大柴胡湯下之便不結瀉心湯主之三陰中寒胃氣欲絶而厄者其證厥冷惡寒下利清穀附子理中湯合丁香散溫之厄止則吉不止則凶也扁鵲丁香散丁香五個柿蒂五個甘草炙五分乾薑一錢為末沸湯點服為妙懊憹憹即惱字古通用懊憹心中鬱郁不舒比之煩悶有甚焉者由表邪未盡乘虛內陷結伏於心胸之間也梔子豉湯吐之梔子豉湯梔子三錢香豉五錢水煎服服後隨手探吐之若加枳實名枳實梔子豉湯治前證並傷飲食鬱冒昏冒而神不清俗謂昏憒是也經云諸虛乘寒者則為厥鬱冒不仁此寒氣上逆也法當溫補又陽明證小便不利大便乍難乍易時有微熱喘冒不得臥有燥屎也法當下之又傷寒傳至五六日間漸變神昏不語形貌如醉或睡中獨語一二句與之以水則咽不與則不思醫者不識投以承氣則誤矣蓋不知此熱傳手厥陰心胞絡經也與食則咽邪不在胃也不與則不思神昏故也邪熱既不在胃而在心胞宜用導赤散合黃連解毒湯以清之導赤散木通一錢五分生地三錢赤茯苓二錢燈心二十節水煎服奔豚氣從少腹上衝心而痛如江豚之上竄此下焦陰冷之氣宜用薑附湯加肉桂吳萸肉茯苓主之或以橘核小茴川楝子佐之尤效身熱惡寒身寒惡熱病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也竊謂身熱反欲得近衣者傷寒外感之屬也身寒反不欲近衣者熱邪內郁之候也然亦有欲得近衣而為內熱者火極似水也亦有不欲近衣而為裡寒者水極似火也是不可以不辨風溫濕溫傷寒發汗已更感於風身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗身重多眠鼻息鼾語言難出葳蕤湯主之濕溫者其人常傷於濕因而中暑名曰濕溫兩脛逆冷胸滿頭目痛妄言多汗其脈陽浮而陰小切忌發汗汗之名重暍為難治蒼朮白虎湯主之風濕相搏傷寒八九日風濕相搏身體煩疼不能自轉側不嘔不渴脈虛浮而澀者桂枝附子湯主之此症脈虛浮而澀且不渴故用此湯若兼口渴者則不可用也勞復食復女勞復大病後不宜勞動若勞倦傷氣無力與精神者名曰勞復補中益氣湯主之若飲食傷脾名曰食復宜調胃氣以消積食枳實梔子豉湯主之若病後犯房事以致病復名曰女勞復其症頭重不舉目中生花腰背疼痛小腹裡急絞痛以人參三白湯主之人參三白湯人參二錢白朮白芍白茯苓各一錢五分甘草炙五分附子炮一錢棗二枚水煎服陰陽易男子病新瘥與女子接其病遂遺於女女子病新瘥與男子接其病遂遺於男名曰陰陽易其症頭重不舉目中生花腰背疼痛小腹裡急絞痛與女勞復證候相似間有吐舌數寸者為大危人參三白湯主之狐惑狐疑不決之狀內熱生蟲之候也上唇有瘡則蟲蝕其肺名曰惑下唇有瘡則蟲蝕其肛名曰狐雄黃丸主之雄黃丸方雄黃研當歸炒各七錢五分檳榔五錢蘆薈研麝香研各二錢五分上搗研為末煮麵糊為丸如桐子大每服二十丸粥飲下日三服陽毒陰毒熱之極寒之甚至極而無復加者也陽毒則斑黃狂亂陰毒則厥逆清穀身痛如被仗陰陽二毒多有兼咽痛者各宜按證投劑大抵五日內可治過此恐難為力陽毒梔子湯加人中黃主之陰毒四逆湯加蔥白主之梔子湯治陽毒升麻黃芩杏仁石膏各二錢梔子赤芍知母大青各一錢甘草五分柴胡一錢五分豆豉百粒水煎服加人中黃一錢尤效百合病行住坐臥若有神靈其人默默然意趣不樂謂之百合病用百合知母湯主之百合知母湯方百合一枚知母二錢水煎服壞病本太陽病若發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也知犯何逆隨證治之按逆者治不如法也隨證治之者見某證用某藥以救之也古人悉以羊肉湯主之恐未盡然又是齋方不論陰陽二症或投藥錯誤致患人沉困垂危七日後皆可服傳者云千不失一用好人參一兩去蘆薄切水一大升於銀石器內煎至一盞坐新汲水內取冷作一服汗不自他出只在鼻尖上涓涓如水是其驗也余嘗用之屢效羊肉湯方當歸白芍各一錢五分牡蠣煅赤一錢生薑二錢桂枝五分龍骨煅赤四分黑附子炮去皮臍五分上為末羊肉二兩蔥白二寸以水二碗熬減一半以布濾絞去渣溫服熱入血室婦人傷寒經水適來適斷邪氣乘虛內陷於血海之中以致晝則明瞭夜則譫語如見鬼狀者是為熱入血室治法無犯胃氣及上二焦必自愈宜用小柴胡湯去半夏加桃仁紅花生地丹皮之類主之陰躁似陽躁陰極反發躁也傷寒陽證發躁必口渴便閉下利腸垢或譫言妄語脈必沉實有力若直中陰寒不應有躁今反煩躁者是物極則反水極似火也其證口燥渴思得水而不能飲欲坐臥泥水之中脈必沉遲無力名曰陰躁宜用溫劑設或認為陽躁而清之誤之甚矣陽厥似陰厥陽厥者熱極而反發厥也直中寒邪則手足厥冷今傳經熱證而亦發厥者乃物極則反火極似水也書曰熱深厥亦深熱微厥亦微是也但寒厥初病即見熱厥則漸次而至大不同爾腫腫有三證太陽風濕相搏身微腫者宜疏風去濕陽明風熱耳前後腫者宜刺大病瘥後腰以下腫者宜利小便除中傷寒六七日脈遲遲則為寒醫者不察反以涼藥徹其熱腹中應冷不能食今反能食名曰除中言食下即除去也為難治試與素餅食之得餅發熱者除中不發熱者非除中也氣上衝心腹裡時時上衝也傷寒傳至厥陰消渴氣上衝心熱證也經云諸逆衝上皆屬於火是也病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散按寒字當作痰瓜蒂散瓜蒂炒黃赤小豆等分上研為細末取一錢用豉一撮湯一碗先漬之須臾煎成稀糜去渣取汁和末藥五分溫服藥下便臥欲吐且忍之良久再吐如不吐復如前進一服以手指探之即吐如過時又不吐飲熱湯一升以助藥力吐訖便可食若服藥過多者飲清水解之諸方補遺薑附湯溫中回陽乾薑三錢熟附子三錢水煎服香薷飲見傷暑桂枝附子湯即桂枝湯加附子見太陽經證藿香正氣散見傷暑保和湯見心痛補中益氣湯見類中二陳湯見中風檳榔散見腳氣四物湯見虛證澤蘭湯見腰痛甘草附子湯治風濕小便不利大便反快甘草炙熟附子各一錢白朮桂枝各一錢五分水煎溫服麻黃附子細辛湯溫經發表麻黃附子各一錢細辛五分生薑三片水煎服八味湯見類中十棗湯水停脅下硬滿而痛不可忍乾嘔氣短自汗出不惡寒芫花甘遂大戟等分為末水一鍾半先煎大棗十枚取八分入藥末三分溫服若病不除再服三分桂枝加芍藥湯見太陽經證人參膏用頂參六兩水五碗煎取二碗復渣用水二碗煎取一碗去渣將三碗參汁合為一處緩火煎熬以箸常常攪之候汁稠厚即成膏矣凡救虛危將脫之證得此為善六味湯見類中當歸補血湯治血虛燥熱證象白虎誤服白虎者不治黃耆八錢當歸二錢大棗五枚水煎服酸棗仁湯治汗下後虛煩不得眠棗仁炒透一錢甘草知母麥冬茯苓各六分乾薑三分水煎服小青龍湯治表不解有水氣乾嘔發熱而咳麻黃桂枝芍藥各一錢半夏薑汁炒一錢五分甘草炙乾薑細辛各五分五味子七粒水煎服逍遙散見類中五味異功散歸脾湯十全大補湯並見虛證桂枝甘草湯即桂枝湯倍甘草見太陽經證代抵當丸見淋症
