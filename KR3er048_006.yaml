body:
  text: 卷六外科十法外科十法者豫歸宗普陀時所作也余自普陀生長天都五十有三載業醫者凡三十年爰著醫學心悟一書詳言內證梓行於世而外科有未及壬子冬還歸普陀修行適逢聖祖仁皇帝廣發帑金修葺我菩薩行宮前後寺僧及工作人等不下數千人其中病患不一豫為調治悉痊復有患背疽者有患廣瘡疥癬者投以膏散不半月而收功因思豫在天都時僅著內科而未及外科亦一時之闕略也乃復聚精會神參悟外科旨要約以十法而施治之道似無餘蘊言簡而賅方約而效以之問世庶幾其有小補乎將見十法一書與醫學心悟並行於天壤間也內消法一艾灸法二隔蒜灸法勝用刀針書云不痛灸至痛痛灸不痛時凡治癰疽疔腫流注及一切無名腫毒以大蒜切片安瘡頂上用陳艾炷安蒜上香點灸之其艾炷大小看瘡毒大小為取裁若痛疽之大者以蒜搗餅敷上灸之不痛者灸至痛而止痛者灸至不痛而止若內已有膿即將烏金膏塗灸處外用普救萬全膏貼之爛開大口卸卻瘀膿易收功也若口不收或腐肉不脫洗用防風湯敷以海浮散外貼萬全膏腐自去新自生計日可愈真神藥也神火照法三刀針砭石法四圍藥法五開口除膿法六收口法七總論服藥法八復論五善七惡救援法九將息法十凡病中設有挾風寒者即宜斷去葷腥油膩微服散藥俟外邪祛盡另用滋味調補大抵將息癰腫不可缺少滋味以血肉能生血肉也然又不宜過多使肉氣勝穀氣更忌生冷滯氣之物恐反傷脾胃耳並宜避風邪戒嗔怒寡思慮少言語兢兢保養為貴至於病後將息毒大者三年內宜遠帷幕毒小者期年內宜遠帷幕犯之則成虛損或成偏枯或陰減天年不可不慎也其他戒怒慎風亦須常作有病時想以上十法乃治癰疽發背之大綱大者可為小者可知已餘生平喜治外症其心法全在於此約而能己該確而可守也至於周身上下所患之病名備載於後以資參考外科症治方藥發背對心發腎俞發搭背手發足發生於背名曰發背肺經火毒也生於背下與心相對名曰對心發心經火毒也生於腰名曰腎俞發腎經相火之毒若生於肩脊名曰搭背右為肺火左為肝火也生於手背名曰手發生足背名曰足發脾經濕熱之毒也有如蓮子形者頭多突起有如蜂窠形者孔多內陷外結螺靨此二種須防毒陷大率此症皆由膏粱厚味或六淫外客七情內郁所致積聚不散以致榮氣不從逆於肉理耳初覺腫痛即宜用藥消散之散而不去則用艾灸提膿等法癰疽之症始為熱中末為寒中不可不察也遠志膏凡一切癰疽腫毒初起之時隨用遠志肉二三兩去心清酒煮爛搗為泥敷患處用油紙隔布扎定越一宿其毒立消屢試屢驗其效如神普救萬全膏見痹症銀花甘草湯治腫毒初起時皆可立消內服此藥外敷遠志膏一切惡毒無不消散但宜早服為妙倘瘡已成膿無從消散也必須外潰金銀花二兩甘草二錢水煎清酒沖服若毒在下焦加牛膝二錢陳艾丸每歲端午日蓄蘄艾一二斤愈久愈良用時取葉為炷或加麝香木香雄黃末搓成團安蒜上灸之名藥艾丸蟾蜍餅治疔毒腦疽乳癰附骨疽臀癰一切患症或不痛或大痛或麻木用此敷貼瘡頭蟾蜍酒化一錢輕粉五分乳香沒藥雄黃巴豆各二錢麝香三分硃砂一錢朝腦一錢以上各為細末於五月五日午時在淨室中用蟾蜍酒和藥丸如緑豆大每用一丸口涎調塗貼疔瘡上以膏蓋之菊花甘草湯治疔之仙藥也白菊花四兩甘草四兩水煎頓服渣隨即再煎重者不過二劑即消至穩至效一切消疔之劑皆不及此芎芷香蘇散凡毒多有挾風寒而發者宜先用此散之如毒不消隨服銀花甘草等藥川芎白芷紫蘇葉赤芍陳皮甘草各一錢荊芥香附秦艽各一錢五分連須蔥白二寸水煎服若兼傷食加山楂麥芽葡子若內熱極盛加連翹蒡子烏金膏去腐肉不傷新肉最為平善巴豆去殼新瓦上炒黑研細聽用多寡看瘡勢酌量防風湯防風白芷甘草赤芍川芎歸尾各二錢雄豬蹄一節加連須蔥白五根用三大碗水煎以絹片蘸水洗之拭乾然後上藥其深曲處以羊毛筆洗之海浮散敷此腐肉自化新肉自生此外科回生保命之靈丹也乳香沒藥等分上二味安箬皮上火炙乾為極細末敷患處再貼膏藥此散毒淨則收口毒不淨則提膿外出其神妙難以言喻火照散硃砂血竭沒藥明雄黃各三錢麝香五分上五味為細末用綿紙條長尺許每條裹藥三分真麻油浸點自外而內周圍照之瘡毒隨藥氣解散自不內侵臟腑初用三條漸加至五七條瘡勢漸平又漸減之熏罷隨上烏金膏貼以萬全膏若腫勢漫衍周圍用芙蓉膏敷之如再熏須洗去末藥其貼膏藥處藥油可不必洗芙蓉膏赤小豆四兩芙蓉葉四兩香附四兩菊花葉四兩白芨四兩為細末每末一兩加麝香一分米醋調塗住根腳雞子清調亦可化腐紫霞膏治癰疽發背瘀肉不腐及不作膿者又治惡瘡內有膿而外肉不穿潰者輕粉萆麻仁研各三錢巴豆研白仁五錢白結二錢樟腦螺獅肉各一錢金頂砒煅五分為末瓷罐收貯臨用時麻油調塗頑硬肉上以萬全膏貼之至頑者不過二次即軟其力大於烏金散衛生湯解毒消癰清熱活血止痛初起相宜白芷連翹花粉各八分荊芥甘草節蒡子各一錢防風乳香沒藥各五分銀花二錢貝母歸尾各一錢五分水煎服若大便閉結熱勢極盛者加酒炒大黃二三錢透膿散凡癰毒內已成膿不穿破者服即破黃耆四錢皂刺白芷川芎牛蒡子穿山甲炒研各一錢金銀花當歸各五分酒水各半煎服參耆內托散丹溪云癰疽未潰以疏托解毒為主癰疽既潰以托補元氣為主二語可為外科樞要人參一錢虛甚者倍用黃耆酒炒三錢當歸二錢川芎酒炒五分炙草一錢五分陳皮五分金銀花五錢丹皮一錢遠志去心甘草水泡炒一錢五分大棗五枚水煎服理中湯溫補中氣挽回元陽人參二錢黑薑一錢五分甘草炙二錢白朮陳土炒三錢附子薑汁甘草水制一錢大棗五枚去核水煎服參苓白朮散健脾養胃人參一兩茯苓蒸二兩山藥炒苡仁炒扁豆炒蓮肉去心炒各二錢砂仁一兩神麯炒黑甘草炒各五分白朮陳土炒四兩陳皮微炒一兩共為細末每用三錢開水下補中益氣湯中氣下陷者舉之巔頂有病需此人參炙甘草當歸各一錢升麻柴胡各三分陳皮五分黃耆二錢白朮一錢五分大棗二枚生薑三片水煎服藿香正氣散散風寒消飲食止嘔吐瀉利藿香砂仁厚朴茯苓紫蘇葉陳皮各一錢白朮陳土炒半夏桔梗白芷各七分甘草炙五分生薑三片水煎服十全大補湯峻補氣血乃扶危定傾之大藥為收功保命之神丹人參白朮陳土炒各三錢黃耆蜜炙五錢茯苓一錢當歸一錢五分大熟地九蒸九曬一錢白芍酒炒一錢五分甘草炙八分川芎肉桂去皮各五分大棗五枚薑三片水煎服虛甚者更加附子鹿茸六味湯壯水之主以鎮陽光凡腎經真水不足虛火上炎脈數有熱者宜此大熟地四錢山萸山藥各二錢丹皮茯苓各一錢五分澤瀉一錢水煎服八珍湯即大補湯去黃耆肉桂歸脾湯治思慮傷脾榮血不足睡臥不寧人參白朮當歸棗仁炒白芍各一錢黃耆一錢五分遠志去心甘草水泡炒甘草炒各七分木香五分圓眼肉五枚水煎服香炒六君子湯理脾化痰溫胃進食人參白朮茯苓炙甘草陳皮半夏各一錢砂仁藿香各八分薑二片棗三枚水煎服桂附八味湯益火之原以消陰翳凡腎經真陽不足火衰不能生土脈虛大無力者宜此大熟地八兩山萸肉山藥各四兩丹皮茯苓澤瀉各三兩附子肉桂各一兩用煉蜜丸每服四錢淡鹽水下紫金錠見咽喉症腦疽對口偏對口生於腦名曰腦疽生於頸後名曰對口生於頸旁名曰偏對口正對口易治偏對口難治因其軟肉與喉相近也多因膏粱醇酒風寒壅遏所攻宜用神火照法次用烏金膏搽之外貼萬全膏取其易潰腐後則用防風湯洗之摻以海浮散仍貼萬全膏頻換數次即愈矣鬢疽發頤時毒大頭天行生於耳前後名曰鬢疽生於兩頤名曰發頤初起宜用銀花甘草湯加柴胡荊芥薄荷蒡子以清散之若腫勢甚極須用砭法若已成膿而未潰者以烏金膏塗瘡頭貼以萬全膏自然腐潰潰後則用海浮散並貼萬全膏自應尋愈頦下漫腫無頭名曰時毒俗名蝦蟆瘟是也頭面盡腫名曰大頭天行俗名大頭瘟是也此皆風火鬱熱所致初起宜用加味甘桔湯以消散之散而不去則用普濟消毒飲以清之若腫勢極盛兼用砭法普濟消毒飲甘草桔硬黃芩酒炒黃連酒炒各一錢玄參橘紅柴胡各五分薄荷六分升麻一分連翹牛蒡子炒各一錢五分水煎服便閉甚加大黃酒炒一錢體虛加人參五分井口疽脅癰肚癰穿骨癰魚口臀癰生於心名曰井口疽生於脅名曰脅癰生於腹名曰肚癰生於手足腕名曰穿骨疽生於腿岔名曰魚口生於臀名曰臀癰施治並如前法護心散患井口疽者宜多用他症亦宜用此遠志肉去心甘草水泡炒一兩五錢緑豆粉二兩甘草炒五錢明乳香箬上炒二兩辰砂研細水飛二錢共為細末每服三錢開水下九龍丹治魚口便毒騎馬癰橫痃初起未成膿者宜此兒茶血竭乳香沒藥青木香穿山甲炒各一兩上各等分為末歸尾三兩紅花二兩酒煎膏丸如桐子大每服二錢空心熱酒送下數服自消胡桃散以大胡桃剖開口將全蠍二枚納入燒灰存性研末熱酒沖服疔瘡疔瘡初起如芥形如粉刺或小泡堅硬如疔故名曰疔大抵肉色紅腫根腳不散者吉若平塌漫腫四圍灰白者凶其狀不一其色不同有紅紫黃白黑之五種以應五臟若生兩足多有紅絲至臍生兩手多有紅絲至心生面唇多有紅絲入喉俱難治速宜針紅絲出血多有生者若患於肢末之處毒愈凝滯藥難導達艾灸之功為大內服菊花甘草湯至效如妄用疏利之劑耗損真氣不惟無以去毒而害反隨之矣其治法即見前十法中喉痹喉間腫痛名曰喉痹古人通用甘桔湯主之然有虛火實火之分緊喉慢喉之別不可不審虛火者色淡微腫溺清便利脈虛細飲食減少此因神思過度脾氣不能中護虛火易至上炎乃內傷之火名曰慢喉風虛證也午前痛甚者屬陽虛四君子湯加桔梗麥冬五味當歸午後痛甚者屬陰虛四物湯加桔梗元參如不效必加桂附以為引導之用加減八味湯加牛膝主之若脈數有熱六味湯主之更有中寒咽痛治用半夏桂甘湯不可誤投涼藥實火者醇酒膏粱風火積熱火動生痰腫痛暴發甚則風痰壅塞湯水不入聲音不出此外至之火名曰緊喉風實證也宜用燈窩油和漿水灌之導去痰涎或用土牛膝搗爛和醋酸灌之或針刺紅腫之處發泄毒血或用金鎖匙吹之俾喉漸鬆開飲食可入聲音得出乃止宜用加味甘桔湯熱甚者兼用三黃解毒湯諺云走馬看喉痹是也凡喉腫不刺血喉風不吐痰喉癰不放膿乳蛾不針破此皆非法又有勞嗽日久咽傷聲損者無法可療纏喉風纏喉風症咽喉腫痛脹塞紅絲纏繞故名纏喉風甚則腫達於外頸如蛇纏探吐悉如前法纏舌喉風纏舌喉風硬舌根而爛兩旁以羊毛筆醮甘草水洗之吹以柳花散乳蛾乳蛾生喉間狀如乳頭一邊生者名單乳蛾兩邊生者名雙乳蛾以小刀點乳頭出血立瘥吹以柳花散再服甘桔湯凡針乳蛾宜針頭尾不可針中間鮮血者易治血黑而少者難治凡用刀針血不止者用廣三七為細末吹刀口上即止凡使刀針不可傷蒂下及舌下根切記舌衄舌衄出血不止用六味湯加生地麥冬牛膝玄參主之並吹柳花散懸癰懸癰生於上齶形如紫李宜針破癰頭用甘草湯攪盡瘀血吹服柳花散腮癰腮癰生腮下繞喉壅腫先用齏汁調玄明粉攪去其痰再看其紫黑處針去瘀血其吹服如前法喉瘡喉瘡命門相火也瘡勢灌膿以銀針挑破之隨用荊芥甘草煎湯洗之其吹服如前法走馬牙疳牙癰牙宣牙痛走馬牙疳牙齦紅腫漸變紫黑臭穢胃熱也牙癰牙邊腫痛灌膿也牙宣牙根盡腫宣露於外也吹以柳花散兼服清胃散牙痛療牙止痛散兼服葛根湯喉瘤喉瘤生於喉旁形如圓眼血絲相裹不可用刀針宜吹麝香散並服加味甘桔湯繭唇繭唇唇上起泡如繭初起即用小小艾炷灸之貼以萬全膏肺絶喉痹肺絶喉痹凡喉痹日久頻服清降之藥以致痰湧聲喑或痰聲如曳鋸此肺氣將絶之候也法在難治宜用獨參湯或兼進八味湯或兼用十全大補湯早服者可救十中之一二四君子湯人參白朮茯苓甘草炙各一錢大棗二枚生薑一片水煎服四物湯川芎五分大熟地當歸白芍各一錢五分水煎服加丹皮麥冬玉竹山藥茯苓退虛熱至效加減八味湯大熟地四錢山萸去核山藥各二錢丹皮茯苓澤瀉各一錢五分肉桂五味各五分水煎服本方去五味加附子名八味腎氣湯金鎖匙治喉閉纏喉風痰涎壅塞口噤不開湯水難下焰硝一兩五錢硼砂五錢片腦二分五釐雄黃二錢白殭蠶一錢各另研為末和勻以竹筒吹患處痰涎即出如痰雖出腫痛仍不消急針患處去惡血服前藥三黃解毒湯黃連一錢黃芩黃柏黑山梔各一錢五分水煎服柳花散治喉瘡並口舌生瘡走馬牙疳咽喉腫痛諸症真青黛蒲黃炒黃柏炒人中白各一兩冰片五分硼砂五錢共為細末吹喉極效清胃散升麻一錢生地二錢黃連連翹丹皮各一錢水煎服療牙止痛散止牙痛神效牙硝三錢硼砂三錢雄黃二錢冰片一分五釐麝香五釐共為末每用少許擦牙葛根湯葛根一錢升麻一錢甘草五分赤芍一錢五分水煎服風勝加荊芥防風薄荷火勝加連翹丹皮生地蒡子麝香散真麝香二錢冰片三分黃連一錢共為末一日夜吹五六次瘰癧瘰癧頸上痰瘰癧串也此肝火鬱結而成宜用消瘰丸兼服加味逍遙散消瘰丸此方奇效治愈者不可勝計豫曾刻方普送矣玄參蒸牡蠣煅銼碎貝母去心蒸各四兩共為末煉蜜為丸每服三錢開水下日二服加味逍遙散治肝經鬱火頸生瘰癧並胸脅脹痛或作寒熱甚至肝木生風眩暈振搖或咬牙發痙諸症經云木鬱達之是已柴胡茯苓當歸白朮甘草白芍丹皮黑山梔各一錢薄荷五分水煎服鼻痔鼻淵鼻痔鼻生息肉也起於濕熱可吹硇砂散鼻淵鼻流濁涕不止也起於風熱可用古拜散硇砂散硇砂五分白礬煅枯五錢共為細末每用少許點鼻痔上即消古拜散荊芥穗上為細末每服三錢生薑湯調下有火者陳茶調下聤耳百蟲入耳聤豆抵耳耳內生疔也乃肝經鬱火所結可用紅棉散兼服加味逍遙散加菊花百蟲入耳以貓尿滴入奇效紅棉散白礬一錢胭脂燒灰存性一錢上研勻先用棉杖子攪去膿水更用棉杖子攪藥摻入於耳底即干若聤耳抵耳加麝香五釐眼丹眼珠忽突眼丹眼旁生泡潰而流水也屬風熱加味逍遙散主之又眼珠忽然腫脹突出屬祟症平祟散主之平祟散黃連二分甘草冰片各一分硼砂三分人乳調點兩眼角立消白禿瘡落髮不生白禿瘡此火旺血虛而生蟲也麥餞散主之發落不生骨碎補為末麻油調塗之麥餞散用小麥一升炒枯黃色乘熱入鉢內為末和硫黃末四兩白砒末五錢攪勻待冷取起加煙膠半斤川椒末二兩生枯礬二兩共碾極細臨用蔥湯洗淨末藥二三錢麻油調搽油紙蓋扎三日一換換三次愈粉刺雀斑粉刺雀斑風熱也改容丸主之改容丸大貝母去心白附子防風白芷菊花葉滑石各五錢上為細末用大肥皂十策蒸熟去筋膜搗和藥為丸早晚洗面破傷風破傷風因跌打傷頭腦而客邪乘之以致手足搐搦人事昏憒天麻散主之天麻散天麻生南星泡去臍防風各一兩荊芥三兩上為細末每用五錢連須蔥白煎湯調下跌打損傷跌打損傷之後凡大小便通利者可用廣三七二三錢酒煎飲之或服澤蘭湯若二便不通必加大黃其破損處可用血竭為極細末摻之韭葉散亦良余用天下第一金瘡藥最佳可保無虞澤蘭湯通二便除腸中瘀血乃活命之靈丹也澤蘭當歸各五錢紅花一錢丹皮三錢青木香一錢五分桃仁去皮尖研十粒赤芍一錢五分水煎熱酒沖服如大便不通加大黃二三錢酒炒韭葉散止血如神石灰同韭菜葉搗餅貼壁候乾細研篩下聽用天下第一金瘡藥凡刀斧損傷跌僕打碎敷上即時止痛止血更不作膿勝於他藥多矣其傷處不可見水余制此藥普送因路遠者一時難取故刻方廣傳之今並筆之書則此方傳益廣矣各鄉有力之家修合以濟急也雄豬油一斤四兩松香六兩麵粉炒篩四兩麝香六分黃蠟六兩樟腦三兩研極細冰片六分血竭一兩兒茶一兩乳香一兩箬皮上烘去油沒藥一兩同上制以上藥研極細先將豬油松香黃蠟三味熬化濾去渣待將冷再入藥未攪勻瓷器收貯不可泄氣乳癰乳岩乳癰者乳房掀痛作膿膿盡則愈其初起宜服栝蔞散敷以香附餅即時消散若已成膿則用太乙膏貼之若潰爛則用海浮散摻之外貼膏藥吸盡膿自愈乳岩者初起內結小核如棋子積久漸大崩潰有巉巖之勢故名乳岩宜服逍遙散歸脾湯等藥雖不能愈亦可延生若妄行攻伐是速其危也栝蔞散栝蔞一個明乳香二錢酒煎服香附餅敷乳岩即時消散一切癰腫皆可敷香附細末一兩麝香二分上二味研勻以蒲公英二兩煎酒去渣以酒調藥熱敷患處太乙膏治一切癰疽腫毒用之提膿極效肉桂一錢五分白芷當歸玄參赤芍生地大黃土木鱉各五錢乳香末二錢沒藥末二錢阿魏一錢輕粉一錢五分血餘一團黃丹六兩五錢以上各藥用真麻油一斤浸入春五夏三秋七冬十日傾入鍋內文武火熬至藥枯浮起為度住火片時用布袋濾淨藥渣將鍋展淨入油下血餘再熬以柳枝挑看俟血餘熬枯浮起方算熬熟每淨油一斤將炒過黃丹六兩五錢徐徐投入不住手攪候鍋內先發青煙後至白煙迭迭旋起其膏已成將膏滴入水中試軟得中端下鍋來方下阿魏散膏面上候化盡次下乳香沒藥輕粉攪勻傾入水內以柳木攪成一塊附骨疽伏兔疽附骨疽肉裡浮腫而皮色不變也宜用艾炷灸之俾其轉陰為陽乃吉若生於膝上三寸名曰伏兔疽法在不治蛇頭毒蛇頭毒手足指腫大如蛇頭也宜用艾炷隔蒜灸之以雄黃白芷等分為末同大蒜搗爛炙之或嚼生栗敷之亦效脫疽脫疽生於手足指腫大如蛇頭也腫腐潰爛摻以海浮散貼以萬全膏臁瘡臁瘡生於足之內外臁宜服生熟地黃丸並敷海浮散貼以萬全膏若濕熱甚而潰爛不收口者於海浮散內加入黃柏散同敷立效腸癰腸癰有生於腸內者腹內脹急大小便牽痛如淋轉側搖之作水聲潰後則膿從大便出有生於腸外者當臍腫痛腹皮脹急潰後則膿自臍出甚則穿潰大腸食蟲亦自臍出勢難為矣初起宜用千金牡丹皮散以消之既潰則用參耆內托之劑千金牡丹皮散丹皮五錢苡仁一兩栝蔞仁去油三錢桃仁去皮尖研二十枚水煎服懸癰臟毒內痔外痔脫肛懸癰生於腎囊之後肛門之前又名海底漏最難收功臟毒生於肛門之兩旁初時腫痛總由濕熱相火內灼庚金而然者宜服國老散加減地黃丸並敷海浮散貼膏藥此一定之治法也內痔外痔亦並可服前藥洗以忍冬藤菖蒲草兼用田螺水搽之可以立消脫肛屬氣虛補中益氣湯亦有血虛火旺者四物湯加升麻國老散甘草七段用急流水一碗浸之炙乾又浸又炙以水盡為度研細末每日空心開水調下二錢忌煎炒煙酒炙爆辛辣發氣等物生熟地黃丸大熟地九蒸曬大生地酒洗各三兩山藥乳拌蒸茯苓乳拌蒸丹皮酒蒸各一兩半澤瀉鹽水蒸一兩當歸酒蒸白芍酒炒柏子去殼隔紙炒丹參酒蒸各二兩遠志去心甘草水泡蒸四兩自敗龜板浸淨童便炙炒研為極細末四兩共為末用金石斛四兩金銀花十二兩熬膏和煉蜜杵為丸每早淡鹽湯下四錢田螺水法用大田螺一個以冰片摻靨中仰放盞內少頃水流出取搽痔瘡上其腫立消下疳下疳生瘡濕癢或陰莖腫爛或如菌如蛇此濕熱之甚也宜服九味蘆薈丸並用加味逍遙散氣虛者佐以加減歸脾湯九味蘆薈丸蘆薈五錢胡黃連當歸芍藥川芎蕪荑各一兩木香甘草各三錢膽草酒浸炒焦七錢上為末米粥糊丸麻子仁大每服一錢或一錢五分開水下楊梅結毒楊梅結毒不可搽輕粉恐毒氣入內宜服忍冬湯貼以萬全膏並用金蟬蛻甲酒忍冬湯金銀花一兩甘草二錢黑料豆二兩土茯苓四兩水煎每日一劑須盡飲金蟬蛻甲酒治楊梅瘡不拘新久輕重皆效好酒五斤用大蟆蝦一個浸酒封口煮香二枝取起待次日隨量之大小總以醉為度冬夏蓋暖出汗為效存酒次日只服量之一半酒盡瘡愈又治楊梅結毒筋骨疼痛諸藥不效者更妙服酒後七日不許見風為要忌口及房事百日絶根矣大麻風赤口遊風鵝掌風爛腳風大麻風皮膚腫起瘙癢頑麻如樹皮吐汁之狀此濕毒生蟲甚則眉毛剝落鼻柱崩壞事不可為也宜服蘄蛇酒搽以當歸膏赤白遊風肌膚搔癢起皮也鵝掌風手足心頑厚起皮也爛腳風腳下濕爛也並可搽當歸膏內服逍遙散兼用生熟地黃丸蘄蛇酒蘄蛇烏梢蛇亦可用去頭尾一具生地二兩黃柏苦參丹參菊花銀花丹皮赤芍當歸枸杞子蔓荊子赤茯苓萆薢百部各一兩秦艽獨活靈仙各五錢桑枝一兩五錢上煮好生酒五六斤退火七日飲當歸膏治癘風並可搽去遊丹鵝掌諸風當歸生地各一兩紫草麻黃木鱉子去殼大風子去殼防風黃柏玄參各五錢麻油八兩黃蠟二兩先將前九味入油熬枯濾去渣再將油復入鍋內熬至滴水成珠再下黃蠟試水中不散為度候稍冷傾入蓋碗內坐水中出火毒三日聽用湯泡火燒湯泡火燒不宜見冷水宜用白芝麻殼燒灰存性研細末敷之若患處乾燥則用麻油調搽或用柏子樹皮為末麻油調敷亦善疥瘡天泡瘡疥瘡有細小不足膿者多屬風熱有肥大灌膿者多屬濕熱俱用麻黃膏搽之十日可愈而不隱瘡仍多服金銀花為妙更有天泡瘡腫起白泡小者如緑豆大大者如蠶豆大連片而生或生頭頂或生耳前後宜用黃柏散敷之立瘥麻黃膏雄豬油四兩斑蝥三個麻黃五錢萆麻子去殼研爛一百粒大楓子去殼研爛一百粒先將豬油化開下斑蝥煎數沸隨去斑蝥再下麻黃煎枯濾去渣將大楓萆麻肉和勻聽搽黃柏散黃柏一大塊以豬脂塗蜍炙為末麻油調搽頑癬頑癬乃濕熱凝聚蟲行皮中有頑厚堅硬者俗稱牛皮癬是宜用百部膏搽之百部膏百部白蘚皮萆麻子去殼鶴蝨黃柏當歸生地各一兩黃蠟二兩明雄黃末五錢麻油八兩先將百部等七味入油熬枯濾去渣復將油熬至滴水成珠再用黃蠟試水中不散為度端起鍋來將雄黃末和入候稍冷便入瓷盆中收貯退火聽用自刎救自刎法凡自刎喉管未斷者不可見水急用麻線縫之外以血竭細末搽之隨用天下第一金瘡藥厚塗之綿紙蓋定然後用挾布裹腳纏住線扎之間日加敷藥頭不可動搖十日愈竹木刺入肉竹木刺入肉拔不出者用象牙磨水滴之良久自出或用螻蛄搗爛敷之亦出若日久血凝腫脹者以花蕊散用象牙水調敷瘀血散而刺並出矣花蕊散花蕊石為末八兩硫黃末四兩和勻瓦罐盛之封口鹽泥固須曬乾安風爐中上下著火煉二炷香候冷打開研篩為極細末收貯此散瘀血之神藥也瘋犬咬毒蛇蜈蚣咬瘋犬咬用明雄黃末五錢杏仁去皮尖一百粒炒研每服二錢虎骨煎酒送下服盡必愈外並用此敷患處毒蛇蜈蚣咬用明雄黃細末用蒜搗爛敷之內服白芷護心散白芷護心散白芷一兩乳香三錢雄黃五錢甘草五錢共為細末每服四錢清酒調下誤服砒毒野菌毒誤服砒毒小薊根搗汁灌之或用金汁灌之或用明礬大黃為末新汲水調灌之得吐利為效野菌毒亦用金汁解之紫金丹亦佳自縊救自縊抱下解除繩索用好肉桂三錢煎湯灌之落水救落水以其人橫伏水牛背上瀝出腹中之水如無牛以凳代之隨用通天搐鼻散吹鼻孔中得嚏則活獨用半夏末吹之亦佳魘夢不醒魘夢不醒吹以通天散更用蔥白生薑煎湯灌之搐鼻通天散豬牙皂角去皮弦一兩細辛去葉半夏各五錢共為極細末每用一二分吹鼻中得嚏則蘇補遺加味甘桔湯在鬢疽門甘草桔梗各三錢蒡子炒二錢荊芥三錢薄荷五分貝母一錢五分水煎服若兩頤腫盛者加柴胡一錢五分丹皮三錢
