body:
  text: 卷五婦人門婦人之症多與男子同惟經行胎産與男子異耳茲特舉其異者詳述於後以備參考其同者悉照前法主之不復贅及月經不調經常也一月一行循乎常道以象月盈則虧也經不行則反常而災沴至矣方書以趲前為熱退後為寒其理近似然亦不可盡拘也假如臟腑空虛經水淋漓不斷頻頻數見豈可便斷為熱又如內熱血枯經脈遲滯不來豈可便斷為寒必須察其兼症如果脈數內熱唇焦口燥畏熱喜冷斯為有熱如果脈遲腹冷唇淡口和喜熱畏寒斯為有寒陽臟陰臟於斯而別再問其經來血多色鮮者血有餘也血少色淡者血不足也將行而腹痛拒按者氣滯血凝也既行而腹痛喜手按者氣虛血少也豫以益母勝金丹及四物湯加減主之應手取效益母勝金丹大熟地砂仁酒拌九蒸九曬當歸酒蒸各四兩白芍酒炒三兩川芎酒蒸一兩五錢丹參酒蒸三兩茺蔚子酒蒸四兩香附醋酒薑汁鹽水各炒一兩四兩白朮陳土炒四兩以益母草八兩酒水各半熬膏和煉蜜為丸每早開水下四錢血熱者加丹皮生地各二兩血寒者加厚肉桂五錢若不寒不熱只照本方四物湯見虛勞調經養血之要藥其地黃鬚九蒸九曬方能取效否則滯膈生痰妨礙飲食乃製藥之過非立方之罪也血熱者加丹參丹皮益母草血寒者加桂心牛膝經行而腹痛拒按者加延胡香附木香經既行而腹痛喜按者加人參白朮血少色淡者亦並加此若腹中素有痞飲食滿悶者本方內除熟地專用三物加丹參陳皮香附之屬室女經閉成損婦人經閉其治較易室女經閉其治較難婦人胎産乳子之後血氣空虛經水一時不至俟其氣血漸回而經脈自通矣室女乃渾全之人氣血正旺不應阻塞其閉也若非血海乾枯則經脈逆轉血海枯則內熱咳嗽鬢髮焦而成怯症經脈逆轉則失其順行之常而為吐為衄夫血以下行為順上行為逆速宜調其經脈俾月水流通庶幾可救豫以益母勝金丹加牛膝主之若其人肝經怒火熾盛者則頸生瘰癧或左脅刺痛更佐以加味逍遙散及消瘰丸若其人脾氣虛弱不能消化飲食血無從生更佐以五味異功散若其人精神倦怠晡熱內熱此氣血兩虧無經可行更佐以八珍湯此治室女經閉之良法倘妄行霸道破血通經其不僨事者幾希矣益母勝金丹見前加味逍遙散見類中消瘰丸見瘰癧門五味異功散八珍湯俱見虛勞暴崩下血經云陰虛陽搏謂之崩此言熱迫血而妄行也又曰陽絡傷則血外溢陰絡傷則血內溢外溢者從上出內溢者從下流也病人過於作勞喜怒不節則絡脈傷損而血妄行矣前症若因熱迫血而妄行者用加味四物湯若因絡脈傷損者用八珍湯若瘀血凝積佐以獨聖丸若因肝經火旺不能藏血者加味逍遙散若因脾氣虛不能統血者四君子湯加歸芍主之若因思慮傷脾不能攝血歸經者歸脾湯若氣血兩虧血崩不止更用十全大補湯丹溪云凡血症須用四君子之類以收功若大吐大下毋以脈論當急用獨參湯救之若潮熱咳嗽脈數乃元氣虛弱假熱之象尤當用參朮調補脾土若服參朮不相安者即專以和平飲食調理之此等症候無不由脾氣先損故脈息虛浮而大須令脾胃健旺後天根本堅固乃為可治設或過用寒涼復傷胃氣反不能攝血歸經是速其危也加味四物湯本方內加丹皮阿膠黃芩黑山梔方見虛勞八珍湯見虛勞獨聖丸治瘀血凝積瘀血不去則新血不得歸經此丸主之虛人以補藥相間而用五靈脂去土炒煙盡為末醋丸緑豆大每服一二錢淡醋水下清酒亦得加味逍遙散見類中四君子湯歸脾湯十全大補湯並見虛勞帶下帶下之症方書以青黃赤白黑分屬五臟各立藥方其實不必拘泥大抵此症不外脾虛有濕脾氣壯旺則飲食之精華生氣血而不生帶脾氣虛弱則五味之實秀生帶而不生氣血南方地土卑濕人稟常弱故濁帶之症十人有九豫以五味異功散加扁豆苡仁山藥之類投之輒效倘挾五色則加本臟藥一二味足矣夫帶症似屬尋常若崩而不止多至髓竭骨枯而成損治此者寧可忽諸五味異功散見虛勞健脾止濁帶前症若專下白色屬肺倍用苡仁若兼赤色屬心加丹參當歸若兼青色屬肝加柴胡山梔若兼黃色屬脾加石斛荷葉陳米若兼黑色屬腎加杜仲續斷若脈數有熱加炒黃柏蓮子心若脈遲厥冷加黑薑大棗求嗣子嗣者極尋常事而不得者則極其艱難皆由男女之際調攝未得其方也男子以葆精為主女子以調經為主葆精之道莫如寡欲遠房幃勿縱飲少勞神則精氣足矣如或先天不足則用藥培之大抵左尺無力或脈數有熱此真水虛也六味丸合五子丸以補天一之水若右尺無力或脈遲厥冷此真火衰也八味丸合五子丸以補地二之火若二尺俱無力或中氣餒弱是水火兩虧氣血並虛也用十補丸合五子丸而大補之倘精薄不凝更加魚螵鹿角膠之屬精不射遠更用黃耆斤許熬膏為丸以益其氣此治男子之法也調經之道先在養性詩云婦人和平則樂有子和則氣血不乖平則陰陽不爭書云和平之氣三旬一見是已如或經事愆期則用藥調之大抵先期而至或脈數有熱此血熱也益母勝金丹加生地丹皮主之若後期而至或脈遲厥冷此血寒也益母勝金丹加肉桂主之若將行而腹痛者是氣滯也更加順氣之藥若食少氣虛面色㿠白四肢無力是為氣血兩虧即用前方減香附一半加人參黃耆河車茯神棗仁遠志之屬俾其氣血充旺則經脈自調譬如久旱不雨河道安得流通河道不通而欲其潤澤萬物不亦難乎女人經水不通或淋漓希少而欲其生子何可得耶此論女子之治法也是以葆精之道責之男子調經之要責之女子各有病處須細心體認不可矇混而失生生之理也求嗣者念之哉六味合五子丸大熟地八兩山藥四兩山萸肉四兩茯苓丹皮澤瀉各三兩枸杞子菟絲子各四兩五味子車前子覆盆子各二兩石斛六兩熬膏和煉蜜為丸每早開水下四錢八味丸見類中門十補丸即十全大補湯為丸見虛損門益母勝金丹見月水不調轉女為男說易曰乾道成男坤道成女乾剛用事得陽氣之專者則多男坤柔用事得陰事之全者則多女此定理也男子平時清心寡欲養其乾健之體則所感而生男矣至於受胎時日之法謂斷經一二日感者成男三四五日感者成女誠以一二日間陰氣方虧則陽氣當勝故生男三四五日陰血既回則陽氣不勝故生女此乾坤之性情剛柔之體用也今方家備載轉女為男之法有束皮革者有佩雄黃者有暗藏雄雞羽於席下者有暗藏斧於床下而系刃向下者種種諸法或驗或不驗其驗者安知其非幸中耶終不若講究本原為合理也診婦人有孕法經謂婦人有孕者身有病而無邪脈也有病謂經閉無邪脈謂脈息如常不斷絶也經又云手少陰脈動甚者孕子也少陰心也心主血脈心脈旺則血旺而為孕子之兆經又云陰搏陽別謂之有子言二尺脈旺與兩寸迥別亦為有孕以上三者但得其一即為孕脈分而占之合而推之而孕脈無遁情矣或謂流利雀啄亦為孕脈何也答曰流利者血正旺雀啄者經脈閉塞不行故脈疾而歇至此數月之胎也不知者斷為病脈則令人恥笑或謂孕有男女何以脈而知之也答曰左寸為太陽脈浮大知為男也右寸為太陰脈沉實知為女也若兩寸皆浮大主生二男兩寸皆沉實主生二女凡孕脈弦緊滑利為順沉細微弱為逆也驗胎法婦人經水不行已經三月或脈不應指或經事偶見法當驗之用川芎為細末煎艾湯空心調下二錢腹內微動則有胎不動者非胎也食忌有孕之後凡忌食之物切宜戒謹一食雞子糯米令子生寸白蟲一食羊肝令子多疾一食鯉魚令兒成疳一食犬肉令子無聲一食兔肉令子缺唇一食鱉令子項短一食鴨子令子心寒一食螃蟹多致橫生一食雀肉令子好淫一食豆醬令子發哮一食野獸肉令子多怪疾一食生薑令子多指一食水雞鱔魚令子生癩一食騾馬肉延月難産如此之類無不驗者所當深戒藥忌娠孕藥忌歌凡數十種推之尚不止此然藥中如斑蝥水蛭蛇蛻蜈蚣水銀信砒等藥皆非恆用之品姑置勿論茲特選其易犯者約纂數語俾醫家舉筆存神免致差誤其他怪異險峻之品在有孕時自應避忌不待言也烏頭附子與天雄牛黃巴豆並桃仁芒硝大黃牡丹桂牛膝藜蘆茅茜根槐角紅花與皂角三稜莪朮薏苡仁乾漆䕡茹瞿麥穗半夏南星通草同乾薑大蒜馬刀豆延胡常山麝莫聞此係婦人胎前忌常須記念在心胸上藥忌禁犯似矣然安胎止嘔有用半夏者娠孕熱病有用大黃者娠孕中寒有用乾薑桂附者是何說也昔黃帝問於岐伯曰婦人重身毒之如何岐伯對曰有故無殞亦無殞也大積大聚其可犯也衰其大半而止有故者謂有病無殞者無損乎胎也亦無殞者於産母亦無損也蓋有病則病當之故毒藥無損乎胎氣然必大積大聚病勢堅強乃可投之又須得半而止不宜過劑則慎之又慎矣用藥者可不按岐黃之大法耶惡阻娠妊之際經脈不行濁氣上於清道以致中脘停痰眩暈嘔吐胸膈滿悶名曰惡阻法當理脾化痰升清降濁以安胃氣用二陳湯加枳殼主之若脾虛者用六君子湯加蘇梗枳殼砂仁香附主之其半夏雖為妊中禁藥然痰氣阻塞中脘陰陽拂逆非此不除以薑湯泡七次炒透用之即無礙也若與參朮同行猶為穩當凡安胎氣止嘔定眩須用白朮為君而以半夏茯苓陳皮砂仁佐之往往有效夫妊娠惡阻似屬尋常然嘔吐太多恐傷胎氣醫者可不善為調攝乎二陳湯六君子湯俱見類中胎動不安娠妊胎動不安多因起居不慎或飲食觸犯禁忌或風寒搏其衝任之脈或跌僕傷損或怒動肝火或脾氣虛弱宜各推其因而治之大法若因母病而胎動但治其病而胎自安若因胎動而致病但安其胎而母病自愈再診其色若面赤舌青則子難保若面青舌赤吐沫母亦難全娠妊中切宜戒謹安胎飲當歸川芎白芍藥酒炒大熟地九制茯苓阿膠各一錢甘草炙艾葉各三分白朮二錢水煎服若起居不慎加人參黃耆杜仲續斷若飲食觸犯加人參倍加白朮若風寒相搏當按經絡以祛風寒若跌僕傷損另用佛手散加青木香益母草若怒動肝火本方加柴胡山梔若脾氣虛弱去熟地加人參扁豆陳皮然因時調治對證處方全在活法不可膠執也佛手散當歸五錢川芎二錢五分水煎酒沖服若跌僕傷重加青木香一錢五分益母草三錢胎漏女人之血無孕時則為經水有孕時則聚之以養胎蓄之為乳汁若經水忽下名曰漏胎血瀝盡則胎不保矣大法若因風熱動血者用四物湯送下防風黃芩丸若因血虛用本方加茯神阿膠艾葉若因怒動肝火用加味逍遙散若去血太多用八珍湯如不應用補中益氣湯凡脾虛下陷不能攝血歸經者皆宜補中益氣假如氣血俱盛而見血者乃小兒飲少也不必服藥四物湯見虛勞防風黃芩丸細實條芩炒焦防風各等分上為末酒糊丸桐子大每服二錢食前開水送下加味逍遙散見類中八珍湯見虛勞補中益氣湯見類中子懸子眩紫蘇飲治子懸並催生順産神效當歸川芎紫蘇各一錢甘草炙人參白芍藥酒炒各五分大腹皮黑豆煎水洗八分上生薑一片蔥白一寸水煎服前症若因恚怒傷肝者加柴胡若因不慎起居者加白朮砂仁若因脾氣鬱結者加木香六君子湯二陳湯俱見類中胎不長娠妊胎不長者多因産母有宿疾或不慎起居不善調攝以致脾胃虧損氣血衰弱而胎不長也法當祛其宿疾補其脾胃培其氣血更加調攝得宜而胎自長矣補脾胃五味異功散主之培氣血八珍湯主之祛宿疾隨症治之五味異功散八珍湯俱見虛勞半産半産者小産也或至三五月而胎墮或未足月而欲生均謂之小産小産重於大産蓋大産如瓜熟自落小産如生斷其根蒂豈不重哉其將産未産之時當以安胎為急安胎飲主之既産而腹痛拒按者此瘀血也法當祛瘀生新當歸澤蘭湯主之若小産後血不止或煩渴面赤脈虛微者此氣血大虛也八珍湯加炮姜以補之若腹痛嘔瀉此脾胃虛也香砂六君子湯加薑桂以溫之其在産母更宜慎風寒節飲食多服補藥以堅固氣血毋使輕車熟路每一受孕即至期損動而養育維艱也戒之慎之安胎飲見前胎動不安當歸澤蘭湯當歸澤蘭白芍酒炒川芎大熟地九制各一錢五分延胡索酒炒紅花香附丹皮各五分桃仁去皮尖及雙仁者炒研七粒水煎入童便熱酒各半盞熱服八珍湯見虛勞六君子湯見類中子煩娠妊子煩者煩心悶亂也書云孕四月受少陰君火以養精六月受少陽相火以養氣子煩之症大率由此竊謂婦人有孕則君相二火皆翕聚以養胎不獨四六兩月而已大法火盛內熱而煩者淡竹葉湯若氣滯痰凝而悶亂者二陳湯加白朮黃芩蘇梗枳殼若脾胃虛弱嘔惡食少而煩者用六君子湯子煩之候不善調攝則胎動不安矣慎之淡竹葉湯淡竹葉七片黃芩知母麥冬各一錢茯苓二錢水煎服二陳湯六君子湯俱見類中子癇娠妊中血虛受風以致口噤腰背反張名曰子癇其症最暴且急審其果挾風邪宜用羚羊角散定之若兼怒動肝火佐以逍遙散加人參若兼胎氣上逆佐以紫蘇飲若兼脾虛挾痰佐以六君子湯若因中寒而發者宜用理中湯加防風鉤藤此症必須速愈為善若頻發無休非惟胎妊驟下將見氣血隨胎渙散母命亦難保全大抵此症胎氣未動以補氣養血定風為主胎氣既下則以大補氣血為主此一定之理豫嘗屢治屢驗矣羚羊角散羚羊角鎊獨活當歸各一錢川芎茯神防風甘草炙各七分鉤藤三錢人參八分桑寄生二錢姜五分棗二枚水煎服逍遙散見類中紫蘇飲見前胎動六君子湯見虛勞理中湯見中寒子鳴娠妊腹內自鳴系小兒在腹內哭聲也謂之子鳴又謂之腹內鐘鳴古方用鼠穴中土二錢加麝香少許清酒調下或用黃連濃煎呷之即止但黃連性寒麝香開竅不宜輕用此症乃臍上疙瘩兒含口中因孕婦登高舉臂脫出兒口以此作聲令孕婦曲腰就地如拾物一二刻間疙瘩仍入兒口其鳴即止可服四物湯加白朮茯苓一二劑安固胎氣四物湯見虛勞子喑娠妊至八九月間忽然不語謂之子喑但當飲食調養不須服藥昔黃帝問於岐伯曰人有重身九月而喑何也岐伯對曰胞胎繫於腎腎脈貫系舌本故不能言十月分娩後自為之言也愚按腎脈貫系舌本因胎氣壅閉腎脈阻塞致不能言自應調攝以需之不必驚畏或用四物湯加茯神遠志數劑亦可倘妄為投藥恐反誤事慎之四物湯見虛勞孕婦內癰孕癰腹內生癰也生於有妊之時猶為可畏宜用千金牡丹皮散或神效栝蔞散治之但丹皮苡仁桃仁皆動胎之藥因有病則病當之故無損也千金牡丹皮散治腸癰之聖藥丹皮三兩苡仁四兩栝蔞仁去殼去油桃仁去皮尖雙仁者各一兩上為末每服五七錢水煎服若腸癰大便閉結小腹堅腫加大黃一錢五分但有孕時大黃不宜輕用須斟酌投之神效栝蔞散治腸癰並乳癰及一切癰疽初起腫痛即消膿成即潰膿潰即愈栝蔞爛研一枚生粉草當歸酒洗各五錢明乳香沒藥各一錢水煎熱酒沖服如量渣再煎服即消鬼胎夢與鬼交雄黃丸明雄黃鬼臼去毛丹砂細研水飛各五錢延胡索七錢麝香一錢川芎七錢半夏薑汁炒一兩上為末蜜丸桐子大每服三十丸空心溫酒送下逍遙散見類中歸脾湯見虛損六君子湯見類中安神定志丸見不得臥熱病胎損娠妊熱病不解以致胎損腹中不能出者須驗其産母面赤舌青者其子已損若面青舌赤母亦難全古方通用黑神散下之然藥性燥烈不宜於熱病應用平胃散加朴硝五錢下之為穩當也黑神散隆冬寒月及體氣虛寒者須此桂心當歸芍藥甘草炙乾薑炒生地黃各一兩黑豆炒去皮二兩附子炮去皮臍五錢上為細末每服二錢空心用牛膝三錢煎水調下平胃散見類中又方朴硝三錢童子小便一鍾和熱酒調下立出娠妊小便不通轉胞胞損娠妊中小便不通乃小腸有熱古方用四物湯加黃芩澤瀉主之然孕婦胞胎墜下多致壓胞胞系繚亂則小便點滴不通名曰轉胞其禍最速法當升舉其胎俾胎不下墜則小便通矣丹溪用補中益氣隨服而探吐之往往有驗豫用茯苓升麻湯亦多獲效皆升舉之意也然則仲景治轉胞用桂附八味湯何也豫曰此下焦虛寒胎氣陰冷無陽則陰不化寒水斷流得桂附溫暖命門則陽氣宣通寒冰解凍而小便行矣況方內復有茯苓澤瀉為之疏決乎然亦有陽亢陰消孤陽無陰不能化氣者必須補其真陰古方用滋腎丸豫嘗用六味加車前牛膝收功斯二者一陰一陽一水一火如冰炭相反最宜深究大抵右尺偏旺左尺偏弱脈細數而無力者真水虛也左尺偏旺右尺偏弱脈虛大而無力者真火虛也火虛者腹中陰冷喜熱畏寒小便滴瀝而清白水虛者腹中煩熱喜冷畏熱小便滴出如黃柏脈症自是不同安危在於反掌辨之不可不早辨也復有分娩之時穩婆不謹傷損尿胞以致小便滴瀝淋漓不知約束因思在外肌肉尚可補完腹中之肉獨不可補乎遂用大劑八珍湯加紫河車三錢而以豬胞中湯煎藥飲之如此數服即愈但須早治不可輕忽八味湯見類中滋腎丸黃柏知母各二兩肉桂一錢煉蜜丸每服三錢開水下八珍湯見虛證胎水腫滿娠妊胎水腫滿名曰子腫又名曰子氣其症多屬胞胎壅遏水飲不及通流或脾虛不能制水以致停蓄大法胎水壅遏用五皮飲加白朮茯苓主之脾虛不能制水用六君子湯主之凡腰以上腫宜發汗加秦艽荊芥防風腰以下腫宜利小便加車前澤瀉防己胎水通行生息順易宜先時治之不可俟其既産而自消也五皮飲見水腫六君子湯見類中乳自出娠妊乳自出名曰乳泣生子多不育然豫以為氣血虛弱不能統攝用八珍湯頻頻補之其子遂育夫醫理有培補之功贊化之能豈可執常說而自畫歟八珍湯見虛勞臨産將護法凡臨産將護之法有四一曰善養當安神靜慮勿著惱怒時常行動不可呆坐不可多睡不可飽食及過飲酒醴與雜物惟頻食糜粥以解飢渴最善天氣熱則預擇涼處免生火暈天氣寒則密室溫暖免致血寒調養得宜而生息順易矣二曰擇穩須預請老練穩婆備辦需用之物臨産時不許多人喧鬨免致驚惶但用老婦二人撐扶及憑物站立倦即仰臥以枕安腿中徐徐俟之直待漿水到腰腹齊痛甚緊時是胎已離經令産婦再仰臥俾兒轉身頭對産門稍一用力即生下矣人生人系天生人有自然之造化不用人為造作但順其性而已三曰服藥凡新産女子其臟氣堅固胞胎緊實八月宜服保産無憂湯二三劑臨産再服二三劑撐開道路則兒易生復有用力太早以致漿水先行或連日不産勞倦神疲中氣不續宜服加味八珍湯以助其力若多胎産婦更宜預服此藥復有華他順生丹須俟臨盆腰腹齊痛時再與一二丸用佛手散煎湯送下凡驗産法腰痛腹不痛者未産腹痛腰不痛者未産必腰腹齊痛甚緊時此真欲産也如或遲滯即以順生丹投之適當其時矣四曰吉方凡安産婦床帳及藏衣宜擇月空方位每逢單月月空在壬丙逢雙月月空在甲庚必須看定方位不必遊移吉無不利神驗保生無憂散婦人臨産先服一二劑自然易生或遇橫生倒産甚至連日不生速服一二劑應手取效永救孕婦産難之災常保子母安全之吉當歸酒洗一錢五分川貝母一錢黃耆八分白芍酒炒一錢二分冬月用一錢菟絲子一錢四分厚朴薑汁炒七分艾葉七分荊芥穗八分枳實麵炒六分川芎一錢三分羌活五分甘草五分水二鍾姜三片煎至八分空腹溫服此方流傳海內用者無不響應而制方之妙人皆不得其解是故疑信相半豫因解之新孕婦人胎氣完固腹皮緊窄氣血裹其胞胎最難轉動此方用撐法焉當歸川芎白芍養血活血者也厚朴去瘀血者也用之撐開血脈俾惡露不致填塞羌活荊芥疏通太陽將背後一撐太陽經脈最長太陽治而諸經皆治枳殼疏理結氣將面前一撐俾胎氣斂抑而無阻滯之虞艾葉溫暖子宮撐動子宮則胞胎靈動川貝菟絲最能運胎順産將胎氣全體一撐大具天然活潑之趣矣加黃耆者所以撐扶元氣元氣旺則轉運有力也生薑通神明去穢惡散寒止嘔所以撐扶正氣而安胃氣甘草協和諸藥俾其左宜右有而全其撐法之神者也此真無上良方而世人不知所用即用之而不知制方之妙則亦惘惘然矣豫故備言之以醒學者加味八珍湯凡臨産誤自驚惶用力太早致漿水去多乾澀難生速服此方補養氣血以助其力虛甚者速服二三劑必效但宜大碗飲之不可遲疑志之志之人參八分虛者一錢二分俗見不用人參恐胎氣上逆也不知當歸數倍於人參則不能上逆只可助藥力下行耳且用之漿水已行時尤為穩當白朮陳土炒一錢茯苓八分當歸五錢炙甘草三分川芎一錢五分白芍酒炒一錢大熟地一錢五分明乳香五分丹參酒炒三錢益母草二錢水煎服冬月天寒加黑姜五分服藥而嘔加生薑二片砂仁五分如或漿水去多橫生倒産用老練穩婆輕手扶正隨用此湯即時分娩清吉總之漿水未行用保生無憂散以順其胎漿水去多必用加味八珍湯大補氣血以助其力保産順生百無一失華他順生丹硃砂細研水飛五錢明乳香箬上炙乾一兩上為末端午日豬心血為丸如芡實大每服一丸用當歸三錢川芎二錢煎湯送下順生丹硃砂五錢丁香五錢麝香一錢明乳香一兩石燕一對一雌一雄圓為雌長為雄煅醋焠七次上為末擇天月德日用益母草熬膏為丸如芡實大每服一二丸用歸芎湯送下催生如神散治逆産橫生其功甚大百草霜白芷不見火各為末等分上每服三錢以童便米醋和如膏加沸湯調下或用酒煎加入童便少許熱服書云血見黑則止此藥不但順生大能固血又免血枯為妙十産論楊子建云凡生産先知此十症庶母子兩命皆得保全世之收生者殊少精良妙手多致誤事豫因痛切而備言之一曰正産懷胎十月陰陽氣足忽然腰腹齊痛兒自轉身頭向産門漿破血下兒即正生二曰催産兒頭至産門腰腹齊痛仍不産者方服藥催之或經日久産母困倦難生宜服藥以助氣血令兒速生三曰傷産懷胎未足月有所傷動以致臍腹疼痛忽然欲産或妄服催藥逼兒速生如此生息未必無傷慎之四曰凍産天氣寒冷産母血氣凝滯難以速生則衣服宜厚産室宜暖下衣更宜溫厚庶兒易生更不宜火氣太熱恐致血暈五曰熱産盛暑之月産婦當溫涼得中過熱則頭目昏眩而生血暈之症若涼臺水閣以及狂風陰雨更當謹避六曰橫生言兒方轉身産母用力太急逼令兒身不正當著産母安然仰睡令老練穩婆先推兒身順重頭對産門以中指探兒肩不令臍帶扳羈然後用藥催之再令産婦努力兒即順生七曰倒産言兒並未轉身産母妄自努力致令手腳先出當著産母安然仰睡令穩婆輕手推入候兒自順若良久不生令穩婆手入産戶就一邊撥兒轉順産門卻服催生藥並努力即出八曰偏産言兒雖已轉身但未順生路産母急於努力逼兒頭偏一邊雖露頂非也乃額角耳當令産母仰睡穩婆輕手扶正其頭卻服催藥並努力兒即下若兒頂後骨偏注穀道頞額令穩婆以綿衣烘暖裹手於穀道外傍輕手托正令産母努力兒即生九曰礙産言兒身已正門路已順兒頭已露因兒轉身臍帶絆其肩以致不生令産母仰臥穩婆輕手推兒向上以中指按兒肩脫去臍帶仍令兒身正順産母努力兒即生十曰盤腸産臨産子腸先出然後生子腸出時以極潔淨不破損漆器盛之古方用萆麻子四十九粒研爛塗産母頭頂腸收上急洗去其腸若干以磨刀水少許溫潤之再用磁石煎湯服之即收上磁石須陰陽家用過有驗者古法有用醋水噀母面背者恐驚則氣散深為未便又方大指拈麻油潤之點燈吹熄以煙燻産婦鼻中腸即上此方平善宜用以上十産論可謂精且密矣而交骨不開尚未論及足見醫道繁難不容浮躁者問津也交骨不開産門不閉交骨不開有鎖骨者有血虛不能運達者令穩婆以麻油調滑石塗入産門或用兩指緩緩撐開並服加味歸芎湯候藥力行到即分娩清吉若産門不閉氣血虛也用八珍湯補之如不應用十全大補湯加味歸芎湯當歸五錢自敗龜版童便炙酥三錢川芎三錢婦人頭髮一握燒灰存性水煎服約人行五里即生設是息胎亦下灼過龜版亦可用八珍湯十全大補湯俱見虛勞胞衣不下胞衣不下或因氣力疲憊不能努力宜於剪臍時用物系定再用歸芎湯一服即下或血入衣中脹大而不能下以致心腹脹痛喘急速用清酒下失笑丸三錢俾血散脹消其衣自下如不應更佐以花蕊石散或牛膝散亦得歸芎湯見前失笑丸治瘀血脹胞並治兒枕痛神效五靈脂去土炒蒲黃炒等分共為末醋糊丸如桐子大每服二三錢淡醋水下花蕊石散治産後敗血不盡血迷血暈胎衣不下脹急不省人事但心頭溫者急用一服灌下瘀血化水而出其人即蘇效驗如神醫家不可缺此花蕊石一斤上色硫黃四兩上為末和勻先用紙泥封固瓦罐一個入二藥仍用紙泥封口曬乾用炭煅二炷香次日取出細研每服一錢童便和熱酒調下甚者用二三錢牛膝散治胎衣不下腹中脹急此藥腐化而下緩則不救牛膝川芎蒲黃微炒丹皮各二兩當歸一兩五錢桂心四錢共為末每服五錢水煎服産後將護法産後將護之法有四一曰倚坐婦人産畢須閉目稍坐上床以被褥靠之暑月以凳靠之若自己把持不住則用老練女人靠之不可遽然倒睡常以手從心擀至臍下俾瘀露下行房內宜燒漆器及醋炭以防血暈如或昏暈不醒更宜用此二法二曰擇食凡産後宜專食白粥數日後以石首魚纖少洗淡食之至半月後可食雞子亦須打開煮之方能養胃滿月之後再食羊肉豬蹄少許酒雖活血然氣性慓悍亦不宜多如此則産中無病産後更加健旺矣三曰避風養神慎言凡新産須避風寒不宜梳頭洗面更忌濯足惟恐招風受濕疾病隨起又不宜獨宿恐受虛驚驚則神氣散亂變症百出初生之際不必問是男是女恐因言語而泄氣或以愛憎而動氣尋常亦不可多言恐中氣餒弱皆能致病慎之戒之四曰服藥初産畢古方用熱童便少許飲之此物一時難以猝辦稍冷恐致嘔惡或用生化湯服之亦佳然産後每多心慌自汗之症豫因制歸姜飲投之殊覺妥適加減如法能救産後垂危之厄凡産後用藥不宜輕投涼劑又不宜過於辛熱産後氣血空虛用涼劑恐生臟寒然桂附乾薑氣味辛熱若臟腑無寒何處消受理應和平調治方為合法如或有偏寒偏熱之症又須活法治之不可膠執也生化湯凡産後服一二劑祛瘀生新為妙當歸三錢黑姜五分川芎一錢五分益母草一錢桃仁去皮尖及雙仁者炒研七粒水煎服入童便少許尤佳歸薑湯治産後心慌自汗用此安之當歸三錢黑姜七分棗仁炒一錢五分大棗五枚去核水煎服若服後自汗仍多心慌無主恐其暈脫即加人參二錢熟附子一錢先顧根本方內重用當歸則瘀血不得停留人參可用世人狐疑不決多致誤事豫嘗治新産大虛之人有用人參數兩而治愈者更有用十全大補加附子數十劑而治愈者倘瘀血作痛即以失笑丸間服攻補並行不相妨也十全大補湯見虛損産後血暈産後血暈宜燒漆器熏醋炭以開其竅若瘀血上攻胸腹脹痛拒按者宜用歸芎湯下失笑丸若去血過多心慌自汗用歸姜飲加人參虛甚者更加熟附子若脾胃虛弱痰厥頭眩而嘔惡者用六君子湯大抵産後眩暈多屬氣虛察其外症面白眼合口張手撒皆為氣虛欲脫之象若兼口鼻氣冷手足厥冷此為真虛挾寒速宜溫補每用人參兩餘而以薑附佐之庶得回春不可忽也失笑丸見胎衣不下歸薑湯見前六君子湯見類中産後不語不語之症有心病不能上通者有脾病不能運動舌本者有腎病不能上交於心者雖致病之因不同而受病之處總不出此三經耳産後不語多由心腎不交氣血虛弱縱有微邪亦皆由元氣不足所致古方七珍散主之若兼思慮傷脾倦怠少食更佐以歸脾湯若兼氣血兩虛內熱晡熱更佐以八珍湯若兼脾虛生痰食少嘔惡更佐以六君子湯若兼腎氣虛寒厥冷痹痛更佐以地黃飲子若兼水虛火炎內熱面赤更佐以六味地黃湯如此調治自應漸愈倘妄行祛風攻痰失之遠矣七珍散人參石菖蒲生地黃川芎各一兩防風辰砂另研水飛各半兩細辛一錢上為末每服二錢薄荷湯調下歸脾湯八珍湯俱見虛證六君子湯地黃飲子六味湯俱見類中産後發熱産後若無風寒而忽發熱者血虛也宜用四物湯補陰血加以黑乾薑之苦溫從治收其浮散使歸依於陰則熱即退矣如未應更加童子小便為引自無不效然産後多有脾虛傷食而發熱者誤作血虛即不驗矣法當調其飲食理其脾胃宜用五味異功散加神麯麥芽大凡風寒發熱晝夜不退血虛與傷食則日晡發熱清晨即退是以二症相似也然傷食之症必吞酸噯腐胸膈滿悶顯然可辨若血虛證則無此等症候然産後復有氣血大虛惡寒發熱煩躁作渴乃陽隨陰散之危症宜用十全大補湯如不應更加附子若嘔吐瀉利食少腹痛脈沉細或浮大無力更佐以理中湯此皆虛寒假熱之候設誤認為火而清之禍如反掌四物湯五味異功散十全大補湯俱見虛勞理中湯見中寒産後顛狂産後顛狂及狂言譫語乍見鬼神其間有敗血上衝者有血虛神不守舍者大抵敗血上衝則胸腹脹痛惡露不行宜用澤蘭湯並失笑丸若血虛神不守舍則心慌自汗胸腹無苦宜用安神定志丸倍人參加歸芎主之歸脾湯亦得此症多由心脾氣血不足神思不寧所致非補養元氣不可倘視為實證而攻之禍不旋踵澤蘭湯澤蘭生地酒洗當歸赤芍各一錢五分甘草炙五分生薑一錢大棗四枚桂心三分水煎服失笑丸見胞衣不下安神定志丸見不得臥歸脾湯見虛證心神驚悸産後心神驚悸或目睛不轉語言健忘皆由心血空虛所致夫人之所主者心心之所主者血心血一虛神氣不守驚悸所由來也法當補養氣血為主汗多變痙産後汗出不止皆由陽氣頓虛腠理不密而津液妄泄也急用十全大補湯止之如不應用參附耆附朮附等湯若病勢危急則以參耆術三湯合飲之如或汗多亡陽遂變為痙其症口噤咬牙角弓反張尤為氣血大虛之惡候更當速服前藥庶可救療或問無汗為剛痙有汗為柔痙古人治以小續命湯者何也答曰此外感發痙也病屬外感則當祛邪為急若産後汗多發痙此內傷元氣氣血大虧筋無所養虛極生風借非十全大補加附子安能斂汗液而救此垂危之症乎且傷寒汗下過多潰瘍膿血大泄亦多發痙並宜補養氣血為主則産後之治法更無疑矣甚矣察證宜明而投劑貴審也十全大補湯見虛證産後身痛産後遍身疼痛良由生産時百節開張血脈空虛不能榮養或敗血乘虛而注於經絡皆令作痛大法若遍身疼痛手按更痛者是瘀血凝滯也用四物湯加黑薑桃仁紅花澤蘭補而化之若按之而痛稍止此血虛也用四物湯加黑薑人參白朮補而養之其或有兼風寒者則發熱惡寒頭痛鼻塞口出火氣斯為外感宜用古拜散加當歸川芎秦艽黑姜以散之散後痛未除恐血虛也宜用八珍湯以補之此治身痛之大法也四物湯見虛證古拜散治産後受風筋脈引急或發搐搦或昏憒不省人事或發熱惡寒頭痛身痛荊芥穗上為末每服三錢生薑湯調下又方加當歸等分為末治症如前名清魂散八珍湯見虛證産後腰痛書云腰以下皆腎所主因産時勞傷腎氣以致風冷客之則腰痛凡腰痛上連脊背下連腿膝者風也若獨自腰痛者虛也風用獨活寄生湯虛用八珍湯加杜仲續斷肉桂之屬若産後惡露不盡流注腿股痛如錐刺手不可按速用桃仁湯消化之免作癰腫凡病虛則補之實則瀉之虛中有實實中有虛補瀉之間更宜斟酌焉獨活寄生湯見腰痛八珍湯見虛證桃仁湯桃仁炒研十粒當歸三錢牛膝二錢澤蘭三錢蘇木一錢水煎熱酒沖空心服惡露不絶産後惡露不絶大抵因産時勞傷經脈所致也其症若肝氣不和不能藏血者宜用逍遙散若脾氣虛弱不能統血者宜用歸脾湯若氣血兩虛經絡虧損者宜用八珍湯若瘀血停積阻礙新血不得歸經者其症腹痛拒按宜用歸芎湯送下失笑丸先去其瘀而後補其新則血歸經矣逍遙散見類中歸脾湯八珍湯俱見虛證歸芎湯又名佛手散當歸川芎等分上每服五錢水煎熱酒沖服失笑丸見胞衣不下産後心腹諸痛産後心腹諸痛若非風冷客之飲食停之則為瘀血凝積然産後中氣虛寒多致暴痛宜各審其因而藥之大法風寒者口鼻氣冷停食者吞酸滿悶俱用二香散主之瘀血者轉側若刀錐之刺手不可按痛不可移失笑丸主之中氣虛寒者腹中冷痛按之稍止熱物尉之稍松理中湯加桂心主之若小腹痛氣自臍下逆沖而上忽聚忽散者此瘕氣也橘核丸主之若小腹痛處有塊不可手按此瘀血壅滯名曰兒枕痛並用前失笑丸瘀血行而痛止矣二香散散寒消食砂仁木香黑姜陳皮炙甘草各一兩香附三兩薑汁炒共為末每服二錢生薑湯調下失笑丸見胞衣不下理中湯見中寒橘核丸見雜症小腹痛蓐勞産後氣血空虛真元未復有所作勞則寒熱食少頭目四肢脹痛名曰蓐勞最難調治大法陽虛則惡寒陰虛則發熱清氣不升則頭痛血氣不充則四肢痛宜用大劑八珍湯以補之若脾虛食少即用六君子加炮姜以溫補之諸症自退凡産後調治之法或補養氣血或溫補脾土雖有他症從末治之此一定之法也八珍湯見虛證六君子湯見類中喘促新産後喉中氣急喘促因榮血暴竭衛氣無依名曰孤陽最為難治宜用六味湯加人參以益其陰若脾肺兩虛陽氣不足宜用四君子湯加黑薑當歸以益其陽若自汗厥冷更加附子若兼外感即於四君方內加荊芥陳皮炮薑川芎當歸以散之若瘀血入肺口鼻起黑氣及鼻衄者此肺胃將絶之候急服二味參蘇飲間有得生者六味湯見虛證六君子湯見類中二味參蘇飲人參一兩蘇木杵細三錢水煎頓服若厥冷自汗更加附子二三錢鼻黑鼻衄足陽明胃脈起於鼻交頞中還出挾口交人中左之右右之左蓋鼻準屬脾土鼻孔屬肺金而胃實統之産後口鼻起黑氣及鼻衄皆由氣血空虛榮血散亂乃胃敗肺絶之危症也急用二味參蘇飲加附子間有得生者二味參蘇飲見前産後乳疾婦人産後有乳少者有吹乳者有妒乳者乳為氣血所化若元氣虛弱則乳汁不生必須補養氣血為主若乳房掀脹是有乳而未通也宜疏導之復有乳兒之際為兒口氣所吹致令乳汁不通壅滯腫痛不急治即成乳癰速服栝蔞散敷以香附餅立見消散亦有兒飲不盡余乳停蓄以致腫痛名曰妒乳速宜吮通並敷服前藥免成癰患若婦人乳盛不自乳子宜用炒麥芽五錢煎服其乳即消若婦人鬱怒而乳腫者於栝蔞散內更加柴胡赤芍甘草橘葉之屬栝蔞散栝蔞一個明乳香二錢酒煎服香附餅敷乳癰即時消散一切癰腫皆可敷香附細末淨一兩麝香二分上二味研勻以蒲公英二兩煎酒去渣以酒調藥頓熱敷患處乳癰乳岩乳癰者乳房腫癰數日之外焮腫而潰稠膿湧出膿盡而愈此屬膽胃熱毒氣血壅滯所致猶為易治若乳岩者初起內結小核如棋子不赤不痛積久漸大崩潰形如熟榴內潰深洞血水淋瀝有巉巖之勢故名曰乳岩此屬脾肺鬱結氣血虧損最為難治乳癰初期若服栝蔞散敷以香附餅即見消散如已成膿則以神仙太乙膏貼之吸盡膿自愈矣乳岩初起若用加味逍遙散加味歸脾湯二方間服亦可內消及其病勢已成雖有盧扁亦難為力但當確服前方補養氣血縱未脫體亦可延生若妄用行氣破血之劑是速其危也更有乳卸症乳頭拖下長一二尺此肝經風熱發泄也用小柴胡湯加羌活防風主之外用羌活防風白蘞燒煙燻之仍以萆麻子四十九粒麝香一分研爛塗頂心俟乳收上急洗去此屬怪症女人盛怒者多得之不可不識栝蔞散香附餅俱見前神仙太乙膏治一切癰疽不問膿之成否並宜貼之元參白芷當歸肉桂生地赤芍大黃各一兩黃丹炒篩十三兩上用麻油二斤納諸藥煎黑濾去渣復將油入鍋熬至滴水成珠入黃丹十三兩再熬滴水中看其軟硬得中即成膏矣如軟再加黃丹數錢加味逍遙散見類中加味歸脾湯見虛證小柴胡湯見傷寒少陽證婦人隱疾婦人隱疾前陰諸疾也有陰腫陰癢陰瘡陰挺下脫諸症其腫也如菌如蛇如帶如雞冠種種不一而推其因總不外於濕熱也古方九味蘆薈丸主之若兼怒動肝火佐以加味逍遙散若肝經濕熱極盛佐以龍膽瀉肝湯若脾虛氣弱中氣下陷佐以補中益氣湯若思慮傷脾脾氣鬱結佐以加味歸脾湯若腎水不足佐以六味丸加歸芍庶克收功夫此症雖屬濕熱而元氣虛弱者多若不顧根本而專用清涼恐不免寒中之患也治者慎之九味蘆薈丸治三焦肝膽經風熱目生雲翳或頸項瘰癧耳內生瘡或牙齦蝕落頰腮腐爛下疳陰蝕瘡腫諸症蘆薈五錢胡黃連當歸芍藥炒川芎蕪荑各一兩木香甘草各三錢龍膽草七錢酒浸炒焦上為末米糊丸麻子仁大每服一錢或一錢五分開水下加味逍遙散見類中龍膽瀉肝湯治肝經濕熱兩拗腫痛或小便澀滯下疳潰爛等症龍膽草酒拌炒黃澤瀉各一錢車前子木通生地黃酒洗山梔炒當歸酒拌黃芩炒甘草炒各五分水煎服補中益氣湯見類中歸脾湯六味丸並見虛證
