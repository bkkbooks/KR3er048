body:
  text: 卷四遺精夢而遺者謂之遺精不夢而遺者謂之精滑大抵有夢者由於相火之強不夢者由於心腎之虛然今人體薄火旺者十中之一虛弱者十中之九豫因以二丸分主之一曰清心丸瀉火止遺之法也一曰十補丸大補氣血俾氣旺則能攝精也其有誦讀勞心而得者更宜補益不可輕用涼藥復有因於濕熱者濕熱傷腎則水不清法當導濕為先濕去水清而精自固矣祕精丸主之清心丸清心火瀉相火安神定志止夢泄生地酒洗四兩丹參二兩黃柏五錢牡蠣山藥棗仁炒茯苓茯神麥冬各一兩五錢北五味車前子遠志各一兩用金櫻膏為丸每服三錢開水下十補丸大熟地四兩當歸二兩白芍二兩黃耆四兩人參二兩白朮四兩茯苓二兩山藥三兩棗仁二兩遠志一兩山萸肉三兩杜仲三兩續斷二兩北五味一兩龍骨一兩牡蠣一兩用石斛四兩熬膏和煉蜜為丸每早開水下四錢凡使煎劑倣佛丸方祕精丸見虛證赤白濁濁之因有二種一由腎虛敗精流注一由濕熱滲入膀胱腎氣虛補腎之中必兼利水蓋腎經有二竅溺竅開則精竅閉也濕熱者導濕之中必兼理脾蓋土旺則能勝濕且土堅凝則水自澄清也補腎菟絲子丸主之導濕萆薢分清飲主之或問濁有赤者何也答曰此濁液流多不及變化也又或心火盛亦見赤色宜加入蓮子心燈心丹參等藥則愈矣菟絲子丸菟絲子四兩茯苓山藥沙苑蒺藜蒸車前子遠志肉去心甘草泡炒各二兩牡蠣煅醋碎一兩用石斛四兩熬膏量加煉蜜為丸每服三四錢開水下萆薢分清飲川萆薢二錢黃柏炒褐色石菖蒲各五分茯苓白朮各一錢蓮子心七分丹參車前子各一錢五分水煎服黃疸黃疸者目珠黃漸及皮膚皆見黃色也此濕熱壅遏所致如盦曲相似濕蒸熱鬱而黃色成矣然濕熱之黃黃如橘子柏皮因火氣而光彩此名陽黃又有寒濕之黃黃如熏黃色暗而不明或手腳厥冷脈沉細此名陰黃陽黃者梔子柏皮湯若便閉不通宜用茵陳大黃湯陰黃者茵陳五苓散如不應用茵陳薑附湯其間有傷食者名曰谷疸傷酒者名曰酒疸出汗染衣名曰黃汗皆陽黃之類也谷疸胸膈滿悶噯腐吞酸以加味枳朮湯加茵陳治之應手輒效酒疸更加葛根黃汗用梔子柏皮湯加白朮其間有女勞疸乃陰黃之類宜用薑附湯加參術補之復有久病之人及老年人脾胃虧損面目發黃其色黑暗而不明此臟腑之真氣泄露於外多為難治宜用六君子湯主之梔子柏皮湯茵陳大黃湯茵陳五苓散茵陳薑附湯俱見傷寒發黃加味枳朮湯白朮二錢枳實陳皮麥芽山楂茯苓神麯連翹各一錢茵陳荷葉各一錢五分澤瀉五分水煎服如兼傷酒加葛根一錢若便閉去白朮加卜子黃芩六君子湯見類中不能食有風寒食不消者病氣退而食自進有積滯食不消者祛其積而食自消古方神朮散保和湯枳朮丸皆消積進食之法也然有脾氣虛弱不能消化者有命門火衰不能生脾土而食不消者東垣云胃中元氣盛則能食而不傷過時而不飢脾胃俱旺則能食而肥脾胃俱衰則不能食而瘦坤土虛弱不能消食豈可更行克伐宜用六君子補中益氣湯補之許學士云不能食者未可專責之脾腎經元陽不足不能熏蒸腐化譬如釜中水穀底下無火其何能熟火為土母虛則補其母庶元氣蒸騰飲食增益八味丸主之世俗每見不能食症輒用枳朴黃連實者當之猶可虛人得之禍不旋踵矣大凡不能食而吞酸噯腐胸膈滿悶未必盡屬積食也多有脾虛腎弱而致此者治者詳之神朮散見類中保和湯見心痛枳朮丸見鼓脹六君子湯補中益氣湯八味丸俱見類中不得臥有胃不和臥不安者胃中脹悶疼痛此食積也保和湯主之有心血空虛臥不安者皆由思慮太過神不藏也歸脾湯主之有風寒邪熱傳心或暑熱乘心以致躁擾不安者清之而神自定有寒氣在內而神不安者溫之而神自藏有驚恐不安臥者其人夢中驚跳怵惕是也安神定志丸主之有濕痰壅遏神不安者其證嘔惡氣悶胸膈不利用二陳湯導去其痰其臥立至更有被褥冷暖太過天時寒熱不勻皆令不得安臥非關於病醫家慎勿誤治也保和湯歸脾湯俱見心痛安神定志丸茯苓茯神人參遠志各一兩石菖蒲龍齒各五錢煉蜜為丸如桐子大辰砂為衣每服二錢開水下二陳湯見中風自汗盜汗自汗症有風傷衛自汗出者有熱邪傳裡自汗出者有中暑自汗出者有中寒冷汗自出者治法俱見本門然風火暑熱症自汗太多猶恐亡陽尚當照顧元氣矧在虛寒者乎是以人參耆術為斂汗之聖藥挾寒者則以附子佐之輕劑不應則當重劑以投之設仍不應則以龍骨牡蠣北五味等收澀之品輔助而行或以人參養榮湯相兼而用蓋補可去弱澀可固脫自然之理也其盜汗症傷寒邪客少陽則有之外此悉屬陰虛古方當歸六黃湯藥味過涼不宜於陰虛之人陰已虛而更傷其陽能無損乎宜用八珍湯加黃耆麥冬五味主之方有參耆以氣旺則能生陰也人參養榮湯見虛勞當歸六黃湯當歸黃耆黃芩黃柏黃連甘草各等分水煎服八珍湯見虛勞癲狂癇經云重陰為癲重陽為狂而癇症則痰涎聚於經絡也癲者癡呆之狀或笑或泣如醉如夢言語無序穢潔不知此志願太高而不遂所欲者多得之安神定志丸主之狂者發作剛暴罵詈不避親疏甚則登高而歌棄衣而走逾垣上屋此痰火結聚所致或傷寒陽明邪熱所發痰火生鐵落飲滾痰丸並治之傷寒邪熱大承氣湯下之癇者忽然發作眩仆倒地不省高下甚則瘛瘲抽掣目斜口喎痰涎直流叫喊作畜聲醫家聽其五聲分為五臟如犬吠者肺也羊嘶者肝也馬鳴者心也牛吼者脾也豬叫者腎也雖有五臟之殊而為痰涎則一定癇丸主之既愈之後則用河車丸以斷其根以上三症皆頻治取驗者也若妄意求奇失之遠矣安神定志丸見不得臥生鐵落飲天冬去心麥冬去心貝母各三錢膽星橘紅遠志肉石菖蒲連翹茯苓茯神各一錢元參鉤藤丹參各一錢五分辰砂三分用生鐵落煎熬三炷線香取此水煎藥服後安神靜睡不可驚駭叫醒犯之則病復作難乎為力凡狂症服此藥三十餘劑而愈者多矣若大便閉結或先用滾痰丸下之滾痰丸見痰飲大承氣湯見傷寒少陰證定癇丸男婦小兒癇症並皆治之凡癲狂症亦有服此藥而愈者明天麻一兩川貝母一兩膽南星九制者五錢半夏薑汁炒一兩陳皮洗去白七錢茯苓蒸一兩茯神去木蒸一兩丹參酒蒸二兩麥冬去心二兩石菖蒲石杵碎取粉五錢遠志去心甘草水泡七錢全蠍去尾甘草水洗五錢殭蠶甘草水洗去嘴炒五錢真琥珀腐煮燈草研五錢辰砂細研水飛三錢用竹瀝一小碗薑汁一杯再用甘草四兩熬膏和藥為丸如彈子大辰砂為衣每服一丸照五癇分引下犬癇杏仁五枚煎湯化下羊癇薄菏三分煎湯化下馬癇麥冬二錢煎湯化下牛癇大棗二枚煎湯化下豬癇黑料豆三錢煎湯化下日再服本方內加人參三錢尤佳河車丸紫河車一具茯苓茯神遠志各一兩人參五錢丹參七錢煉蜜為丸每早開水下三錢驚悸恐驚者驚駭也悸者心動也恐者畏懼也此三者皆發於心而肝腎因之方書分為三門似可不必經云東方青色入通乎肝其病發驚駭驚雖屬肝然心有主持則不驚矣心驚然後膽怯乃一定之理心氣熱硃砂安神丸主之心氣虛安神定志丸主之悸為心動謂之怔忡心築築而跳搖搖而動也皆由心虛挾痰所致定志丸加半夏橘紅主之恐為腎志亦多由心虛而得經云心怵惕思慮則傷神神傷則恐懼自失十全大補湯主之若腎經真陽不足以致恐者更佐以八味丸加鹿茸人參之類豫嘗治驚悸恐懼之症有用大補數十劑或百餘劑而後愈者毋謂七情之病而忽視之也硃砂安神丸黃連酒炒一錢五分硃砂水飛一錢甘草五分生地黃酒洗五錢當歸酒拌二錢蒸餅丸緑豆大每服十丸開水下安神定志丸見不得臥十全大補湯見虛勞八味丸見類中眩暈眩謂眼黑暈者頭旋也古稱頭旋眼花是也其中有肝火內動者經云諸風掉眩皆屬肝木是也逍遙散主之有濕痰壅遏者書云頭旋眼花非天麻半夏不除是也半夏白朮天麻湯主之有氣虛挾痰者書曰清陽不升濁陰不降則上重下輕也六君子湯主之亦有腎水不足虛火上炎者六味湯亦有命門火衰真陽上泛者八味湯此治眩暈之大法也豫嘗治大虛之人眩暈自汗氣短脈微其間有用參數斤而愈者有用參十數斤而愈者有用附子二三斤者有用耆術熬膏近半石者其所用方總不離十全八味六君子等惟時破格投劑見者皆驚堅守不移聞者盡駭及至事定功成甫知非此不可想因天時薄弱人稟漸虛至於如此攝生者可不知所慎歟加味逍遙散見類中半夏白朮天麻湯半夏一錢五分天麻茯苓橘紅各一錢白朮三錢甘草五分生薑一片大棗二枚水煎服六君子湯六味湯八味湯俱見類中十全大補湯見虛證健忘經云腎者作強之官技巧出焉心者君主之官神明出焉腎主智腎虛則智不足故喜忘其前言又心藏神神明不充則遇事遺忘也健忘之症大概由於心腎不交法當補之歸脾湯十補丸主之亦有痰因火動痰客心胞者此乃神志昏憒與健忘症稍不相同法當清心開竅二陳湯加竹瀝薑汁並硃砂安神丸主之歸脾湯十補丸見虛勞二陳湯見中風硃砂安神丸見驚悸嘈雜嘈雜者躁擾不寧之貌得食暫已少頃復嘈其中有挾痰與火者則口燥唇焦脈滑數也二陳湯加山梔黃連之類有脾虛挾痰者則氣促食少脈小弱也五味異功散主之嘈雜之症治失其宜變為噎塞者衆矣可不慎乎更有元氣大虛心中擾亂不安者名曰虛煩此與嘈雜不同當按其虛而重補之夫病有兼症各有情形善治者宜斟酌焉二陳湯見中風五味異功散見類中咽喉口舌齒唇咽能咽物通乎地氣喉能納氣通乎天氣氣之呼吸食之升降而人命之存亡系焉咽喉之病挾熱者十之六七挾寒者十之二三而風寒包火者則十中之八九古人開手一方只用甘草桔梗三因方加以荊芥其他蒡子薄荷貝母川連之類皆出後人續補可見咽喉之病不便輕用涼藥而專主開發升散者所謂結者開之火鬱發之是已及其火勢極盛則清劑方施結熱下焦而攻法始用非得已也方書雜稱咽喉為三十二症命名各殊治法亦異眩人心目茲豫細加訂正不遺不贅並選古今治法而擇其平善至效者詳列於下誠以咽喉關要之地命如懸縷學者宜致思焉喉痹痹者痛也經云一陰一陽結謂之喉痹一陰者手少陰心一陽者手少陽三焦也心為君火三焦為相火二火衝擊咽喉痹痛法當散之清之加味甘桔湯主之又有非時暴寒潛伏於少陰經越旬日而後發名曰伏氣咽痛諺云腎傷寒是已法當辛溫以散之半夏桂甘湯主之復有少陰中寒之重證寒客下焦逼其無根失守之火發揚於上遂致咽痛其症手足厥冷脈細沉下利清穀但用理中四逆湯療寒而咽痛自止斯二者寒也其他悉屬熱證不可不知纏喉風咽喉腫痛脹塞紅絲纏繞故名纏喉風其症口吐涎沫食物難入甚則腫達於外頭如蛇纏先用黃齏汁調元明粉少許灌喉中攪去其痰次用蜜水潤之若齏汁不能拔痰則用土牛膝連根搗爛和酸醋灌之如或頑痰膠固吐仍不出咽喉脹閉不通滴水難入者則用解毒雄黃丸極酸醋磨下七丸自然得吐而通既通可用牛黃清心丸加味甘桔湯如或腫勢達外延及頸項頭面紅如火光藥力難敵急用瓷鋒砭去惡血用雞子清調乳香末潤之立瘥或用芭蕉根汁潤之以解其毒若口中腫脹紫黑急用銀針刺去其血或用小刀點之隨以淡鹽湯洗之吹上冰片散更有腫在喉里針法難施急於手少商穴出血則喉花自開仍以解毒雄黃丸灌之自然通透此等病勢危惡非吐痰解毒煎丸並進刀針砭石按法善施解克有濟也治此者平時揣摩純熟臨症庶能措手幸毋輕忽怠緩以誤人也少商穴在手大拇指內側去爪甲一韭葉許針時用布針針之走馬喉風喉舌之間暴發暴腫轉腫轉大名曰走馬喉風又名飛瘍不急治即殺人用小刀點出血淡鹽湯洗之吹以冰片散仍服加味甘桔湯加金銀花一二兩若牙關緊急則用搐鼻散吹鼻中隨以解毒雄黃丸醋磨灌之太乙紫金丹亦佳紫金丹治咽喉等症無往不神驗也纏舌喉風硬舌根而爛兩傍急服加味甘桔湯吹以冰片散緩則不救若有爛處以頭髮作帚子用甘草湯洗淨然後吹藥雙單乳蛾狀如乳頭生喉間一邊生者名單乳蛾兩邊生者名雙乳蛾宜用齏菜汁調元明粉灌去痰涎吹以冰片散隨服甘桔湯自應消散若不消以小刀點乳頭上出血立瘥凡針乳蛾宜針頭尾不可針中間鮮血者易治血黑而少者難痊凡用刀針血不止者用廣三七末嚼敷刀口上即止凡使刀針不可誤傷蒂丁損則不救慎之慎之喉疔形似靴釘但差長耳先用小刀點刺隨用冰片散吹之以甘桔湯多加菊花煎飲之菊花連根帶葉皆消疔之聖藥也每用四兩煎湯頓服一切疔腫皆散自然汁尤效木舌重舌蓮花舌此皆心火熾盛致然也用水洗去舌上白垢若有黑處用小刀點破去瘀血吹冰片散服甘桔湯加黃連若蓮花舌靠牙而起數峰中不可針宜針兩傍針中間恐傷舌下根傷則不能收功凡口內使刀針有兩處不可傷一蒂丁二舌下根切記不可傷之至要至要又舌衄症出血不止於甘桔湯內倍加生地丹皮主之冰片散亦可吹懸癰生於上齶形如紫李此脾經蘊熱所致不急治恐毒氣上攻腦則不可救宜用銀針針破癰頭用鹽湯攪淨瘀血然後吹以冰片散仍服加味甘桔湯兜腮癰生腮下繞喉壅腫先用齏汁調元明粉攪去其痰再看其紫黑處針之以鹽湯攪去其血吹以冰片散仍服甘桔湯若飲食不入急用解毒雄黃丸醋磨下七丸大凡腮癰膿從口中出者易治膿從腮外出者難痊穿破故也喉瘡少陰腎經陰火上衝也宜用齏汁探去其痰若瘡勢灌膿以銀針挑破之隨用荊芥湯洗之再吹冰片散飲以甘桔湯其上齶生瘡脾熱也舌上生瘡心熱也吹服如前法走馬牙疳牙間紅腫漸變紫黑臭穢此胃經濕熱也以午後年干漱之再吹同氣散速服清胃散牙癰牙邊腫痛如豆大脾胃二經濕熱也可用小刀點破之吹以冰片散仍服清胃散又牙齒宣宣症牙根盡腫宣露於外或齒衄不止並服前方仍用陳茶薄荷金銀花等頻服之再用冰片散搽之喉瘤生於喉傍形如圓眼血絲相裹此肺經蘊熱所致不可用刀針宜吹麝香散服甘桔湯切忌多言耗神有一人口內生肉球有根線長五寸余吐球出方可飲食以手輕捻痛徹至心因用疏風降火藥每服加麝香五分仍用麝香散吹之三日根化而愈繭唇唇上起小泡漸腫漸大如繭此心脾鬱熱所致初起時即用艾絨如麥粒大灸之仍服甘桔湯加香附遠志之類肺絶喉痹凡喉痹日久頻服清降之藥以致痰涎壅於咽喉聲如曳鋸此肺氣相絶之候也法在難治宜用人參膏加橘紅湯縱飲之設無參膏即用獨參湯加橘紅亦可每參一錢用橘紅一分早服者可救十中之二三遲則不救矣或用四君子湯亦佳經閉喉腫女人經水不調壅塞經脈亦令喉腫宜用四物湯加牛膝茺蔚子香附桃仁之類俾經脈流通其腫自消也又有梅核氣症男婦皆同喉中如有物吞不入吐不出宜用甘桔湯加蘇梗橘紅香附金沸草之類漸次可愈凡治咽喉口舌之症初則疏風解毒繼則滋水養陰若元氣漸虛急顧脾胃如六味滋水四君補脾皆為要藥否則真氣虧敗勢難挽矣治者審之加味甘桔湯甘草炙三錢桔梗荊芥牛蒡子炒貝母各一錢五分薄荷三分水煎服若內熱甚或飲食到口即吐加黃連一錢若口渴唇焦舌燥便閉溺赤更加黃柏黃芩山梔黃連若有腫處加金銀花五錢半夏桂甘湯見傷寒咽痛理中湯四逆湯見中寒解毒雄黃丸明雄黃水飛一兩鬱金一兩巴豆三十五粒共為末醋和丸如黃豆大每服五七丸清茶下吐出痰涎立醒如未吐再服倘人事昏憒心頭溫者急研末灌之牛黃清心丸牛膽南星九制者一兩麝香五分珍珠五分冰片五分黃連二錢防風一錢荊芥二錢五倍子一錢桔梗一錢元參三錢茯神一錢天竺黃二錢明雄黃二錢當歸一錢犀角末二錢辰砂水飛二錢上為細末和勻甘草四兩煮膏為丸如龍眼大辰砂為衣日中曬乾入瓷瓶中緊塞勿走氣臨服薄荷湯化下一丸冰片散冰片一錢硼砂五錢明雄黃二錢黃柏蜜炙二錢靛花二錢甘草炙三錢雞內金即雞肫皮燒存性一錢人中白煅五錢川黃連二錢元明粉二錢銅青煅五分薄荷炒三錢共為極細末吹患處一方加牛黃熊膽珍珠各一錢兒茶八分麝香三分搐鼻散見中風紫金丹解諸毒療瘡腫主用極弘立見奇效凡居家出入遠遊仕宦者不可缺此山茨菰洗淨二兩五倍子捶破洗淨二兩千金子去殼去油淨一兩紅芽大戟去蘆根洗淨焙乾為末一兩五錢明雄黃三錢硃砂水飛三錢麝香當門子三錢以上藥於淨室中製為極細末候端午七夕或天月二德日合起以糯米濃粥湯和勻杵千下凡合藥切忌雞犬見每錠一錢每服一錠或半錠開水磨服病在上者必吐在下者必利吐利後以溫粥補之一治飲食藥毒蠱毒菌毒河豚中毒自敗牛馬豬羊等肉毒人誤食之必脹悶昏倒急用水磨一錠灌之或吐或瀉其人立蘇一南方山嵐瘴氣霧露水濕自人感之即覺滿悶嘔惡憎寒壯熱隨用開水磨服數分即愈一治癰疽發背對口疔瘡天蛇毒楊梅瘡並用無灰清酒磨服外用醋磨塗瘡上日夜數次覺癢而消一治喉痹喉風喉疔乳蛾等症並用薄荷煎湯磨服一錠即見消散一治絞腸痧烏痧脹通腹攪痛非常用清水磨服一錠即愈一治婦人邪氣鬼胎用石菖蒲煎湯磨服一錠即消一治自縊溺水魘夢鬼魅迷人但心頭溫者俱用生薑汁磨服一錠立蘇一治惡蛇瘋犬毒蠍溪澗諸惡蟲傷人隨即發腫攻注走痛或昏悶喊叫命在須臾急用清酒磨下一錠仍取他人口涎磨敷患處再服蔥湯一大碗被蓋出汗其人必活一治天行時疫延門傳染用米醋磨濃塗鼻孔中仍以開水服少許即不傳及一治傳尸勞瘵諸藥不效每早用清水磨服一錠三日即下惡物有一女子患瘵症方士教服此片時吐下小蟲十餘條後服蘇合香丸其病頓愈以此相傳活人不計其數此真濟世衛生之寶藥也午後年干漱口方午後汁即白馬糞也如一時不辦預取為末臨時水泡取汁亦得萬年干即糞鹼也用新瓦合蓋燒灰存性為末用年干三錢和午後汁二鍾漱口去疳毒再用同氣散吹之同氣散五穀蟲洗淨焙乾三錢人中白三錢黃連去須薄荷葉細辛硼砂各一錢真青黛二錢冰片二分共為細末摻齒縫中清胃散升麻一錢生地二錢黃連連翹丹皮各一錢水煎服冰黃散止牙痛神效牙硝三錢硼砂三錢明雄黃二錢冰片一分五釐麝香五釐共為末每用少許擦牙麝香散真麝香二錢冰片三分黃連一錢共為末一日夜吹五六次四君子湯四物湯俱見虛證六味湯見類中目目有五輪合乎五臟眼眶屬脾為肉輪紅絲屬心為血輪白色屬肺為氣輪青色屬肝為風輪瞳人屬腎為水輪是知目者五臟精華之所繫也目疾專家呼為七十二症著之問答其實重迭者多總不若辨明虛實為的當凡目疾暴赤腫痛畏日羞明名曰外障實證也久痛昏花細小沉陷名曰內障虛證也實者由於風熱虛者由於血少實則散風瀉火虛則滋水養陰然散風之後必繼以養血經曰目得血而能視也養陰之中更加以補氣經曰氣旺則能生血也治外障者蒺藜湯蟬花無比散散之若兼飲食所傷加消導藥如大便久閉不通四順清涼飲下之治內障者逍遙散明目地黃丸補之若兼氣虛益氣聰明湯主之且如初起翳障只須服藥散之不可遽用點藥恐病反深痼當用天然水乘熱頻洗之熱能散風水能制火故也水中不用一味藥蓋目不染塵藥汁入目亦見羞澀更忌刀針刺血割肉及點硇砒之類真為行險徼幸刺血者恐傷肉用硇砒恐潰爛不息惟宜珍珠散點之乃眼藥中之至寶也再凡用散藥不可太過以傷其血用補氣藥不可太過以助其火又不宜過用寒涼使血脈凝結反生青黃之障膜溫存肝腎調劑和平而目疾自全愈矣蒺藜湯治暴赤腫痛白蒺藜麩炒去刺研一錢五分羌活防風各七分甘草炙五分荊芥赤芍各一錢蔥白連須用二段水煎服若傷煎炒炙爆之物加連翹山楂黃連若傷酒更加葛根蟬花無比散通治男婦小兒遠近目疾赤腫脹痛或目胞風粟癢痛或翳膜遮睛或眼眶赤爛或鱉睛胬肉或瞳人突出或拳毛倒睫小兒痘疹風眼並皆治之其應如響蟬蛻去足二兩羌活一兩川芎石決明鹽水煮一時防風茯苓赤芍各一兩五錢白蒺藜麩炒去刺八兩甘草炙當歸各三兩蒼朮米泔水浸切片陳土炒一兩共為細末食後米湯調服三錢忌生冷油麵煎炒諸物四順清涼飲當歸赤芍甘草大黃各一錢如不行加一錢水煎服逍遙散見類中明目地黃丸治內障隱澀羞明細小沉陷生地酒洗一斤牛膝二兩麥冬六兩當歸五兩枸杞子三兩用甘菊花八兩熬膏和煉蜜為丸每服三錢開水下益氣聰明湯治氣虛目不明有人目忽不見丹溪用參膏治之服參斤余而復此氣脫也豫謂血脫者亦應照此治例經云血脫益氣是也黃耆一錢五分人參五分白朮一錢炙甘草五分升麻三分柴胡三分蔓荊子五分當歸白芍各八分陳皮三分大棗二枚水煎服天然水用潔淨開水以潔淨茶盞盛之用潔淨元色絹片乘熱淋洗洗後水混濁換水再洗及洗至水清無垢方止如此數次即愈水內並不用藥故曰天然水也珍珠散古歌云不用刀針割全憑此藥方珍珠一錢五分瑪瑙一錢五分琥珀一錢五分珊瑚一錢五分以上四味俱用豆腐煮過再研硼砂五分熊膽用筍殼盛烘脆為末五分龍腦四分麝香二分五釐瓜竭七分五釐硃砂細研水飛七分五釐黃連末去須蘆研細五分明乳香箬上炙乾五分沒藥箬上炙乾五分爐甘石按法炮製為主一兩五錢以上諸藥各為細末用上細粉羅篩過再照分數稱定合為一處研萬匝復以棉紙篩下瓷罐收貯聽用其效如神制爐甘石法擇上上甘石半斤用傾銀鋪內大紫土罐一個入甘石在內外用紫土泥封口擇一淨室於地上安大鐵釘三根將罐擱穩四圍用栗炭覆蓋上下起火自早至晚為度研細粉羅篩下水飛仍候藥水制再用鵝不食草黃連黃柏黃芩當歸生地梔子連翹赤芍薄荷大黃細辛白芷羌活獨活甘草膽草紅花杏仁白菊防風荊芥蔓荊子蕤仁各一錢桃葉桑葉枇杷葉槐葉杏葉各七片入水二大碗煎至一碗去渣入金銀箔各七張再熬至一盅用煅過爐甘石二兩入潔淨銅器內和勻隔湯煮乾取起再入金銀箔各加七張擇清爽天氣露一宿曬一日迎日月之精華配藥方有神驗其甘石認法形如羊腦白如雪松如花方美若沉重黑黯即不堪用用亦無功而且有損慎之一方用爐甘石制過二錢硃砂硼砂各五分研細常點亦效面經云足陽明之脈絡面下於鼻凡面上浮腫而痛者風也書云面腫為風足腫為水宜用升麻葛根湯加白芷主之若兼挾水濕加入五皮飲為至妙也然又有黃胖面腫者濕熱也有痿黃虛浮者脾虛也濕熱和中丸主之脾虛六君子湯主之若面上生瘡如水痘蔓延不止者黃柏散敷之即愈升麻葛根湯見傷寒陽明經證五皮飲見水腫和中丸見鼓脹六君子湯見類中黃柏散黃柏一塊豬胰塗炙酥為末濕者乾摻乾者麻油調搽瘰癧瘰癧者肝病也肝主筋肝經血燥有火則筋急而生瘰瘰多生於耳前後者肝之部位也其初起即宜消瘰丸消散之不可用刀針及敷潰爛之藥若病久已經潰爛者外貼普救萬全膏內服消瘰丸並逍遙散自無不愈更宜戒惱怒斷煎炒及發氣閉氣諸物免致膿水淋漓漸成虛損患此者可毋戒歟消瘰丸此方奇效治愈者不可勝計豫亦刻方普送矣元參蒸牡蠣煅醋研貝母去心蒸各四兩共為末煉蜜為丸每服三錢開水下日二服普救萬全膏見痹門逍遙散見類中鼻素問曰西方白色入通於肺開竅於鼻鼻塞者肺寒也鼻流清涕者肺風也香蘇散散之若鼻中常出濁涕源源不斷者名曰鼻淵此腦中受寒久而不散以致濁涕常流如泉水之涓涓耳然鼻淵初起多由於寒日久則寒化為熱矣治宜通竅清熱川芎茶調散主之更有鼻生瘜肉名曰鼻痔臭不可近痛不可搖宜用白礬散少許點之頃刻化水而消又鼻中流血不止名曰鼻衄四生丸生地六味湯主之如不止加犀角香蘇散見太陽經證川芎茶調散川芎酒拌荊芥白芷桔梗炒甘草黃芩酒炒川貝母去心各一兩黑山梔二兩共為細末每服二錢食後陳松蘿細茶調下日三服白礬散白礬煅枯二錢硇砂五分共為細末每用少許點鼻痔上即消四生丸生地六味湯俱見虛勞耳耳者腎之外候中藏經曰腎者精神之舍性命之根外通於耳然足厥陰肝足少陽膽經皆絡於耳凡傷寒邪熱耳聾者屬少陽證小柴胡湯主之若病非外感有暴發耳聾者乃氣火上衝名曰氣閉耳聾宜用逍遙散加蔓荊子石菖蒲香附主之若久患耳聾則屬腎虛精氣不足不能上通於耳宜用六味地黃丸加枸杞人參石菖蒲遠志之類其患耳鳴如蟬聲如鐘鼓聲皆以前法治之若風熱相搏津液凝聚變為停豆抵耳之患或膿水淋漓或癢極疼痛此皆厥陰肝經風熱所致宜用加味逍遙散去白朮加荷葉木耳貝母香附菖蒲之屬外用紅棉散吹之若耳內生瘡並用前藥加金銀花主之又百蟲入耳宜用貓尿滴之次則蔥汁猶可若用麻油恐蟲陷耳中不得出也又法以豬肉炙香置耳邊詐就寢令蟲聞肉香則出矣小柴胡湯見少陽經病逍遙散見類中六味地黃丸見虛勞紅棉散白礬二錢胭脂燒灰存性一錢上研勻先用棉杖子攪去膿水更另用棉杖子蘸藥摻入耳底即干若停豆抵耳加麝香五釐痔瘡方書有牝牡蟲血之異名而其實皆大腸經積熱所致大法宜用石菖蒲忍冬藤煎水以瓦罐盛藥對痔熏透然後傾入盆中浸洗之冷則加水如此頻頻熏洗並服加減六味丸及國老散自然漸次消散可免刀針藥線之苦此亦醫痔之良法也又肛門之前腎囊之後此間若有腫脹出膿名曰懸癰又名海底漏最難收功若生於肛門之兩傍則曰臟毒較懸癰為輕耳並用前藥主之此症皆由腎水不足相火內爍庚金而致然也患者速宜保養真元用藥扶持庶可延生辛毋忽視是禱加減六味丸大熟地九蒸曬大生地酒洗各三兩山藥乳蒸茯苓乳蒸丹皮酒蒸各一兩五錢澤瀉鹽水蒸一兩當歸酒蒸白芍酒炒柏子仁去殼隔紙炒丹參酒蒸各二兩自敗龜板浸去牆童便炙酥研為極細末遠志去心甘草水泡蒸各四兩共為末用金叉石斛四兩金銀花十二兩熬膏和煉蜜為丸每早淡鹽湯下四錢國老散治懸癰臟毒神效甘草七段用急流水一碗浸之炙乾又浸又炙以水盡為度研細末每日空心開水調下一錢忌煎炒煙酒炙爆辛辣發氣等物內癰口中咳胸中隱隱而痛吐痰腥臭者肺癰也桔梗湯主之當臍而痛腹皮膨急溺數如淋轉側搖之則水聲者腸癰也千金牡丹皮散主之胃脘脹痛手不可按時吐膿者胃脘癰也忍冬湯主之書云嘔家有膿不須治嘔膿儘自愈是胃脘癰之已潰者不須治也桔梗湯見虛勞千金牡丹皮散丹皮五錢苡仁五錢栝蔞仁一錢五分桃仁去皮尖及雙仁者研十二枚水煎服若大便閉結不通加大黃一錢五分當歸三錢得利止後服忍冬湯一切內外癰腫皆可立消但宜早服金銀花四兩甘草三錢水煎頓服能飲者用酒煎服諸蟲蟲之名有九而猶不足以盡其狀也然總不外乎濕熱所生凡物濕蒸熱鬱則生蟲矣書云蟲長尺許則能殺人蟲痛貫心傷人甚速宜急治之追蟲丸主之但胃寒吐蛔宜用理中安蛔散與治別蟲之法不同醫者志之追蟲丸大黃酒拌三蒸三曬一兩木香五錢檳榔一兩蕪荑去梗一兩白雷丸一兩白朮陳土炒七錢陳皮七錢神麯炒五錢枳實麵炒三錢五分上為末用苦楝根皮豬牙皂角各二兩濃煎汁一碗和前藥為丸如桐子大每服五十丸空心砂糖水送下若大便不實者本方內除大黃理中安蛔散見中寒又方用棐子數斤陸續去殼空心服一二十枚一月之後其蟲盡去神色大轉矣蠱毒嶺南之地多有埋蠱害人之法其法取毒物之毒暗置飲食中其人即中毒矣但中毒之人不知解法發時即不可救惟太乙紫金丹可以立解之是以遠遊川廣不可無此藥紫金丹見咽喉五絶五絶者一自縊二摧壓三溺水四魘魅五服毒也自縊自縊者自旦至暮雖已冷必可治自暮至旦則難治陰氣盛也然豫嘗見自暮至旦而猶救活者不可輕棄也救治之法先將人抱下以被褥塞住穀道次將繩索徐徐解去不得遽然截斷然後將手按摩胸堂若有氣自口出微有呼吸即以好肉桂心二三錢煎湯灌之若已僵直令兩人以竹管吹其兩耳然後以半仙丸納鼻孔中並研末吹入耳中但心頭溫者雖一日猶可活也摧壓摧壓者或墜墮壓復打傷心頭溫者皆可救也將本人如僧打坐令一人提住頭髮用半仙丸納入鼻中並以廣三七二三錢煎酒灌之青木香煎酒灌之亦佳溺水溺水者撈起以其人橫伏牛背上如無牛以凳代之瀝去其水用半仙丸納入鼻中或用搐鼻散吹之仍以生薑自然汁灌之但鼻孔無血出者皆可救也魘魅魘魅者夢而不醒也此濁氣頑痰閉塞所致先用通天散吹鼻中隨用蘇合香丸灌之或用韭根搗汁灌之或用薑汁或用蔥白酒灌之但臥處原有燈則存如無燈切不可以燈照其面只可遠遠點燈耳一法令人痛咬其大拇指而唾其面即活服毒服毒者砒信為重也用小薊根搗汁飲之立救或用黃礬散治之據云奇效又救自刎法若喉管未斷急以麻線縫定用金瘡藥厚敷之以布纏定旬日自愈半仙丸半夏為末水丸如黃豆大每用一丸納鼻中男左女右搐鼻散見真中風黃礬散大黃一兩明礬五錢共為末每服三四錢冷水調下天下第一金瘡藥凡刀斧損傷跌撲打碎敷上即時止痛止血更不作膿勝於他藥多矣其傷處不可見水豫制此藥普送因路遠者一時難取故刻方廣傳之今並筆之於書則所傳益廣矣各鄉有力之家宜修合以濟急也雄豬油熬化去渣一斤四兩松香熬化去渣六兩黃蠟熬化去渣六兩麵粉炒篩四兩樟腦研極細三兩麝香六分冰片六分血竭一兩兒茶一兩乳香箬皮上烘去油一兩沒藥箬皮上烘去油一兩以上藥研極細先將豬油松香黃蠟三味熬化合為一處待將冷再入藥末攪勻瓷瓶收貯不可泄氣用時即知其神妙也又方用降真香為末敷上即愈廣三七末敷之亦效
