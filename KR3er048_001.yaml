body:
  text: 卷一醫中百誤歌醫中之誤有百端漫説肘後盡金丹先將醫誤從頭數指點分明見一斑醫家誤辨證難三因分症似三山內因外因不內外因此名三因三山別出千條脈病有根源仔細看治病必求其本須從起根處看明醫家誤脈不真浮沉遲數不分清卻到分清渾又變如熱極脈澀細寒極反鼓指之類胸中了了指難明扁鵲云持脈之道如臨深淵而望浮雲胸中了了指下難明醫家誤失時宜寒熱溫涼要相時時中消息團團轉惟在沉潛觀化機寒暑相推者時之常寒暑不齊者時之變務在靜觀而自得之正非五運六氣所能拘也醫家誤不明經十二經中好問因經中不辨循環理管教陽證入三陰六淫之邪善治三陽則無傳陰之患醫家誤藥不中攻補寒溫不對證實實虛虛誤非輕舉手須知嚴且慎用藥相反厥禍最大醫家誤伐無過伐無過謂攻伐無病處也藥有專司切莫錯引經報使本殊途投劑差訛事輒復藥味雖不相反而舉用非其經猶為未合如芩連知柏同一苦寒薑桂椒萸同一辛熱用各有當況其他乎醫家誤藥不稱重病藥輕輕反重輕重不均皆誤人此道微乎危亦甚藥雖對症而輕重之間與病不相稱猶難驟效醫家誤藥過劑療寒未已熱又至療熱未已寒更生勸君舉筆須留意藥雖與病相稱而用之過當則仍不稱矣可見醫貴三折肱也醫家誤失標本緩急得宜方是穩先病為本後為標纖悉幾微要中肯病症錯亂當分標本相其緩急而施治法醫家誤舍正路治病不識求其屬壯水益火究根源太僕之言須誦讀王太僕云熱之不熱是無火也寒之不寒是無水也無水者壯水之主以制陽光無火者益火之源以消陰翳此謂求其屬也醫家誤昧陰陽陰陽極處沒抓拿亢則害兮承乃制靈蘭祕旨最神良亢則害其物承乃制其極此五行四時迭相為制之理醫家誤昧寒熱顯然寒熱易分別寒中有熱熱中寒須得長沙真祕訣長沙用藥寒因熱用熱因寒用或先寒後熱或先熱後寒或寒熱並舉精妙入神良法具在熟讀精思自然會通然時移世易讀仲景書按仲景法不必拘泥仲景方而通變用藥尤為得當醫家誤昧虛實顯然虛實何難治虛中有實實中虛用藥東垣有次第脾胃論內外傷辨補中枳朮等方開萬世無窮之利醫家誤藥姑息症屬外邪須克治痞滿燥實病堅牢茶果湯丸何所濟醫家誤藥輕試攻病不知顧元氣病若祛時元氣傷似此何勞君算計輕劑誤事峻劑僨事二者交譏醫家誤不知幾脈動症變只幾希病在未形先著力明察秋毫乃得之病至思治末也見微知著彌患於未萌是為上工醫家誤鮮定見見理真時莫改變恍似乘舟破浪濤把舵良工卻不眩病輕藥應易也定見定守歷險阻而不移起人於垂危之際足徵學識醫家誤強識病病不識時莫強認謙躬退位讓賢能務俾他人全性命不知為不知亦良醫也醫家誤在刀針針有時宜並淺深膿熟不針則內潰未熟早針則氣泄不成膿膿淺針深則傷好肉膿深針淺則毒不出而內敗百毒總應先艾灸隔蒜灸法勝於刀針外科正宗云不痛灸至痛痛灸不疼時頭面之上用神燈頭面不宜灸宜用神燈照法外科正宗云內服蟾蜍丸一服外將神火照三枝此法不止施於頭面而頭面為更要醫家誤薄愚蒙先王矜恤是孤窮病篤必施真救濟好生之念合蒼穹當盡心力施良藥以濟之醫家誤不克己見人開口便不喜豈知芻蕘有一能何況同人説道理醫家誤未已病者誤方興與君還細數請君為我聽病家誤早失計初時抱恙不介意人日虛兮病日增縱有良工也費氣病須早治病家誤不直説諱疾試醫工與拙所傷所作只君知縱有名家猜不出大蘇云我有疾必盡告醫者然後診脈雖中醫亦可治療我但求愈疾耳豈以困醫為事哉病家誤性躁急病有回機藥須吃藥既相宜病自除朝夕更醫也不必既效不可屢更病家誤不相勢病勢沉沉急變計若再蹉跎時日深恐怕回春無妙劑不效則當速更病家誤在服藥服藥之中有竅妙或冷或熱要分明食後食前皆有道病家誤最善怒氣逆沖胸仍不悟豈知肝木克脾元願君養性須回護病家誤苦憂思憂思抑鬱欲何之常將不如己者比知得雄來且守雌病家誤好多言多言傷氣最難痊勸君默口存神坐好將真氣養真元病家誤染風寒風寒散去又復還譬如城郭未完固那堪盜賊更摧殘病家誤不戒口口腹傷人處處有食飲相宜中氣和鼓腹舍哺天地久病家誤不戒慎閨房衽席不知命命有顛危可若何願將好色人為鏡病家誤救絶氣病人昏眩時以手閉口而救之也救氣閉口莫閉鼻若連鼻子一齊捫譬如入井復下石鼻主呼吸閉緊則呼吸絶世人多蹈此弊故切言之兩者有誤誤未歇又恐旁人誤重迭還須屈指與君陳好把旁人觀一切傍人誤代驚惶不知理路亂忙忙用藥之時偏作主平時可是學岐黃旁人誤引邪路妄把師巫當仙佛有病之家易著魔到底昏迷永不悟更有大誤藥中尋與君細説好留神藥中誤藥不真藥材真致力方深有名無實何能效徒使醫家枉用心郡邑大鎮易於覓藥若荒僻處須加細辨藥中誤失炮製炮製不工非善劑市中之藥未蒸炒勸君審度才堪試洗炙蒸煮去心皮殼油尖一一皆不可苟藥中誤醜人參或用粗枝枯小參蒸過取湯兼灌錫方中用下卻無功參以原枝幹結為美蒸過取湯則參無寶色錫條可當人參否藥中誤稱不均賤藥多兮貴藥輕君臣佐使交相失僨事由來最惱人仍有藥中誤好向水中尋勸君煎藥務得人煎藥誤水不潔油湯入藥必嘔噦曰入聲嘔噦之時病轉增任是名醫審不決煎藥誤水頻添藥爐沸起又加些氣輕力減何能效枉怪醫家主見偏此係醫中百種誤説與君家記得熟記得熟時病易瘳與君共享大春秋保生四要一曰節飲食人身之貴父母遺體食飲非宜疾病蜂起外邪乘此纏綿靡己浸淫經絡凝塞腠理變症百端不可勝紀唯有縱酒厥禍尤烈酒毒上攻虛炎灼肺變為陰虛只緣酷醉虛羸之體全賴脾胃莫嗜膏粱淡食為最口腹無譏真真可貴二曰慎風寒人身之中曰榮與衛寒則傷榮風則傷衛百病之長以風為最七十二候傷寒傳變賊風偏枯歪斜痿痹寒邪相乘經絡難明初在三陽次及三陰更有中寒肢冷如冰急施溫補乃可回春君子持躬戰戰兢兢方其汗浴切莫當風四時俱謹尤慎三冬非徒衣厚惟在藏精三曰惜精神人之有生惟精與神精神不敝四體長春嗟彼昧者不愛其身多言損氣喜事勞心或因名利朝夕熱中神出於舍舍則已空兩腎之中名曰命門陰陽相抱互為其根根本無虧可以長生午未兩月金水俱傷隔房獨宿體質輕強亥子丑月陽氣潛藏君子固密以養微陽金石熱藥切不可嘗積精全神壽考彌長四曰戒嗔怒東方木位其名曰肝肝氣未平虛火發焉諸風內動火性上炎無恚無嗔涵養心田心田寧靜天君泰然善動肝氣多至嘔血血積於中漸次發咳凡人舉事務期有得偶爾失意省躬自克戒爾嗔怒變化氣質和氣迎人其儀不忒治陰虛無上妙方天一生水命曰真陰真陰虧則不能制火以致心火炎上而克肺金於是發熱咳嗽吐痰諸症生焉蓋發熱者陽爍陰也咳嗽者火刑金也吐痰者腎水虛泛而為痰如鍋中之水熱甚則騰沸也當此時勢豈徒區區草木之功所能濟哉必須取華池之水頻頻吞咽以靜治於無形然後以湯丸佐之庶幾水升火降而成天地交泰之象耳主方在吞津液華池之水人身之金液也敷布五臟灑陳六腑然後注之於腎而為精腎中陰虧則真水上泛而為痰將並華池之水一擁俱出痰愈多而肌愈瘦病誠可畏今立一法二六時中常以舌抵上齶令華池之水充滿口中乃正體舒氣以意目力送至丹田口復一口數十乃止此所謂以真水補真陰同氣相求必然之理也每見今之治虛者專主六味地黃等藥以為滋陰壯水之法未為不善而獨不於本原之水取其點滴以自相灌溉是舍真求假不得為保生十全之計此豫所以諄諄而為是言也衛生君子尚明聽之哉人參果昔者純陽呂祖師出賣人參果一紋一枚專治五勞七傷諸虛百損並能御外邪消飲食輕身不老卻病延年真神丹妙藥也市人聞之環聚爭買者千餘人祖師大喝曰此果人人皆有但汝等不肯服食耳衆方醒悟今之患虛者衆矣或歸怨貧乏而無力服參或歸怨醫家不早為用參或歸怨醫家不應早用參或歸怨用參之太多或歸怨用參之太少或歸怨用參而不用桂附以為佐或歸怨用參而不用耆術以為援或歸怨用參而不用二地二冬以為制議論風生全不反躬自省以致屢效屢復難收全功不佞身肩是任寧敢造次博稽古訓百法追尋每見歷代良醫治法不過若此於是睜開目力取來參果一車普送虛人服食凡病危而復安者不論有參無參皆其肯服參果者也凡病愈而復發者不論有參無參皆其不服參果者也世人請自思維定知此中消息惟願患者各懷其寶必然服藥有功住世永年無負我祖師垂救之至意是懇是禱以上數篇發明醫中之誤細詳調攝之方蓋弭患於未萌治未病之意也後此皆言治法醫有徹始徹終之理或問曰醫道至繁何以得其要領而執簡以馭繁也余曰病不在人身之外而在人身之中子試靜坐內觀從頭面推想自胸至足從足跟推想自背至頭從皮肉推想內至筋骨臟腑則全書之目録在其中矣凡病之來不過內傷外感與不內外傷三者而己內傷者氣病血病傷食以及喜怒憂思悲恐驚是也外感者風寒暑濕燥火是也不內外傷者跌打損傷五絶之類是也病有三因不外此矣至於變症百端不過寒熱虛實表里陰陽八字盡之則變而不變矣論治法不過七方與十劑七方者大小緩急奇偶復十劑者宣通補瀉輕重滑澀燥濕也精乎此則投治得宜矣又外感之邪自外而入宜瀉不宜補內傷之邪自內而出宜補不宜瀉然而瀉之中有補補之中有瀉此皆治法之權衡也又有似症如火似水水似火金似木木似金虛似實實似虛不可以不辨明乎此則病無遁情矣學者讀書之餘閉目凝神時刻將此數語細加領會自應一旦豁然融會貫通徹始徹終了無疑義以之司命奚愧焉內傷外感致病十九字人身之病不離乎內傷外感而內傷外感中只一十九字盡之矣如風寒暑濕燥火外感也喜怒憂思悲恐驚與夫陽虛陰虛傷食內傷也總計之共一十九字而千變萬化之病於以出焉然病即變化而總不離乎一十九字一十九字總之一內傷外感而已所謂知其要者一言而終不知其要流散無窮此道中必須提綱挈領然後拯救有方也火字解從來火字內經有壯火少火之名後人則曰天火人火君火相火龍火雷火種種不一而朱丹溪復以虛實二字括之可謂善言火矣乃人人宗其説而於治火卒無定見何也是殆辨之猶未確歟豫因易數字以解之夫實火者六淫之邪飲食之傷自外而入勢猶賊也虛火者七情色欲勞役耗神自內而發勢猶子也賊至則驅之如消散清涼攻伐等藥皆可按法取用蓋刀槍劍戟原為驅賊設也子逆則安之如補氣滋水理脾等藥皆可按法施治蓋飲食器用原為養子設也夫子者奉身之本也若以驅賊者驅其子則無以為養身生命之本矣人固不可認賊作子更不可認子作賊病機一十九條言火者十之八言寒者十之二若不明辨精切恐後學卒至模糊余故反復詳言以立施治之法外火風寒暑濕燥火及傷熱飲食賊火也賊可驅而不可留內火七情色欲勞役耗神子火也子可養而不可害驅賊火有四法一曰發風寒擁閉火邪內郁宜升發之如升陽散火湯之類是也二曰清內熱極盛宜用寒涼如黃連解毒湯之類是也三曰攻火氣鬱結大便不通法當攻下此釜底抽薪之法如承氣湯之類是也四曰制熱氣拂鬱清之不去攻之不可此本來真水有虧不能制火所謂寒之不寒是無水也當滋其腎如地黃湯之類可用也養子火有四法一曰達肝經氣結五郁相因當順其性而升之所謂木鬱則達之如逍遙散之類是也此以一方治木鬱而諸郁皆解也二曰滋虛火上炎必滋其水所謂壯水之主以鎮陽光如六味湯之類是也三曰溫勞役神疲元氣受傷陰火乘其土位經曰勞者溫之又曰甘溫能除大熱如補中益氣之類是也四曰引腎氣虛寒逼其無根失守之火浮遊於上當以辛熱雜於壯水藥中導之下行所謂導龍入海引火歸元如八味湯之類是也以上治火法中賊則宜攻子則宜養固已然邪盛正虛之時而用攻補兼行之法或滋水制火之法往往取效是知養子之法可借為驅賊之方斷無以驅賊之法而為養子之理蓋養正則邪自除理之所有伐正而能保身理之所無也世人妄用溫補以養賊者固多而恣行攻伐以驅子者更復不少此皆不得火字真詮而貽禍斯民也可不慎歟脈法金針脈有要訣胃神根三字而已人與天地相參脈必應乎四時而四時之中均以胃氣為本如春弦夏洪秋毛冬石而其中必兼有和緩悠揚之意乃為胃氣謂之平人若弦多胃少曰肝病洪多胃少曰心病毛多胃少曰肺病石多胃少曰腎病如但見弦洪毛石而胃氣全無者則危矣夫天有四時而弦洪毛石四脈應之四時之中土旺各十八日而緩脈應之共成五脈五臟分主之如肝應春其脈弦心應夏其脈洪肺應秋其脈毛冬應腎其脈石脾土應長夏其脈緩也然而心肝脾肺腎雖各主一脈而和緩之象必寓乎其中乃為平脈否則即為病脈若但見弦洪毛石而胃氣全無者即為真象脈見矣凡診脈之要有胃氣曰生胃氣少曰病胃氣盡曰不治乃一定之診法自古良工莫能易也夫胃氣全虧則大可危胃氣稍乖猶為可治即當於中候求其神氣中候者浮中沉之中也如六數七極熱也中候有力則有神矣三遲二敗寒也中候有力則有神矣脈中有神則清之而熱即退溫之而寒即除若寒熱偏勝中候不復有神清溫之劑將何所恃耶雖然神氣不足猶當察其根氣根氣者沉候應指是也三部九候以沉分為根而兩尺又為根中之根也脈訣云寸關雖無尺猶未絶如此之流何憂殞滅歷試之洵非虛語夫人之有脈如樹之有根枝葉雖枯根蒂未壞則生意不息是以診脈之法必求其根以為斷而總其要領實不出胃神根三者而已如或胃神根三者稍有差忒則病脈斯見其偏於陽則浮芤滑實洪數長大緊革牢動疾促以應之其偏於陰則沉遲虛細微澀短小弦濡伏弱結代散以應之惟有緩脈一息四至號曰平和不得斷為病脈耳其他二十九字皆為病脈必細察其形象而知其所主病其曰浮不沉也主病在表沉不浮也主病在裡遲一息三至也為寒數一息五至也為熱滑往來流利也為痰為飲澀往來滯澀也為血少氣凝虛不實也為勞倦實不虛也為邪實洪大而有力也為積熱大虛而無力也為體弱微細而隱也小細而顯也為氣少弦端直之象也為水飲長過乎本位也為氣旺短不及本位也為氣少緊如引繩轉索也為寒為痛弱微細之甚也為氣血兩虧濡沉而細也為真火不足動如豆粒動搖之象也為氣血不續伏脈不出也為寒氣凝結又或因痛極而致促數時一止也為熱盛結緩時一止也為寒盛芤邊有中無也為失血代動而中止有至數也亦為氣血不續又為跌打悶亂以及有娠數月之兆革浮而堅急也為精血少牢沉而堅硬也為胃氣不足疾數之甚也為極熱散渙而不聚也為衛氣散漫惟有緩者和之至也為無病其所主病大略如此如或數脈相參而互見則合而斷之以知其病至於脈有真假有隱伏有反關有怪脈均宜一一推求不可混淆何謂真假如熱證脈澀細寒證反鼓指之類何謂隱伏如中寒腹痛脈不出又外感風寒將有正汗亦脈不出書云一手無脈曰單伏兩手無脈曰雙伏何謂反關正取無脈反在關骨之上或見於左或見於右診法不可造次何謂怪脈兩手之脈如出兩人或乍大乍小遲數不等此為祟症又有老少之脈不同地土方宜不同人之長短肥瘦不同診法隨時而斟酌然而脈證相應者常也脈證不相應者變也知其常而通其變診家之要庶不相遠矣然總其要領總不出胃神根三字三字無虧則為平人若一字乖違則病見矣若一字全失則危殆矣必須胃神根三者俱得乃為指下禎祥之兆此乃診家之大法偶為筆之於書以備參考寒熱虛實表裡陰陽辨病有總要寒熱虛實表里陰陽八字而已病情既不外此則辨證之法亦不出此一病之寒熱全在口渴與不渴渴而消水與不消水飲食喜熱與喜冷煩躁與厥逆溺之長短赤白便之溏結脈之遲數以分之假如口渴而能消水喜冷飲食煩躁溺短赤便結脈數此熱也假如口不渴或假渴而不能消水喜飲熱湯手足厥冷溺清長便溏脈遲此寒也一病之虛實全在有汗與無汗胸腹脹痛與否脹之減與不減痛之拒按與喜按病之新久稟之厚薄脈之虛實以分之假如病中無汗腹脹不減痛而拒按病新得人稟厚脈實有力此實也假如病中多汗腹脹時減復如故痛而喜按按之則痛止病久稟弱脈虛無力此虛也一病之表裡全在發熱與潮熱惡寒與惡熱頭痛與腹痛鼻塞與口燥舌苔之有無脈之浮沉以分之假如發熱惡寒頭痛鼻塞舌上無胎脈息浮此表也假如潮熱惡熱腹痛口燥舌苔黃黑脈息沉此里也至於病之陰陽統上六字而言所包者廣熱者為陽實者為陽在表者為陽寒者為陰虛者為陰在裡者為陰寒邪客表陽中之陰熱邪入里陰中之陽寒邪入里陰中之陰熱邪達表陽中之陽而真陰真陽之別則又不同假如脈數無力虛火時炎口燥唇焦內熱便結氣逆上衝此真陰不足也假如脈大無力四肢倦怠唇淡口和肌冷便溏飲食不化此真陽不足也寒熱虛實表里陰陽之別總不外此然病中有熱證而喜熱飲者同氣相求也有寒證而喜冷飲卻不能飲者假渴之象也有熱證而大便溏瀉者挾熱下利也有寒證而大便反硬者名曰陰結也有熱證而手足厥冷者所謂熱深厥亦深熱微厥亦微是也有寒證而反煩躁欲坐臥泥水之中者名曰陰躁也有有汗而為實證者熱邪傳裡也有無汗而為虛證者津液不足也有惡寒而為里證者直中於寒也有惡熱口渴而為表證者溫熱之病自里達表也此乃陰陽變化之理為治病之權衡尤辨之不可不早也醫門八法論病之原以內傷外感四字括之論病之情則以寒熱虛實表里陰陽八字統之而論治病之方則又以汗和下消吐清溫補八法盡之蓋一法之中八法備焉八法之中百法備焉病變雖多而法歸於一此豫數十年來心領神會歷試而不謬者盡見於八篇中矣學者誠熟讀而精思之於以救濟蒼生亦未必無小補云論汗法汗者散也經云邪在皮毛者汗而發之是也又云體若燔炭汗出而散是也然有當汗不汗誤人者有不當汗而汗誤人者有當汗不可汗而妄汗之誤人者有當汗不可汗而又不可以不汗汗之不得其道以誤人者有當汗而汗之不中其經不辨其藥知發而不知斂以誤人者是不可以不審也何則風寒初客於人也頭痛發熱而惡寒鼻塞聲重而體痛此皮毛受病法當汗之若失時不汗或汗不如法以致腠理閉塞榮衛不通病邪深入流傳經絡者有之此當汗不汗之過也亦有頭痛發熱與傷寒同而其人倦怠無力鼻不塞聲不重脈來虛弱此內傷元氣不足之證又有勞心好色真陰虧損內熱晡熱脈細數而無力者又有傷食病胸膈滿悶吞酸噯腐日晡潮熱氣口脈緊者又有寒痰厥逆濕淫腳氣內癰外癰瘀血凝積以及風溫濕溫中暑自汗諸症皆有寒熱與外感風寒似同而實異若誤汗之變症百出矣所謂不當汗而汗者此也若夫症在外感應汗之例而其人臍之左右上下或有動氣則不可以汗經云動氣在右不可發汗汗則衄而渴心煩飲水即吐動氣在左不可發汗汗則頭眩汗不止筋惕肉瞤動氣在上不可發汗汗則氣上衝正在心中動氣在下不可發汗汗則無汗心大煩骨節疼目運食入則吐舌不得前又脈沉咽燥病已入里汗之則津液越出大便難而譫語又少陰證但厥無汗而強發之則動血未知從何道出或從耳目或從口鼻出者此為下厥上竭為難治又少陰中寒不可發汗汗則厥逆蜷臥不能自溫也又寸脈弱者不可發汗汗則亡陽尺脈弱者不可發汗汗則亡陰也又諸亡血家不可汗汗則直視額上陷淋家不可汗汗則便血瘡家不可汗汗則痙又傷寒病在少陽不可汗汗則譫妄又壞病虛人及女人經水適來者皆不可汗若妄汗之變症百出矣所謂當汗不可汗而妄汗誤人者此也夫病不可汗而又不可以不汗則將聽之乎是有道焉傷寒賦云動氣理中去白朮是即於理中湯去朮而加汗藥保元氣而除病氣也又熱邪入里而表未解者仲景有麻黃石膏之例有葛根黃連黃芩之例是清涼解表法也又太陽證脈沉細少陰證反發熱者有麻黃附子細辛之例是溫中解表法也又少陽中風用柴胡湯加桂枝是和解中兼表法也又陽虛者東垣用補中湯加表藥陰虛者丹溪用芎歸湯加表藥其法精且密矣總而言之凡一切陽虛者皆宜補中發汗一切陰虛者皆宜養陰發汗挾熱者皆宜清涼發汗挾寒者皆宜溫經發汗傷食者則宜消導發汗感重而體實者汗之宜重麻黃湯感輕而體虛者汗之宜輕香蘇散又東南之地不比西北隆冬開花少霜雪人稟常弱腠理空疏凡用汗藥只須對症不必過重豫嘗治傷寒初起專用香蘇散加荊防川芎秦艽蔓荊等藥一劑愈甚則兩服無有不安而麻黃峻劑數十年來不上兩餘可見地土不同用藥迥別其有陰虛陽虛挾寒挾熱兼食而為病者即按前法治之但師古人用藥之意而未嘗盡泥其方隨時隨證酌量處治往往有驗此皆已試之成法而與斯世共白之所以拯災救患者莫切乎此此汗之之道也且三陽之病淺深不同治有次第假如症在太陽而發散陽明已隔一層病在太陽陽明而和解少陽則引賊入門矣假如病在二經而專治一經已遺一經病在三經而偏治一經即遺二經矣假如病在一經而兼治二經或兼治三經則邪過經矣況太陽無汗麻黃為最太陽有汗桂枝可先葛根專主陽明柴胡專主少陽皆的當不易之藥至於九味羌活乃兩感熱證三陽三陰並治之法初非為太陽一經設也又柴葛解肌湯乃治春溫夏熱之證自里達表其症不惡寒而口渴若新感風寒惡寒而口不渴者非所宜也又傷風自汗用桂枝湯傷暑自汗則不可用若誤用之熱邪愈盛而病必增劇若於暑症而妄行發散復傷津液名曰重暍多致不救古人設為白朮防風例以治風設益元散香薷飲以治暑俾不犯三陽禁忌者良有以也又人知發汗退熱之法而不知斂汗退熱之法汗不出則散之汗出多則斂之斂也者非五味酸棗之謂其謂致病有因出汗有由治得其宜汗自斂耳譬如風傷衛汗自出者以桂枝湯和榮衛祛風邪而汗自止若熱邪傳裡令人汗出者乃熱氣熏蒸如釜中吹煮水氣旁流非虛也急用白虎湯清之若邪已結聚不大便者則用承氣湯下之熱氣退而汗自收矣此與傷暑自汗略同但暑傷氣為虛邪只有清補並行之一法寒傷形為實邪則清熱之外更有攻下止汗之法也復有發散太過遂至汗多亡陽身瞤動欲劈地者宜用真武湯此救逆之良藥與中寒冷汗自出者同類並稱又與熱證汗出者大相徑庭矣其他少陽證頭微汗或盜汗者小柴胡湯水氣症頭汗出者小半夏加茯苓湯至於虛人自汗盜汗等症則歸脾補中八珍十全按法而用委曲尋繹各盡其妙而後即安所謂汗之必中其經必得其藥知發而知斂者此也嗟嗟百病起於風寒風寒必先客表汗得其法何病不除汗法一差夭枉隨之矣籲汗豈易言哉論和法傷寒在表者可汗在裡者可下其在半表半裡者惟有和之一法焉仲景用小柴胡湯加減是已然有當和不和誤人者有不當和而和以誤人者有當和而和而不知寒熱之多寡稟質之虛實臟腑之燥濕邪氣之兼併以誤人者是不可不辨也夫病當耳聾脅痛寒熱往來之際應用柴胡湯和解之而或以麻黃桂枝發表誤矣或以大黃芒硝攻裡則尤誤矣又或因其胸滿脅痛而吐之則亦誤矣蓋病在少陽有三禁焉汗吐下是也且非惟汗吐下有所當禁即舍此三法而妄用他藥均為無益而反有害古人有言少陽膽為清淨之府無出入之路只有和解一法柴胡一方最為切當何其所見明確而立法精微亦至此乎此所謂當和而和者也然亦有不當和而和者如病邪在表未入少陽誤用柴胡謂之引賊入門輕則為瘧重則傳入心胞漸變神昏不語之候亦有邪已入里燥渴譫語諸症叢集而醫者僅以柴胡湯治之則病不解至於內傷勞倦內傷飲食氣虛血虛癰腫瘀血諸證皆令寒熱往來似瘧非瘧均非柴胡湯所能去者若不辨明證候切實用藥而藉此平穩之法巧為藏拙誤人非淺所謂不當和而和者此也然亦有當和而和而不知寒熱之多寡者何也夫傷寒之邪在表為寒在裡為熱在半表半裡則為寒熱交界之所然有偏於表者則寒多偏於里者則熱多而用藥須與之相稱庶陰陽和平而邪氣頓解否則寒多而益其寒熱多而助其熱藥既不平病益增劇此非不和也和之而不得寒熱多寡之宜者也然又有當和而和而不知稟質之虛實者何也夫客邪在表譬如賊甫入門豈敢遽登吾堂而入吾室必窺其堂奧空虛乃乘隙而進是以小柴胡用人參者所以補正氣使正氣旺則邪無所容自然得汗而解蓋由是門入復由是門出也亦有表邪失汗腠理致密賊無出路由此而傳入少陽熱氣漸盛此不關本氣之虛故有不用人參而和解自愈者是知病有虛實法在變通不可誤也然又有當和而和而不知臟腑之燥濕者何也如病在少陽而口不渴大便如常是津液未傷清潤之藥不宜太過而半夏生薑皆可用也若口大渴大便漸結是邪氣將入於陰津液漸少則辛燥之藥可除而花粉栝蔞有必用矣所謂臟腑有燥濕之不同者此也然又有當和而和而不知邪之兼併者何也假如邪在少陽而太陽陽明證未罷是少陽兼表邪也小柴胡中須加表藥仲景有柴胡加桂枝之例矣又如邪在少陽而兼裡熱則便閉譫語燥渴之症生小柴胡中須兼里藥仲景有柴胡加芒硝之例矣又三陽合病合目則汗面垢譫語遺尿者用白虎湯和解之蓋三陽同病必連胃腑故以辛涼之藥內清本腑外徹肌膚令三經之邪一同解散是又專以清劑為和矣所謂邪有兼併者此也由是推之有清而和者有溫而和者有消而和者有補而和者有燥而和者有潤而和者有兼表而和者有兼攻而和者和之義則一而和之法變化無窮焉知斯意者則溫熱之治瘟疫之方時行痎瘧皆從此推廣之不難應手而愈矣世人漫曰和解而不能盡其和之法將有增氣助邪而益其爭堅其病者和云乎哉論下法下者攻也攻其邪也病在表則汗之在半表半裡則和之病在裡則下之而已然有當下不下誤人者有不當下而下誤人者有當下不可下而妄下之誤人者有當下不可下而又不可以不下下之不得其法以誤人者有當下而下之不知淺深不分便溺與蓄血不論湯丸以誤人者又雜症中不別寒熱積滯痰水蟲血癰膿以誤人者是不可不察也何謂當下不下仲景云少陰病得之二三日口燥咽乾者急下之少陰病六七日腹滿不大便者急下之下利脈滑數不欲食按之心下硬者有宿食也急下之陽明病譫語不能食胃中有燥屎也可下之陽明病發熱汗多者急下之少陰病下利清水色純青心下必痛口乾燥者急下之傷寒六七日目中不了了睛不和無表證大便難者急下之此皆在當下之例若失時不下則津液枯竭身如稿木勢難挽回矣然又有不當下而下者何也如傷寒表證未罷病在陽也下之則成結胸病邪雖已入里而散漫於三陰經絡之間尚未結實若遽下之亦成痞氣況有陰結之症大便反硬得溫則行如開冰解凍之象又雜症中有高年血燥不行者有新産血枯不行者有病後亡津液者有亡血者有日久不更衣腹無所苦別無他症者若誤下之變症蜂起矣所謂不當下而下者此也然又有當下不可下者何也病有熱邪傳裡已成可下之證而其人臍之上下左右或有動氣則不可以下經云動氣在右不可下下之則津液內竭咽燥鼻乾頭眩心悸也動氣在左不可下下之則腹內拘急食不下動氣更劇雖有身熱臥則欲蜷動氣在上不可下下之則掌握煩熱身浮汗泄欲得水自灌動氣在下不可下下之則腹滿頭眩食則清穀心下痞也又咽中閉塞者不可下下之則下輕上重水漿不入蜷臥身疼下利日數十行又脈微弱者不可下脈浮大按之無力者不可下脈遲者不可下喘而胸滿者不可下欲吐欲嘔者不可下病人陽氣素微者不可下下之則厄病人平素胃弱不能食者不可下病中能食胃無燥屎也不可下小便清者不可下病人腹滿時減復如故者不可下若誤下之變症百出矣所謂當下不可下而妄下誤人者此也然有當下不可下而又不得不下者何也夫以羸弱之人虛細之脈一旦而熱邪乘之是為正虛邪盛最難措手古人有清法焉有潤法焉有導法焉有少少微和之法焉有先補後攻先攻後補之法焉有攻補並行之法焉不可不講也如三黃解毒清之也麻仁梨汁潤之也蜜煎豬膽汁土瓜根導之也涼膈散大柴胡少少和之也更有脈虛體弱不能勝任者則先補之而後攻之或暫攻之而隨補之或以人參湯送下三黃枳朮丸又或以人參栝蔞枳實攻補並行而不相悖蓋峻劑一投即以參朮歸芍維持調護於其中俾邪氣潛消而正氣安固不愧為王者之師矣又有雜症中大便不通其用藥之法可相參者如老人久病人新産婦人每多大便閉結之症丹溪用四物湯東垣用通幽湯豫嘗合而酌之而加以蓯蓉枸杞柏子仁芝麻松子仁人乳梨汁蜂蜜之類隨手取效又嘗於四物加升麻及前滋潤藥治老人血枯數至圊而不能便者往往有驗此皆委曲疏通之法若果人虛雖傳經熱邪不妨借用寧得猛然一往敗壞真元至成洞瀉雖曰天命豈非人事哉所謂下之貴得其法者此也然又有當下而下而不知淺深不分便溺與蓄血不論湯丸以誤人者何也如仲景大承氣湯必痞滿燥實兼全者乃可用之若僅痞滿而未燥實者仲景只用瀉心湯痞滿兼燥而未實者仲景只用小承氣湯除去芒硝恐傷下焦陰血也燥實在下而痞滿輕者仲景只用調胃承氣湯除去枳朴恐傷上焦陽氣也又有太陽傷風證誤下而傳太陰以致腹痛者則用桂枝湯加芍藥大實痛者桂枝湯加大黃是解表之中兼攻裡也又有邪從少陽來寒熱未除則用大柴胡湯是和解之中兼攻裡也又結胸證項背強從胸至腹硬滿而痛手不可近者仲景用大陷胸湯丸若不按不痛者只用小陷胸湯若寒食結胸用三白散熱藥攻之又水結胸頭出汗者用小半夏加茯苓湯水停脅下痛不可忍者則用十棗湯凡結胸陰陽二症服藥罔效活人俱用枳實理中丸應手而愈又河間三書云鬱熱蓄甚神昏厥逆脈反滯澀有微細欲絶之象世俗未明造化之理投以溫藥則不可救或者妄行攻下致殘陰暴絶勢大可危不下亦危宜用涼膈散合解毒湯養陰退陽積熱藉以宣散則心胸和暢而脈漸以生此皆用藥淺深之次第也又如太陽症未罷口渴小便短澀大便如常此為溺澀不通之證治用五苓散又太陽傳本熱結膀胱其人如狂少腹硬滿而痛小便自利者此為蓄血下焦宜抵當湯丸若蓄血輕微但少腹急結未至硬滿者則用桃核承氣湯或用生地四物湯加酒洗大黃各半下之尤為穩當蓋溺澀證大便如常燥糞證小便不利蓄血證小便自利大便色黑也此便溺蓄血之所由分也血結膀胱病勢最急則用抵當湯稍輕者抵當丸結胸惡證悉具則用大陷胸湯稍輕者大陷胸丸其他蕩滌腸胃推陳致新之法則皆用湯古人有言凡用下藥攻邪氣湯劑勝丸散誠以熱淫於內用湯液滌除之為清淨耳此湯丸之別也然又有雜症中不別寒熱積滯痰水蟲血癰膿以誤人者何也東垣治傷食證腹痛便閉拒按者因於冷食用見睍丸因於熱食用三黃枳朮丸若冷熱互傷則以二丸酌其所食之多寡而互用之應手取效又實熱老痰滾痰丸水腫實證神佑丸蟲積剪紅丸血積花蕊丹失笑丸腸癰牡丹皮散隨症立方各有攸宜此雜症攻下之良法也近世庸家不講於法每視下藥為畏途病者亦視下藥為砒鴆致令熱症垂危袖手旁觀委之天數大可悲耳昔張子和儒門事親三法即以下法為補謂下去其邪而正氣自復谷肉果菜無往而非補養之物雖其説未合時宜而於治病攻邪之法正未可缺吾願學者仰而思之平心而察之得其要領以施救濟之方將以躋斯民於壽域不難矣論消法消者去其壅也臟腑筋絡肌肉之間本無此物而忽有之必為消散乃得其平經云堅者削之是已然有當消不消誤人者有不當消而消誤人者有當消而消之不得其法以誤人者有消之而不明部分以誤人者有消之而不辨夫積聚之原有氣血積食停痰蓄水癰膿蟲蠱勞瘵與夫痃癖癥瘕七疝胞痹腸覃石瘕以及前後二陰諸疾以誤人者是不可不審也凡人起居有常飲食有節和平恬淡氣血周流穀神充暢病安從來惟夫一有不慎則六淫外侵七情內動飲食停滯邪日留止則諸症生焉法當及時消導俾其速散氣行則愈耳倘遷延日久積氣盤踞堅牢日漸強大有欲拔不能之勢雖有智者亦難為力此當消不消之過也然亦有不當消而消者何也假如氣虛中滿名之曰鼓腹皮膨急中空無物取其形如鼓之狀而因以名之此為敗症必須填實庶乎可消與蠱症之為蟲為血內實而有物者大相徑庭又如脾虛水腫土衰不能制水也非補土不可真陽大虧火衰不能生土者非溫暖命門不可又有脾虛食不消者氣虛不能運化而生痰者腎虛水泛為痰者血枯而經水斷絶者皆非消導所可行而或妄用之誤人多矣所謂不當消而消者此也然又有當消而消之不得其法者何也夫積聚癥瘕之症有初中末之三法焉當其邪氣初客所積未堅則先消之而後和之及其所積日久氣鬱漸深濕熱相生塊因漸大法從中治當祛濕熱之邪削之耎之以底於平但邪氣久客正氣必虛須以補瀉迭相為用如薛立齋用歸脾湯送下蘆薈丸豫亦嘗用五味異功散佐以和中丸皆攻補並行中治之道也若夫塊消及半便從末治不使攻擊但補其氣調其血導達其經脈俾榮衛流通而塊自消矣凡攻病之藥皆損氣血不可過也此消之之法也然又有消之而不明部分者何也心肝脾肺腎分布五方胃大腸小腸膀胱三焦膽與膻中皆附麗有常所而皮毛肌肉筋骨各有淺深凡用湯丸膏散必須按其部分而君臣佐使駕馭有方使不得移則病處當之不至誅伐無過矣此醫門第一義也而於消法為尤要不明乎此而妄行克削則病未消而元氣已消其害可勝言哉況乎積聚之原有氣血食積停痰蓄水癰膿蟲蠱勞瘵與夫痃癖癥瘕七疝胞痹腸覃石瘕以及前後二陰諸疾各各不同若不明辨為害非輕豫因約略而指數之夫積者成於五臟推之不移者也聚者成於六腑推之則移者也其忽聚忽散者氣也痛有定處而不散者血也得食則痛噯腐吞酸者食積也腹有塊按之而耎者痰也先足腫後及腹者水也先腹滿後及四肢者脹也痛引兩脅咳而吐涎者停飲也咳而胸痛吐膿腥臭者肺癰也當胃而痛嘔而吐膿者胃脘癰也當臍而痛小便如淋轉側作水聲者腸癰也憎寒壯熱飲食如常身有痛偏著一處者外癰也病人嗜食甘甜或異物飢時則痛唇之上下有白斑點者蟲也蟲有九濕熱所生而為蛇為鱉則血之所成也胡以知為蛇鱉腹中如有物動而痛不可忍吃血故也又嶺南之地以蠱害人施於飲食他方之蠱多因近池飲冷陰受蛇𧈭之毒也病人咳嗽痰紅抑抑不樂畏見人喉癢而咳劇者勞瘵生蟲也痃如弓弦筋病也癖則隱癖附骨之病也癥則有塊可徵積之類也瘕者或有或無痞氣之類也少腹如湯沃小便澀者胞痹也痛引睪丸疝也女人經水自行而腹塊漸大如懷子者腸覃也經水不行而腹塊漸大並非妊者石瘕也有妊無妊可於脈之滑澀辨之也至於濕熱下墜則為陰菌陰蝕陰挺下脫陰莖腫爛之類而虛火內爍庚金則為痔漏為懸癰為臟毒種種見症不一而足務在明辨證候按法而消之也醫者以一消字視為泛常而不知其變化曲折較他法為尤難則奈何不詳稽博考以盡濟時之仁術也耶論吐法吐者治上焦也胸次之間咽喉之地或有痰食癰膿法當吐之經曰其高者因而越之是已然有當吐不吐誤人者有不當吐而吐以誤人者有當吐不可吐而妄吐之以誤人者亦有當吐不可吐而又不可以不吐吐之不得其法以誤人者是不可不辨也即如纏喉鎖喉諸症皆風痰鬱火壅塞其間不急吐之則脹閉難忍矣又或食停胸膈消化弗及無由轉輸脹滿疼痛者必須吐之否則胸高滿悶變症莫測矣又有停痰蓄飲阻塞清道日久生變或妨礙飲食或頭眩心悸或吞酸噯腐手足麻痹種種不齊宜用吐法導祛其痰諸症如失又有胃脘癰嘔吐膿血者經云嘔家有膿不須治嘔膿儘自愈凡此皆當吐而吐者也然亦有不當吐而吐者何也如少陽中風胸滿而煩此邪氣而非有物不可吐吐則驚悸也又少陰病始得之手足厥冷飲食入口則吐此膈上有寒飲不可吐也病在太陽不可吐吐之則不能食反生內煩雖曰吐中有散然邪氣不除已為小逆也此不當吐而吐者也然又有當吐不可吐者何也蓋凡病用吐必察其病之虛實因人取吐先察其人之性情不可誤也夫病在上焦可吐之症而其人病勢危篤或老弱氣衰者或體質素虛脈息微弱者婦人新産者自吐不止者諸亡血者有動氣者四肢厥冷冷汗自出者皆不可吐吐之則為逆候此因其虛而禁吐也若夫病久之人宿積已深一行吐法心火自降相火必強設犯房勞轉生虛症反難救藥更須戒怒凝神調息靜養越三旬而出戶方為合法若其人性氣剛暴好怒喜淫不守禁忌將何恃以無恐此又因性情而禁吐也所謂當吐不可吐者此也然有不可吐而又不得不吐者何也病人脈滑大胸膈停痰胃脘積食非吐不除食用瓜蒂散與橘紅淡鹽湯痰以二陳湯用指探喉中而出之體質極虛者或以桔梗煎湯代之斯為穩當而豫更有法焉豫嘗治寒痰閉塞厥逆昏沉者用半夏橘紅各八錢濃煎半杯和薑汁成一杯頻頻灌之痰隨藥出則拭之隨灌隨吐隨吐隨灌少頃痰開藥下其人即蘇如此者甚衆又嘗治風邪中臟將脫之證其人張口痰鳴聲如曳鋸溲便自遺者更難任吐而稀涎皂角等藥既不可用亦不暇用因以大劑參附薑夏濃煎灌之藥隨痰出則拭之隨灌隨吐隨吐隨灌久之藥力下咽胸膈流通參附大進立至數兩其人漸蘇一月之間參藥數斤遂至平復如此者又衆又嘗治風痰熱閉之症以牛黃丸灌如前法頸疽內攻藥不得入者以蘇合香丸灌如前法風熱不語者以解語丹灌如前法中暑不醒者以消暑丸灌如前法中惡不醒者以前項橘半薑汁灌如前法魘夢不醒者以蓮鬚蔥白煎酒灌如前法自縊不醒者以肉桂三錢煎水灌如前法喉閉喉風以杜牛膝搗汁雄黃丸等灌如前法俱獲全安如此者又衆更有牙關緊急閉塞不通者以搐鼻散吹鼻取嚏嚏出牙開或痰或食隨吐而出其人遂蘇如此者尤衆蓋因證用藥隨藥取吐不吐之吐其意更深此皆古人之成法而豫稍為變通者也昔仲景治胸痛不能食按之反有涎吐下利日數十行吐之利則止是以吐痰止利也丹溪治妊婦轉脬小便不通用補中益氣湯隨服而探吐之往往有驗是以吐法通小便也華他以醋蒜吐蛇河澗以狗油雄黃同瓜蒂以吐蟲而通膈丹溪又以韭汁去瘀血以治前症由此觀之症在危疑之際古人恆以湧劑盡其神化莫測之用況於顯然易見者乎則甚矣吐法之宜講也近世醫者每將此法置之高閣亦似汗下之外並無吐法以致病中常有自嘔自吐而為順症者見者驚聞者駭醫家亦不論虛實而亟亟止之反成壞病害人多矣籲可不畏哉論清法清者清其熱也臟腑有熱則清之經云熱者寒之是已然有當清不清誤人者有不當清而清誤人者有當清而清之不分內傷外感以誤人者有當清而清之不量其人不量其證以誤人者是不可不察也夫六淫之邪除中寒寒濕外皆不免於病熱熱氣熏蒸或見於口舌唇齒之間或見於口渴便溺之際灼知其熱而不清則斑黃狂亂厥逆吐衄諸症叢生不一而足此當清不清之誤也然又有不當清而清者何也有如勞力辛苦之人中氣大虛發熱倦怠心煩溺赤名曰虛火蓋春生之令不行無陽以護其榮衛與外感熱證相隔霄壤又有陰虛勞瘵之證日晡潮熱與夫産後血虛發熱煩躁證象白虎誤服白虎者難救更有命門火衰浮陽上泛有似於火者又有陰盛隔陽假熱之證其人面赤狂躁欲坐臥泥水中或數日不大便或舌黑而潤或脈反洪大崢崢然鼓擊於指下按之豁然而空者或口渴欲得冷飲而不能下或因下元虛冷頻飲熱湯以自救世俗不識誤投涼藥下咽即危矣此不當清而清之誤也然又有清之而不分內傷外感者何也蓋風寒閉火則散而清之經云火鬱發之是也暑熱傷氣則補而清之東垣清暑益氣湯是也濕熱之火則或散或滲或下而清之開鬼門清淨府除陳莝是也燥熱之火則潤而清之通大便也傷食積熱則消而清之食去火自平也惟夫傷寒傳入胃腑熱勢如蒸自汗口渴飲冷而能消水者借非白虎湯之類鮮克有濟也更有陽盛拒陰之證清藥不入到口隨吐則以薑汁些少為引或薑製黃連反佐以取之所謂寒因熱用是也此外感實火之清法也若夫七情氣結喜怒憂思悲恐驚互相感觸火從內發丹溪治以越鞠丸開六郁也立齋主以逍遙散調肝氣也意以一方治木鬱而諸郁皆解也然經云怒則氣上喜則氣緩悲則氣消恐則氣下驚則氣亂思則氣結逍遙一方以之治氣上氣結者固為相宜而於氣緩氣消氣亂氣下之證恐猶未合蓋氣虛者必補其氣血虛者必滋其血氣旺血充而七情之火悠焉以平至若真陰不足而火上炎者壯水之主以鎮陽光真陽不足而火上炎者引火歸原以導龍入海此內傷虛火之治法也或者曰病因於火而以熱藥治之何也不知外感之火邪火也人火也有形之火後天之火也得水則滅故可以水折內傷之火虛火也龍雷之火也無形之火先天之火也得水則炎故不可以水折譬如龍得水而愈奮飛雷因雨而益震動動陰蒙沉晦之氣光焰燭天必俟云收日出而龍雷各歸其宅耳是以虛火可補而不可瀉也其有專用參耆而不用八味者因其穴宅無寒也其有專用六味而不用桂附者因其穴宅無水也補則同而引之者稍不同耳蓋外感之火以涼為清內傷之火以補為清也然又有清之而不量其人者何也夫以壯實之人而患實熱之病清之稍重尚為無礙若本體素虛臟腑本寒飲食素少腸胃虛滑或産後病後房室之後即有熱證亦宜少少用之寧可不足不使有餘或餘熱未清即以輕藥代之庶幾病去人安倘清劑過多則療熱未已而寒生矣此清之貴量其人也然又有清之不量其證者何也夫以大熱之證而清劑太微則病不除微熱之證而清劑太過則寒證即至但不及猶可再清太過則將醫藥矣且凡病清之而不去者猶有法焉壯水是也王太僕云大熱而甚寒之不寒是無水也當滋其腎腎水者天真之水也取我天真之水以制外邪何邪不服何熱不除而又何必沾沾於寒涼以滋罪戾乎由是觀之外感之火尚當滋水以制之而內傷者更可知矣大抵清火之藥不可久恃必歸本於滋陰滋陰之法又不能開胃扶脾以恢復元氣則參苓耆術亦當酌量而用非曰清後必補但元氣無虧者可以不補元氣有虧必須補之俟其飲食漸進精神爽慧然後止藥可也此清之貴量其證也總而言之有外感之火有內傷之火外感為實內傷為虛來路不同治法迥別寧曰熱者寒之遂足以畢醫家之能事也乎論溫法溫者溫其中也臟受寒侵必須溫劑經云寒者熱之是已然有當溫不溫誤人者即有不當溫而溫以誤人者有當溫而溫之不得其法以誤人者有當溫而溫之不量其人不量其證與其時以誤人者是不可不審也天地殺厲之氣莫甚於傷寒其自表而入者初時即行溫散則病自除若不由表入而直中陰經者名曰中寒其症惡寒厥逆口鼻氣冷或冷汗自出嘔吐瀉利或腹中急痛厥逆無脈下利清穀種種寒證並見法當溫之又或寒濕侵淫四肢拘急發為痛痹亦宜溫散此當溫而溫者也然又有不當溫而溫者何也如傷寒邪熱傳裡口燥咽乾便閉譫語以及斑黃狂亂衄吐便血諸症其不可溫固無論矣若乃病熱已深厥逆漸進舌則乾枯反不知渴又或挾熱下利神昏氣弱或脈來澀滯反不應指色似煙燻形如稿木近之無聲望之似脫甚至血液衰耗筋脈拘攣但唇口齒舌乾燥而不可解者此為真熱假寒之候世俗未明亢害承製之理誤投熱劑下咽即敗矣更有鬱熱內蓄身反惡寒濕熱脹滿皮膚反冷中暑煩心脈虛自汗燥氣焚金痿軟無力者皆不可溫又有陰虛脈細數陽乘陰而吐血者亦不可溫溫之則為逆候此所謂不當溫而溫者也然又有當溫而溫之不得其法者何也假如冬令傷寒則溫而散之冬令傷風則溫而解之寒痰壅閉則溫而開之冷食所傷則溫而消之至若中寒暴痛大便反硬溫藥不止者則以熱劑下之時當暑月而納涼飲冷暴受寒侵者亦當溫之體虛挾寒者溫而補之寒客中焦理中湯溫之寒客下焦四逆湯溫之又有陰盛格陽於外溫藥不效者則以白通湯加人尿豬膽汁反佐以取之經云熱因寒用是已復有真虛挾寒命門火衰者必須補其真陽太僕有言大寒而盛熱之不熱是無火也當補其心此心字指命門而言內經所謂七節之旁中有小心是也書曰益心之陽寒亦通行滋腎之陰熱之猶可是也然而醫家有溫熱之溫有溫存之溫參耆歸術和平之性溫存之溫也春日煦煦是也附子薑桂辛辣之性溫熱之溫也夏日烈烈是也和煦之日人人可近燥烈之日非積雪凝寒開冰解凍不可近也更有表裡皆寒之證始用溫藥裡寒頓除表邪未散復傳經絡以致始為寒中而其後轉變為熱中者容或有之借非斟酌時宜對證投劑是先以溫藥救之者繼以溫藥賊之矣亦有三陰直中初無表邪而溫劑太過遂令寒退熱生初終異轍是不可以不謹所謂溫之貴得其法者此也然又有溫之不量其人者何也夫以氣虛無火之人陽氣素微一旦客寒乘之則溫劑宜重且多服亦可無傷若其人平素火旺不喜辛溫或曾有陰虛失血之症不能用溫者即中新寒溫藥不宜太過病退則止不必盡劑斯為克當其人矣若論其證寒之重者微熱不除寒之輕者過熱則亢且溫之與補有相兼者有不必相兼者虛而且寒則兼用之若寒而不虛即專以溫藥主之丹溪云客寒暴痛兼有積食者可用桂附不可遽用人參蓋溫即是補豫遵其法先用薑桂溫之審其果虛然後以參術輔之是以屢用屢驗無有差忒此溫之貴量其證也若論其時盛夏之月溫劑宜輕時值隆冬溫劑宜重然亦有時當盛暑而得虛寒極重之證曾用參附煎膏而治愈者此舍時從證法也譬如霜降以後禁用白虎然亦有陽明證蒸熱自汗譫語煩躁口渴飲冷者雖當雨雪飄搖之際亦曾用白虎治之而痊安但不宜太過耳此溫之貴量其時而清劑可類推已邇時醫者群尚溫補痛戒寒涼且曰陽為君子陰為小人又曰陽明君子苟有過人必知之誠以知之而即為補救猶可言也不思藥以療病及轉而療藥則病必增劇而成危險之候又況桂枝下咽陽盛則殆承氣入胃陰盛以敗安危之機禍如反掌每多救援弗及之處仁者鑑此顧不痛歟吾願醫者精思審處晰理不差於毫釐用藥悉歸於中正俾偏陰偏陽之藥無往不底於中和斯為善治噫可不勉哉論補法補者補其虛也經曰不能治其虛安問其餘又曰邪之所湊其氣必虛又曰精氣奪則虛又曰虛者補也補之為義大矣哉然有當補不補誤人者有不當補而補誤人者亦有當補而不分氣血不辨寒熱不識開合不知緩急不分五臟不明根本不深求調攝之方以誤人者是不可不講也何謂當補不補夫虛者損之漸損者虛之積也初時不覺久則病成假如陽虛不補則氣日消陰虛不補則血日耗消且耗焉則天真榮衛之氣漸絶而虧損成矣雖欲補之將何及矣又有大虛之證內實不足外似有餘脈浮大而澀面赤火炎身浮頭眩煩躁不寧此為出汗暈脫之機更有精神浮散徹夜不寐者其禍尤速法當養榮歸脾輩加斂藥以收攝元神俾浮散之氣退藏於密庶幾可救復有陰虛火亢氣逆上衝不得眠者法當滋水以制之切忌苦寒瀉火之藥反傷真氣若誤清之去生遠矣古人有言至虛有盛候反瀉含冤者此也此當補不補之誤也然亦有不當補而補者何也病有脈實證實不能任補者固無論矣即其人本體素虛而客邪初至病勢方張若驟補之未免閉門留寇更有大實之症積熱在中脈反細澀神昏體倦甚至憎寒振栗欲著復衣酷肖虛寒之象而其人必有唇焦口燥便閉溺赤諸症與真虛者相隔天淵倘不明辨精切誤投補劑陋矣古人有言大實有羸狀誤補益疾者此也此不當補而補之之誤也然亦有當補而補之不分氣血不辨寒熱者何也經曰氣主煦之血主濡之氣用四君子湯凡一切補氣藥皆從此出也血用四物湯凡一切補血藥皆從此出也然而少火者生氣之原丹田者出氣之海補氣而不補火者非也不思少火生氣而壯火即食氣譬如傷暑之人四肢無力濕熱成痿不能舉動者火傷氣也人知補火可以益氣而不知清火亦所以益氣補則同而寒熱不同也又如血熱之症宜補血行血以清之血寒之症宜溫經養血以和之立齋治法血熱而吐者謂之陽乘陰熱迫血而妄行也治用四生丸六味湯血寒而吐者謂之陰乘陽如天寒地凍水凝成冰也治用理中湯加當歸醫家常須識此勿令誤也更有去血過多成升斗者無分寒熱皆當補益所謂血脫者益其氣乃陽生陰長之至理蓋有形之血不能速生無形之氣所當急固以無形生有形先天造化本如是耳此氣血寒熱之分也然又有補之而不識開合不知緩急者何也天地之理有合必有開用藥之機有補必有瀉如補中湯用參耆必用陳皮以開之六味湯用熟地即用澤瀉以導之古人用藥補正必兼瀉邪邪去則補自得力又況虛中挾邪正當開其一面戢我人民攻彼賊寇或縱或擒有收有放庶幾賊退民安而國本堅固更須酌其邪正之強弱而用藥多寡得宜方為合法是以古方中有補散並行者參蘇飲益氣湯是也有消補並行者枳朮丸理中丸是也有攻補並行者瀉心湯硝石丸是也有溫補並行者治中湯參附湯是也有清補並行者參連飲人參白虎湯是也更有當峻補者有當緩補者有當平補者如極虛之人垂危之病非大劑湯液不能挽回豫嘗用參附煎膏日服數兩而救陽微將脫之證又嘗用參麥煎膏服至數兩而救津液將枯之證亦有無力服參而以耆術代之者隨時處治往往有功至於病邪未盡元氣雖虛不任重補則從容和緩以補之相其機宜循序漸進脈症相安漸為減藥穀肉果菜食養盡之以底於平康其有體質素虛別無大寒大熱之證欲服丸散以葆真元者則用平和之藥調理氣血不敢妄使偏僻之方久而爭勝反有傷也此開合緩急之意也然又有補之而不分五臟者何也夫五臟有正補之法有相生而補之之法難經曰損其肺者益其氣損其心者和其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精此正補也又如肺虛者補脾土生金也脾虛者補命門火生土也心虛者補肝木生火也肝虛者補腎水生木也腎虛者補肺金生水也此相生而補之也而豫更有根本之説焉胚胎始兆形骸未成先生兩腎腎者先天之根本也㘞地一聲一事未知先求乳食是脾者後天之根本也然而先天之中有水有火水曰真陰火曰真陽名之曰真則非氣非血而為氣血之母生身生命全賴乎此周子曰無極之真二五之精妙合而凝凝然不動感而遂通隨吾神以為往來者此也古人深知此理用六味滋水八味補火十補斑龍水火兼濟法非不善矣然而以假補真必其真者未曾盡喪庶幾有效若先天祖氣蕩然無存雖有靈芝亦難續命而況庶草乎至於後天根本尤當培養不可忽視經曰安穀則昌絶谷則危又云粥漿入胃則虛者活古人診脈必曰胃氣制方則曰補中又曰歸脾健脾者良有以也夫飲食入胃分布五臟灌溉周身如兵家之糧餉民間之煙火一有不繼兵民離散矣然而因餓致病者固多而因傷致病者亦復不少過嗜肥甘則痰生過嗜醇釀則飲積瓜果乳酥濕從內受發為腫滿瀉利五味偏啖久而增氣皆令夭殃可不慎哉是知脾腎兩臟皆為根本不可偏廢古人或謂補脾不如補腎者以命門之火可生脾土也或謂補腎不如補脾者以飲食之精自能下注於腎也須知脾弱而腎不虛者則補脾為亟腎弱而脾不虛者則補腎為先若脾腎兩虛則並補之藥既補矣更加攝養有方斯為善道諺有之曰藥補不如食補我則曰食補不如精補精補不如神補節飲食惜精神用藥得宜病有不痊焉者寡矣傷寒綱領凡看傷寒以傳經直中四字為綱領傳經者由太陽傳陽明由陽明傳少陽由少陽傳太陰由太陰傳少陰由少陰傳厥陰此名循經傳也亦有越經傳者如寒邪初客太陽有不傳陽明而徑傳少陽者有不傳陽明經而徑入陽明腑者亦有由陽明不傳少陽而徑入本腑者亦有少陽不傳三陰而徑入胃腑者亦有傳一二經而止者亦有始終只在一經者雖所傳各各不同其為傳經則一也若夫直中者謂不由陽經傳入而徑中三陰者也中太陰則病淺中少陰則病深中厥陰則愈深矣此其所當急溫也夫傳經之邪在表為寒入里即為熱證不比直中之邪則但寒而無熱也先明傳經直中庶寒熱之劑不至混投矣仲景三陰條下混同立言而昧者不察無怪其意亂心迷也乎傷寒主治四字論傷寒主治四字者表里寒熱也太陽陽明為表太陰少陰厥陰為里少陽居表裡之間謂之半表半裡凡傷寒自陽經傳入者為熱邪不由陽經傳入而直入陰經者謂之中寒則為寒邪此皆前人要旨也而豫更即表里寒熱四字舉八言以晰之任傷寒千變萬化總不出此夫傷寒症有表寒有裡寒有表熱有裡熱有表裡皆熱有表裡皆寒有表寒裡熱有表熱裡寒何謂表寒傷寒初客太陽頭痛發熱而惡寒者名曰外感經所謂體若燔炭汗出而散者是也陽明解肌少陽和解其理一也何謂裡寒凡傷寒不由陽經傳入而直入陰經手足厥冷脈微細下利清穀者名曰中寒仲景所謂急溫之宜四逆湯者是也何謂表熱凡人冬不藏精微寒襲於肌肉之間醞釀成熱至春感溫氣而發者曰溫病至夏感熱氣而發者曰熱病其症頭痛發熱與正傷寒同但不惡寒而口渴與正傷寒異耳傷寒賦云溫熱發於春夏務須柴葛以解肌言病邪在表故用柴葛肌肉韞熱故用黃芩知母以佐之此活法也何謂裡熱凡傷寒漸次傳裡與夫春溫夏熱之症熱邪入里皆為裡熱其在太陰則津液少少陰則咽乾口燥厥陰則消渴仲景所謂急下之而用大柴胡三承氣者是也何謂表裡皆熱如傷寒陽明證傳於本腑外而肌肉內而胃腑熱氣熏蒸口渴譫語此散漫之熱邪未結聚治用白虎湯外透肌膚內清腑臟俾表裡兩解不比邪熱結實專在腸胃可下而愈也正傷寒有此而溫熱之病更多有此不可不察何謂表裡皆寒凡傷寒表受寒邪更兼直中於里此為兩感寒證仲景用麻黃附子細辛湯是也何謂表寒裡熱如兩感熱證一日太陽與少陰同病二日陽明與太陰同病三日少陽與厥陰同病三陽為寒三陰已成熱證豈非表寒而裡熱乎亦有火鬱在內而加以外感亦為表寒裡熱之候更有火亢已極反兼水化內熱閉結而外有惡寒之狀者其表似寒而裡實熱誤投熱劑下咽即敗矣何謂表熱裡寒如人本體虛寒而外感溫熱之邪此為標熱本寒清劑不宜太過更有陰寒在下逼其無根失守之火發揚於上肌膚大熱欲坐臥泥水之中其表似熱其裡實寒誤投寒劑入胃即危矣傷寒變證萬有不齊而總不外乎表里寒熱四字其表裡寒熱變化莫測而總不出此八言以為綱領豫寢食於茲者三十年矣得之於心應之於手今特指出而發明之學者其可不盡心乎經腑論夫經者徑也行於皮之內肉之中者也腑者器也所以盛水穀者也傷寒諸書以經為腑以腑為經混同立言惑人滋甚吾特設經腑論而詳辨之夫邪之在三陽也有太陽之經有陽明之經有少陽之經凡三陽在經之邪未入腑者可汗而已邪之在陰也有太陰之經有少陰之經有厥陰之經凡三陰之邪已入腑者可下而已所謂入腑之腑指陽明胃腑而言也三陽三陰之邪一入胃腑則無復傳矣胃者土也萬物歸土之義也傷寒論云有太陽陽明有正陽陽明有少陽陽明此陽明即胃腑非陽明之經也假令邪在太陽不傳陽明經而徑入胃腑者名曰太陽陽明邪在陽明經不傳少陽而自入本腑者名曰正陽陽明邪在少陽經不傳三陰而徑入胃腑者名曰少陽陽明凡三陽之邪已入胃腑俱下之勿疑矣雖然三陽入腑人所共知三陰入腑鮮或能識夫三陽之經去腑尚遠三陰之經與腑為近然既曰經則猶在徑路之間而未嘗歸併於一處也傷寒論云太陰病脈浮者可發汗宜桂枝湯少陰中風脈陽微陰浮者為欲愈厥陰中風脈微浮為欲愈不浮為未愈俱言邪在於經故有還表向汗之時若既入腑則無外出之路惟有通其大便令邪從內出也此大小承氣調胃承氣所由設也然則以白虎湯治腑病何謂也夫以白虎治腑病者乃三陽之邪初入胃腑表裡皆熱邪未結聚熱勢散漫而無胃實不大便之證故用白虎湯內清胃腑外透肌膚令表裡兩解若邪已結聚如太陰之大實痛少陰之咽乾口燥下利青黃水心下硬厥陰之煩滿囊縮白虎不中與也亦惟下之而已矣此無他經腑既明則施治不致差舛然則太陽之邪自入本腑何謂也太陽之腑膀胱是也膀胱主盛溺太陽病盛則遺邪於腑而為口渴溺赤之症外顯太陽病而兼有此症者名曰太陽傳本當用五苓散以桂枝解外邪以豬苓澤瀉等藥通其小便而愈也或問陽邪入陰復有還表向汗之時其信然乎豫曰古人之言豈欺我哉夫經徑也猶路徑然三陽之邪既有路以達三陰三陰之邪即有路以返三陽此循環之至理非若邪入腑中更無外出之路也嘗見病人體質素厚有傳經盡而自愈者皆由汗解也傷寒論云其不再傳經不加異氣者七日太陽病衰頭痛稍愈八日陽明病衰身熱稍歇九日少陽病衰耳聾微聞十日太陰病衰腹減思食十一日少陰病衰渴止舌乾已而嚏也十二日厥陰病衰囊縱小腹微下大氣皆去病人精神爽慧也由是觀之豈非經盡而愈還表向汗之明驗乎或曰陰不得有汗今太陰脈浮用桂枝湯然則三陰亦可汗解歟桂枝湯將為太陰正藥歟余曰不然讀仲景書舉一隅當以三隅反不可執一而論也夫邪已入里而復發其表是增其熱矣故曰陰不得有汗邪雖入里而復返乎表是邪外出矣故曰還陽而向汗夫桂枝湯太陽傷風藥也今太陰用桂枝者實由太陽傷風為醫誤下而傳入太陰者也太陰脈當沉今反浮是證在太陰脈在太陽則太陽之邪未盡入於陰太陰之邪大有還陽向汗之勢故用桂枝湯以徹散之令其從太陽來者仍自太陽出也推而論之若從太陽傷寒來得傷寒脈則桂枝可易麻黃仲景麻黃石膏湯之意可推也若從陽明來得陽明脈則桂枝可易葛根仲景葛根黃連黃芩湯之意可推也若從少陽來得少陽脈則桂枝可易柴胡是以大柴胡湯為少陽傳入太陰之的方也然必腹中實痛乃為脾邪干胃甫用大黃下之否則只於本方加芍藥以和之而已傷寒論云本太陽證為醫誤下傳入太陰而腹痛者桂枝湯加芍藥大實痛者桂枝湯加大黃亦此意也太陰如此少陰厥陰何獨不然仲景少陰篇內以四逆散治陽厥方用柴胡黃芩甘草枳實者人皆不得其解豈少陰亦用柴胡散之歟誠以熱邪傳裡遊行於少陰經絡之間尚未結聚成實內陷於胃腑之中則用黃芩甘草以清傳經之熱邪用枳實以導胃中之宿滯使邪氣不得乘機而內合以作胃實不大便之證更用柴胡疏通三陽之路俾其從此來者仍從此出不必擾動中宮而病勢已解此仲景用藥之微權而其用心亦良苦矣愚不自揣每遇陽邪入陰尚未結實之證仿古人三黃解毒之意而加以石膏柴胡丹皮之屬往往獲效蓋三黃以除三陰之熱邪用石膏以守陽明之中路加柴胡者亦望其返之故道而還陽向汗也大抵傷寒治法急於解表而緩於攻裡非惟三陽之邪務從表散即三陰未結之邪猶且徘徊觀望冀其還陽而之表必俟邪氣結實乃用承氣湯攻下之且戒曰欲行大承氣先與小承氣腹中轉矢氣者方與大承氣湯若不轉矢氣慎未可再攻兢兢然不苟下也有如此仲景又云病發於陽而反下之熱入因作結胸病發於陰而下之因作痞熱入者言入胃也三陰下早雖不至成結胸而已不免為痞氣矣噫嘻經腑之間烏可以不辨哉陰證有三説世人論傷寒輒曰陰證而不知有三説也有傳經之陰證陰中之熱證也有直中之陰證陰中之寒證也有房室之陰證陰中之虛證也既犯房室而得熱證則灼熱極甚犯房室而得寒證則陰寒極甚熱之甚清劑宜輕寒之甚溫劑宜重斯無弊耳乃世人混稱夾陰而醫者漫不加察反從而和之噫陋矣論疫時疫之症來路兩條去路三條治法五條盡矣何謂來路兩條疫有在天者有在人者如春應溫而反寒夏應熱而反涼秋應涼而反熱冬應寒而反溫非其時而有其氣自人受之皆從經絡而入或為頭痛發熱咳嗽或為頸腫發頤大頭天行之類斯在天之疫也若夫一人之病染及一室一室之病染及一鄉一鄉之病染及合邑此乃病氣穢氣相傳染其氣息俱從口鼻而入其見症憎寒壯熱胸膈滿悶口吐黃涎乃在人之疫以氣相感與天無涉所謂來路兩條者此也夫在天之疫從經絡而入宜分寒熱用辛溫辛涼之藥以散邪如香蘇散普濟消毒飲之類俾其從經絡入者仍從經絡出也在人之疫從口鼻而入宜用芳香之藥以解穢如神朮散藿香正氣散之類俾其從口鼻入者仍從口鼻出也至於經絡口鼻所受之邪傳入臟腑漸至潮熱譫語腹滿脹痛是為毒氣歸內非疏通腸胃無由以解其毒法當下之其大便自行者則清之下後而餘熱不盡者亦清之須令臟腑之邪從大便出也所謂去路三條者此也夫發散解穢清中攻下共四法耳而謂治法有五何也大抵邪之所湊其氣必虛體虛受邪必須以補法駕馭其間始能收效萬全如氣虛補氣血虛補血古人所用參蘇飲人參白虎湯人參敗毒散黃龍湯四順清涼飲方內有人參當歸其意可想而知矣於前四法中加以補法乃能左右咸宜縱橫如意邪氣退而元氣安所謂治法五條者此也熟此五法而融會貫通其於治疫也何難之有六氣相雜須辨論世間之病人皆曰傷寒最難而非難也難莫難於六氣之相雜而互至耳六氣者風寒暑濕燥火是也然冬月致病只三字風寒火是也春兼四字風寒濕火是也夏兼五字風寒暑濕火是也秋只四字風寒燥火是也其有非時之燥濕則又天之變氣也大抵氣愈雜則其治愈難吾姑即夏間之五氣而明辨之五氣既明則其少者不煩言而已解假如脈浮緩自汗頭痛發熱而惡風者傷風也脈浮緊無汗頭痛發熱而惡寒者傷寒也此隨時感冒雖在暑月亦必有之亦有納涼飲冷臟受寒侵遂至嘔吐痛瀉脈沉遲手足厥冷口鼻氣冷此乃夏月中寒之候反因避暑太過而得之也至於暑症乃夏月之正病然有傷暑中暑閉暑之殊傷暑者病之輕者也其症汗出身熱而口渴也中暑者病之重者也其症汗大泄昏悶不醒蒸熱齒燥或煩心喘喝妄言也閉暑者內伏暑氣而外為風寒閉之也其頭痛身痛發熱惡寒者風寒也口渴煩心者暑也其有霍亂吐瀉而轉筋者則又因暑而停食伏飲以致之也然停食伏飲濕氣也或身重體痛腹滿脹悶泄利無度皆濕也風寒暑濕四氣動而火隨之是為五氣所謂夏兼五字者以此然而各字分見其為治也易五字互見其為治也難假如風暑相搏名曰暑風其症多發搐搦暑濕相搏名曰濕溫其症頭痛自汗譫語身重腹滿足脛寒風熱相搏名曰風溫其症自汗身重多眠鼻息鼾語言難出濕氣兼風名曰風濕濕氣兼寒名曰寒濕其症骨節煩疼不能自轉側復有風寒挾濕發為剛柔二痙其症口噤身反張更有濕熱相攻發為五痿其症四肢痿廢不能自收持此皆五氣相兼而互見者也又況冬月傷寒伏藏於筋骨之間至夏感熱氣而發者名曰熱病天行不正之氣發作非時者名曰疫氣更有病氣相傳染沿門合境皆病者斯為在人之疫為害尤多夫此熱病疫病傳之臟腑大便不通則燥氣隨之是五氣之中復兼六氣矣更有體虛勞倦注夏等病紛紜交錯於其間若不明辨親切孟浪投劑傷生非淺奈何醫者一見發熱不問是暑是濕概行表散散之不效隨用和解解之不去隨用清涼涼之不效繼以補益其中有幸全者則引為己功而傾危乍至則委之天數豈知致病之初認證投藥取效甚易及其日久病深敗證悉具雖有善者亦莫如之何也已豫不自揣特著此論先指夏間五氣而發明之庶紛紜錯雜之症不至混淆則觸目洞然施治如法亦救世之一端耳嗟乎五氣既明多者已辨則三氣四氣之雜至者不難辨矣況傷寒一症表裡可分傳中可別上中下三焦可憑而又何難乎我故曰傷寒非難而難於六氣之相雜而互至也論中風中風之症有中腑中臟中血脈之殊中腑者中在表也即仲景所謂太陽中風桂枝湯之類是也外顯六經之形證即如傷寒三陽三陰傳變之證也其見證既與傷寒同則其治法亦與傷寒傳變無異矣中臟者中在裡也如不語中心唇緩中脾鼻塞中肺目瞀中肝耳聾中腎此乃風邪直入於裡而有閉與脫之分焉閉者牙關緊急兩手握固藥宜疏通開竅熱閉牛黃丸冷閉橘半薑汁湯其熱閉極甚胸滿便結者或用三化湯以攻之脫者口張心絶眼合肝絶手撒脾絶聲如鼾肺絶遺尿腎絶更有髮直搖頭上攛面赤如妝汗出如珠皆為脫絶之證此際須用理中湯加參兩餘以溫補元氣若寒痰阻塞或用三生飲加人參以灌之庶救十中之二三中血脈者中在半表半裡也如口眼喎斜半身不遂之屬是也藥宜和解用大秦艽湯加竹瀝薑汁鉤藤主之而有氣與血之分氣虛者偏於右佐以四君子湯血虛者偏於左倍用四物湯氣血俱虛者左右並病佐以八珍湯此治中風之大法也中風寒熱辨或謂寒邪中臟一於寒也風邪中臟而有寒有熱何也愚謂寒陰邪也陰主靜故其中人特為寒中而已矣風陽邪也陽主動善行而數變故其中人或為寒中或為熱中初無定體也然其所以無定體者亦因乎人之臟腑為轉移耳何者其人臟腑素有鬱熱則風乘火勢火借風威熱氣拂鬱不得宣通而風為熱風矣其人臟腑本屬虛寒則風水相遭寒氣冷冽水凍冰凝真陽衰敗而風為寒風矣為熱風多見閉證理宜疏導為先為寒風多見脫證理宜溫補為急夫同一中臟而寒熱之別相隔千里其中所以為熱為寒之故舉世皆不求解則三化湯之寒三生飲之熱何以同出於書而屹然並立是以醫道貴精思審處而自得之有非語言所能盡也中風不語辨或問不語有心脾腎三經之異又風寒客於會厭亦令不語何以辨之愚謂心者君主之官神明出焉若心經不語必昏冒全不知人或兼直視搖頭等症蓋心不受邪受邪則殆此敗症也若胞絡受邪則時昏時醒或時自喜笑若脾經不語則人事明白或唇緩口角流涎語言謇澀若腎經不語則腰足痿痹或耳聾遺尿以此為辨至若風寒客於會厭不過喊風聲啞之屬口能收舌能轉樞機皆利但不發音耳可用辛散而安中風類中辨證法中風者真中風也類中風者似中風而非中風也然真中有兼類中者類中有兼真中者臨證最難分別不可無法以處之大法中風之證有中腑中臟中血脈之分前論已詳言矣惟類中與真中最宜分別不可不審真中風者中於太陽則與傷寒外感傳經相符若中血脈必有偏枯喎斜之證中臟雖為在裡亦必兼有經絡偏枯之證若類中者寒則厥冷嘔瀉而暴痛也暑則赤日中行而卒倒也濕則痰涎壅盛而閉塞也火則面赤煩渴唇燥而便閉也食則因於過飽而胸脹滿悶也氣則因於盛怒而閉塞無音也惡則因登冢入廟冷屋棲遲而卒然頭面青黯也虛則面色㿠白鼻息輕微也見證各殊與真中之偏枯喎斜自是不同其間或有相同者乃真中類中相兼也症既相兼必須一一辨明察其多寡兼併之處辨其標本緩急之情審度得宜用古人經驗良方隨手而起矣雜症主治四字論雜症主治四字者氣血痰郁也丹溪治法氣用四君子湯血用四物湯痰用二陳湯郁用越鞠丸參差互用各盡其妙薛立齋從而廣之氣用補中而參以八味益氣之源也血或四物而參以六味壯水之主也痰用二陳而兼以六君補脾土以勝濕治痰之本也郁用越鞠而兼以逍遙所謂以一方治木鬱而諸郁皆解也用藥之妙愈見精微以愚論之氣虛者宜四君輩而氣實者則香蘇平胃之類可用也血虛者宜四物輩而血實者則手拈失笑之類可用也尋常之痰可用二陳輩而頑痰膠固致生怪症者自非滾痰丸之類不濟也些小之郁可用越鞠逍遙輩而五郁相混以致腹膨腫滿二便不通者自非神佑承氣之類弗濟也大抵尋常治法取其平善病勢堅強必須峻劑以攻之若一味退縮則病不除而不察脈氣不識形情浪施攻擊為害尤烈務在平時將此氣血痰郁四字反復討論曲盡其情辨明虛實寒熱輕重緩急一毫不爽則臨證灼然而於治療雜症之法思過半矣入門辨證訣凡看症之法先辨內傷外感次辨表里得其大概然後切脈問症與我心中符合斯用藥無有不當口鼻之氣可以察內傷外感身體動靜可以觀表裡口鼻者氣之門戶也外感則為邪氣有餘邪有餘則口鼻之氣粗疾出疾入內傷則為正氣虛弱正氣虛則口鼻之氣微徐出徐入此決內外之大法也動靜者表裡之分也凡發熱靜而默默者此邪在表也若動而躁及譫語者此邪在裡也而里證之中復有陰陽之分凡病人臥須看其向里向外睡仰睡處長睡伸腳蜷腳睡向里者陰也向外者陽也仰者多熱復者多寒伸腳者為熱蜷腳者為寒又觀其能受衣被與否其人衣被全覆手腳不露身必惡寒既惡寒非表證即直中矣若揭去衣被揚手露腳身必惡熱既惡熱邪必入腑矣此以身體動靜並占其寒熱也然又有陽極似陰其人衣被全覆昏昏而睡復有陰極似陽假渴煩躁欲坐臥泥水中此乃真熱假寒真寒假熱之象尤不可以不辨色內經曰脈以應月色以應日色者視之易見者也如傷風闕庭必光澤傷寒闕庭必暗晦面青黑為寒為直中陰證紫赤為熱為傳經里證若已發汗後面赤色盛此表邪出不徹也當重表之又陰盛隔陽合面赤色是為戴陽之候宜急溫之以通陽氣大抵黑色見者多凶為病最重黃色見者多吉病雖重可治經云面黃目青面黃目赤面黃目白面黃目黑者皆吉蓋黃屬土今惡症雖見土猶未絶故可救若面青目赤面赤目白面青目黑面黑目白面赤目青皆難治也言無土色則胃氣已絶凡天庭印堂年壽等處黑色枯稿者凶黃色明潤者吉然人有五色不能齊等經云五色者氣之華也赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼五色之欲者皆取其潤澤五色之不欲者皆惡其枯稿也經又云五色精微象見矣其壽不久也言五色固不宜枯稿若五色之精華盡發越於外而中無所蓄亦非宜也大抵五色之中須以明潤為主而明潤之中須有蘊蓄若一概發華於外亦凶兆也察色之妙不是過矣鼻經曰五色決於明堂明堂者鼻也故鼻頭色青者腹中痛微黑者有痰飲黃色者為濕熱白色者為氣虛赤色者為肺熱明亮者為無病也若傷寒鼻孔乾燥者乃邪熱在陽明肌肉之中久之必將衄血也病人欲嚏而不能者寒也鼻塞濁涕者風熱也鼻息鼾睡者風溫也鼻孔乾燥黑如煙煤者陽毒熱深也鼻孔出冷氣滑而黑者陰毒冷極也凡病中鼻黑如煤乃大凶之兆若見鼻孔煽張為肺氣將絶之證也凡産婦鼻起黑氣或鼻衄者為胃敗肺絶之危候古方用二味參蘇飲加附子以救之多有得生者唇口唇者肌肉之本脾之華也故視其唇之色澤可以知病之深淺乾而焦者為邪在肌肉焦而紅者吉焦而黑者凶唇口俱赤腫者肌肉熱甚也唇口俱青黑者冷極也口苦者膽熱也口甜者脾熱也口燥咽乾者腎熱也口噤難言者或為痙為痰厥為中寒不相等也又狐惑症上唇有瘡為狐蟲食其臟下唇有瘡為惑蟲食其肛也若病中見唇舌卷唇吻反青環口黧黑口張氣直或如魚口或氣出不返或口唇顫搖不止皆難治也耳耳者腎之竅察耳之枯潤知腎之強弱故耳輪紅潤者生枯稿者難治薄而白薄而黑薄而青或焦如炭色者皆為腎敗若耳聾及耳中痛皆屬少陽此邪在半表半裡當和解之若耳聾舌卷唇青此屬厥陰為最重也目目者五臟精華之所注能照物者腎水之精也熱則昏暗水足則明察秋毫如常而瞭然者邪未傳裡也若赤若黃邪已入里矣若昏暗不明乃邪熱在內消灼腎水腎水枯竭故目不能朗照急用大承氣湯下之蓋寒則目清未有寒甚而目不見者也凡開目欲見人者陽證也閉目不欲見人者陰症也目瞑者將衄血也目睛黃者將發黃也至於目反上視橫目斜視瞪目直視及眼胞忽然陷下者為五臟已絶之證也凡雜病忽然雙目不明者此氣脫也經云氣脫者目不明此氣虛也丹溪用人參膏主之經又云脫陰者目瞀此血脫也邪熱則下之血虛則補之以救腎水也然此證已為危險之候舌舌者心之竅凡傷寒症津液如常此邪在表而未傳裡也見白胎而滑邪在少陽半表半裡之間也見黃胎而乾燥邪已入里胃腑熱甚也宜下之見黑胎芒刺破裂乾枯邪熱盛極腎水枯涸至重之候也宜急下之若舌黑津潤不破裂乾燥此直中寒證也宜急溫之夫寒證舌黑本色也而熱症反赤為黃反黃為黑者何也蓋熱極反兼水化若燔柴然火變成炭至危之候也凡舌腫脹或重舌木舌舌生芒刺舌苔黃燥皆熱甚也凡舌硬舌強舌短縮舌卷神氣昏亂語言不清者皆危症也又陰陽易病吐舌數寸者危惡已甚也身大抵病人身輕自能轉側者為輕若身體沉重不能轉側者為重然中濕風濕感寒皆主身重疼痛須以兼症辨之若陰證身重必厥冷而蜷臥無熱惡寒閉目不欲嚮明懶見人也又陰毒身痛如被杖身重如山而不能轉側也大抵熱則流通身輕無痛寒則凝塞故身重而痛也若手足抽搐角弓反張者痙也若頭重視身此天柱骨倒而元氣敗也若頭搖而不止髮直如妝頭上攛皆絶證也凡病中循衣摸床兩手撮空此神去而魂亂也凡病人皮膚潤澤者生枯稿者危若大肉盡脫九候雖調猶難治也胸凡看傷寒欲知邪之傳與不傳先看目舌次問病人胸前痛脹否若不痛滿知邪氣在表若脹滿未經下者即半表半裡證也已下過而痛甚者恐成結胸也故胸者可以知邪之傳與不傳也腹腹者至陰也乃里證之中可以辨邪之實與不實也既問胸前明白次則以手按其腹若未痛脹者知邪未曾入里入里必脹痛若邪在表及半表半裡腹焉得痛脹乎若腹脹不減及里痛不止此里證之實方可攻之若腹脹時減痛則綿綿此里證猶未實也但可清之故腹者可以知邪之實與不實也若直中腹痛則不由陽經傳來此為冷氣在內脈必沉遲急當溫之小腹小腹者陰中之陰里證之裡可以知邪之必結實也既問胸腹後以手按其小腹蓋小腹藏糟粕之處邪至此必結實若小腹未硬痛者知非裡實也若邪已入里小腹必硬痛硬痛而小便自利大便黑色蓄血證也宜桃仁承氣攻之若小腹繞臍硬痛小便數而短者燥糞證也當以大承氣攻之若小腹脹滿大便如常恐屬溺澀而不通宜利其小便凡看病先觀形色次及耳目口鼻唇舌身體次問胸腹及小腹則病證病情瞭然矣
