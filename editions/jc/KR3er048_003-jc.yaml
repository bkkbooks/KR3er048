body:
  text: 卷三中風門中風者真中風也有中腑中臟中血脈之殊中腑者中在表也外有六經之形證與傷寒六經傳變之證無異也中太陽用桂枝湯中陽明葛根湯加桂枝中少陽小柴胡湯加桂枝其法悉具傷寒門茲不贅中臟者中在裡也其人眩僕昏冒不醒人事或痰聲如曳鋸宜分臟腑寒熱而治之假如其人素挾虛寒或暴中新寒則風水相遭寒冰徹骨而風為寒風矣假如其人素有積熱或鬱火暴發則風乘火勢火借風威而風為熱風矣為熱風多見閉症其證牙關緊急兩手握固法當疏風開竅先用搐鼻散吹之次用牛黃丸灌之若大便閉結腹滿脹悶火勢極盛者以三化湯攻之為寒風多見脫證其證手撒脾絕眼合肝絕口張心絕聲如鼾肺絕遺尿腎絕更有兩目直視搖頭上竄髮直如妝汗出如珠皆脫絕之證法當溫補元氣急用大劑附子理中湯灌之若痰涎壅盛以三生飲加人參灌之間亦有寒痰壅塞介乎閉脫之間不便驟補者用半夏橘紅各一兩濃煎至一杯以生薑自然汁對衝頻頻灌之其人即蘇然後按其虛而調之然予自揣生平用附子理中治愈者甚多其用牛黃丸治愈者亦恆有之惟三化湯一方並未舉用此必天時地土人事之不同然寒熱之劑屹然並立古方具在法不可泯故兩存之以備參酌中血脈者中在經絡之中也其證口眼歪斜半身不遂是也大秦艽湯主之偏在左倍用四物湯偏在右佐以四君子湯左右俱病佐以八珍湯並虎骨膠丸此治真中之大法也口噤角弓反張口噤角弓反張痙病也但口噤而兼反張者是已成痙也小續命湯口噤而不反張者是未成痙也大秦艽湯其痙病俱見前傷寒兼證中宜細加查覈不語不語有心脾腎三經之異又有風寒客於會厭卒然無音者大法若因痰迷心竅當清心火牛黃丸神仙解語丹若因風痰聚於脾經當導痰涎二陳湯加竹瀝薑汁並用解語丹若因腎經虛火上炎當壯水之主六味湯加遠志石菖蒲若因腎經虛寒厥逆當益火之源劉河間地黃飲子或用虎骨膠丸加鹿茸若風寒客於會厭聲音不揚者用甘桔湯加疏散藥遺尿遺尿謂之腎絕多難救然反目遺尿者為腎絕若不反目但遺尿者多屬氣虛重用參耆等藥補之則愈桂枝湯葛根湯小柴胡湯俱見傷寒搐鼻散治一切中證不醒人事用此吹鼻中有嚏者生無嚏者難治細辛去葉皂角去皮弦各一兩半夏生用五錢為極細末瓷瓶收貯勿泄氣臨用吹一二分入鼻孔中取嚏牛黃丸治中風痰火閉結或瘛瘲癱瘓語言謇澀恍惚眩暈精神昏憒不省人事或喘嗽痰壅煩心等症牛黃六錢麝香龍腦以上三味另研羚羊角當歸酒洗防風黃芩柴胡白朮麥冬去心白芍各七錢五分桔梗白茯苓杏仁去皮尖川芎大豆黃卷阿膠各八錢五分蒲黃人參去蘆神麯各一兩二錢五分雄黃另研四錢甘草二兩五錢白蘞肉桂去皮乾薑各三錢七分犀角鎊一兩乾山藥三兩五錢大棗五十枚蒸爛去皮核金箔六百五十片內存二百片為衣為細末煉蜜同棗膏丸每兩作十丸用金箔為衣每服一丸溫水化下三化湯治中風入臟熱勢極盛閉結不通便溺阻隔不行乃風火相搏而為熱風者本方主之設內有寒氣大便反硬名曰陰結陰結者得和氣暖日寒冰自化不可誤用攻藥誤即不能復救慎之慎之厚朴薑汁炒大黃酒蒸枳實麵炒羌活各一錢五分水煎服附子理中湯三生飲治寒風中臟六脈沉細痰壅喉響不省人事乃寒痰厥逆之候生南星生烏頭去皮尖生附子各一錢五分生薑五片生木香五分水煎服薛立齋云三生飲乃行經絡治寒痰之良藥斬關奪旗之神劑每服必用人參兩許駕馭而行庶可驅外邪而補真氣否則不惟無益適以取敗觀先哲用耆附朮附參附等湯其義可見大秦艽湯治風中經絡口眼歪斜半身不遂或語言謇澀乃血弱不能養於筋宜用養血疏風之劑經云治風先治血血行風自滅是也秦艽一錢五分甘草炙川芎當歸芍藥生地熟地自制茯苓羌活獨活白朮防風白芷黃芩酒炒各八分細辛二分水煎服如或煩躁口渴加石膏一錢五分陰雨加生薑三片春夏加知母八分竊謂本方初時宜用若日久則以四物四君為主而以風藥佐之庶收全功四物湯四君子湯八珍湯俱見虛證虎骨膠丸見痹證小續命湯見傷寒發痙神仙解語丹白附子炮石菖莆去毛遠志去心甘草水炮炒天麻全蠍去尾甘草水洗羌活南星牛膽制多次更佳各一兩木香五錢上為末麵糊丸龍眼大每服一丸薄荷湯下二陳湯陳皮茯苓半夏薑汁炒甘草炙各一錢五分姜一片大棗二枚水煎服六味湯見後類中門地黃飲子熟地九蒸曬二錢巴戟去心山萸肉去核肉蓯蓉酒浸焙石斛附子炮五味子杵炒白茯苓各一錢石菖蒲去毛桂心麥冬去心遠志去心甘草水炮炒各五分入薄荷少許姜一片棗二枚水煎服氣虛加人參二錢甘桔湯見傷寒咽痛類中風類中風者謂火中虛中濕中寒中暑中氣中食中惡中也共有八種與真中相類而實不同也然類中有與真中相兼者須細察其形證而辨之凡真中之證必連經絡多見歪斜偏廢之候與類中之專氣致病者自是不同然而風乘火勢邪乘虛入寒風相搏暑風相炫飲食招風種種變證所在多有務在詳辨精細果其為真中也則用前驅風法果其為類中也則照本門施治果其為真中類中相兼也則以兩門醫法合治之斯無弊耳茲舉類中諸證詳列於下俾學者觸目洞然也一曰火中火之自外來者名曰賊實火也火之自內出者名曰子虛火也中火之證良由將息失宜心火暴盛腎水虛衰不能制之故卒然昏倒不可作實火論假如怒動肝火逍遙散心火鬱結牛黃清心丸肺火壅遏貝母栝蔞散思慮傷脾加味歸脾湯腎水枯涸虛火上炎者六味地黃湯若腎經陽虛火不歸原者八味地黃湯劉河間地黃飲子並主之此治火中之法也或問火中而用桂附者何也答曰腎陽風越則丹田虛冷其痰涎上壅者水不歸原也面赤煩躁者火不歸原也惟桂附八味能引火歸原火歸水中則水能生木木不生風而風自熄矣二曰虛中凡人體質虛弱過於作勞傷損元氣以致痰壅氣浮卒然昏倒宜用六君子湯主之中氣下陷者補中益氣湯主之三曰濕中濕中者即痰中也凡人嗜食肥甘或醇酒乳酪則濕從內受或山嵐瘴氣久雨陰晦或遠行涉水坐臥濕地則濕從外受濕生痰痰生熱熱生風故卒然昏倒無知也蒼白二陳湯主之四曰寒中凡人暴中於寒卒然口鼻氣冷手足厥冷或腹痛下利清穀或身體強硬口噤不語四肢戰搖此寒邪直中於里也宜用姜附湯或附子理中湯加桂主之五曰暑中凡人務農於赤日行旅於長途暑氣逼迫卒然昏倒自汗面垢昏不知人急用千金消暑丸灌之其人立蘇此藥有回生之功一切暑藥皆不及此村落中各宜預備灌醒後以益元散清之或以四味香薷飲去厚朴加丹參茯苓黃連治之虛者加人參余詳論傷暑門六曰氣中七情氣結或怒動肝氣以致氣逆痰壅牙關緊急極與中風相似但中風身熱中氣身涼中風脈浮中氣脈沉且病有根由必須細究宜用木香調氣散主之七曰食中醉飽過度或著惱怒以致飲食填塞胸中胃氣不行卒然昏倒宜用橘紅二兩生薑一兩炒鹽一撮煎湯灌而吐之次用神朮散和之其最甚者胸高滿悶閉而不通或牙關緊急厥暈不醒但心頭溫者即以獨行丸攻之藥即下咽其人或吐或瀉自應漸蘇若瀉不止者以冷粥湯飲之即止八曰惡中登塚入廟冷屋棲遲以致邪氣相侵卒然錯語妄言或頭面青黯昏不知人急用蔥薑湯灌之次以神朮散調之蘇合丸亦佳加味逍遙散治肝經鬱火胸脅脹痛或作寒熱甚至肝木生風眩暈振搖或咬牙發痙一目斜視一手一足搐搦此皆肝氣不和之證經云木鬱達之是已柴胡甘草茯苓白朮當歸白芍丹皮黑山梔各一錢薄荷五分水煎服牛黃清心丸見真中門貝母栝蔞散貝母二錢栝蔞仁一錢五分膽南星五分黃芩橘紅黃連炒各一錢甘草黑山梔各五分水煎服加味歸脾湯黃耆一錢五分人參白朮茯神當歸棗仁炒各一錢遠志去心泡甘草炙各七分丹皮黑山梔各八分元眼肉五枚水煎服六味地黃湯滋水制火則無上盛下虛之患大熟地四錢山萸肉去核山藥各二錢丹皮茯苓澤瀉各一錢五分水煎服本方加肉桂熟附子各五分各八味地黃湯若為丸十倍其藥煉蜜丸如梧桐子大地黃飲子見真中六君子湯理脾祛痰人參茯苓白朮陳土炒陳皮去白甘草炙半夏湯泡七次各一錢生薑五分大棗二枚水煎服補中益氣湯中氣下陷宜服此以升舉之黃耆一錢五分白朮陳土炒人參當歸甘草炙各一錢柴胡升麻各三分陳皮五分生薑一片大棗二枚水煎服蒼白二陳湯見中風即二陳湯加蒼朮白朮各一錢姜附湯見諸方補遺附子理中湯見真中千金消暑丸治中暑昏悶不醒並伏暑停食嘔吐瀉利一切暑藥皆不及此半夏醋煮四兩茯苓甘草各二兩共為細末生薑自然汁糊丸如綠豆大每服五六十丸開水下若昏憒不醒碾碎灌之予用此藥治中暑證累效有一老人厥去半日藥下即蘇隨以香薷飲去厚朴加丹參茯苓與之遂愈因勸各村落中預備應用以為救濟之法並囑同道中預備此藥以廣活人之術益元散通利九竅清暑熱除煩渴為治暑之聖藥甘草一兩滑石白膩者水飛過六兩上為末每服三五錢新汲水調服或用燈心煎湯待冷調服四味香薷飲見傷暑木香調氣散平肝氣和胃氣白蔻仁去殼研檀香木香各一兩丁香三錢香附五兩藿香四兩甘草炙砂仁陳皮各二兩上為細末每服二錢入鹽少許點服神朮散此藥能治時行不正之氣發熱頭痛傷食停飲胸滿腹痛嘔吐瀉利並能解穢驅邪除山嵐瘴氣鬼瘧屍注中食中惡諸症其效至速予嘗合此普送藥到病除罔不應驗蒼朮陳土炒陳皮厚朴薑汁炒各二斤甘草炙十二兩藿香八兩砂仁四兩共為末每服二三錢開水調下獨行丸治中食至甚胸高滿悶吐法不效須用此藥攻之若昏暈不醒四肢僵硬但心頭溫者抉齒灌之大黃酒炒巴豆去殼去油乾薑各一錢研細薑汁為丸如黃豆大每服五七丸用薑湯化下若服後瀉不止者用冷粥湯飲之即止蘇合丸治勞瘵骨蒸疰忤心痛霍亂吐利時氣鬼魅瘴瘧疫癘瘀血月閉痃癖疔腫驚癇中風中氣痰厥昏迷等證白朮青木香犀角香附炒去毛硃砂水分訶黎勒煨取皮檀香安息香酒熬膏沉香麝香丁香蓽茇各二兩龍腦薰陸香別研蘇合香各二兩上為細末研藥勻用安息香膏並蘇合香油煉蜜和劑丸如彈子大以臘匱固緋絹當心帶之一切邪祟不敢近傷暑霍亂攪腸痧四味香薷飲治風寒閉暑之證頭痛發熱煩心口渴或嘔吐泄瀉發為霍亂或兩足轉筋凡閉暑而不能發越者非香薷不可香薷乃消暑之要藥而方書稱為散劑俗稱為夏月之禁劑夏即禁用則當用於何時乎此不經之說致令良藥受屈殊可扼腕故辯之香薷扁豆厚朴薑汁炒各一錢五分甘草炙五分水煎服若兼風寒本方加荊芥秦艽蔓荊子若兼霍亂吐瀉煩心口渴本方加黃連若兩足轉筋本方加木瓜茯苓木瓜治轉筋之神劑若風暑相搏而發搐搦者本方加羌活鉤藤凡暑症不宜發汗今用風藥者因其暑中挾風也若暑濕相搏名曰濕溫誤汗則名重暍多難治宜用蒼朮白虎湯時醫不論暑濕概行發散傷生匪淺藿香正氣散治暑月貪涼飲冷發為霍亂腹痛吐瀉憎寒壯熱藿香砂仁厚朴茯苓紫蘇陳皮各一錢白朮土炒半夏桔梗白芷各七分甘草炙五分生薑三片水煎服清暑益氣湯預服此藥以防暑氣黃耆一錢五分白朮一錢人參當歸陳皮麥冬去心炙甘草各五分扁豆二錢茯苓七分升麻柴胡北五味各三分神麯四分黃柏澤蘭各二分水煎服疫癘疫論已見首卷分來路兩條去路三條治法五條詳且盡矣大法天行之氣從經絡入其證頭痛發熱宜微散香蘇散散之病氣傳染從口鼻入其證嘔惡胸滿宜解穢神朮散和之若兩路之邪歸併於裡腹脹滿悶譫語發狂唇焦口渴者治疫清涼散清之便閉不通者加大黃下之其清涼散內人中黃一味乃退熱之要藥解穢之靈丹醫家缺而不備安能取效復有虛人患疫或病人變虛或妄治變虛者須用人參白朮當歸等藥加入清涼藥內以扶助正氣如或病氣漸退正氣大虛更宜補益正氣為主夫發散解穢清中攻下四法外而以補法駕馭其間此收效萬全之策也予嘗用麥冬生地各一兩加人參二三錢以救津液又嘗用人參湯送下加味枳朮丸以治虛人鬱熱便閉之症病氣退而元氣安遂恃為囊中活法謹告同志各自存神又有頭面腫大名曰大頭瘟者頸項粗腫名曰蝦蟆瘟者古方普濟消毒飲並主之但頭腫之極須用針砭若醫者不究其理患者畏而不行多致潰裂腐爛而難救若頸腫之極須用橘紅淡鹽湯吐去其痰再用前方倍甘桔主之須宜早治不可忽也香蘇散見太陽證神朮散見類中治疫清涼散秦艽赤芍知母貝母連翹各一錢荷葉七分丹參五錢柴胡一錢五分人中黃二錢水煎服如傷食胸滿加麥芽山楂蘿蔔子陳皮脅下痞加鱉甲枳殼昏憒譫語加黃連熱甚大渴能消水者加石膏天花粉人參便閉不通腹中脹痛者加大黃下之虛人自汗多倍加人參津液枯少更加麥冬生地若時行寒疫不可輕用涼藥宜斟酌投劑普濟消毒飲針砭法並見頭痛加味枳朮丸見腹痛制人中黃法用竹筒兩頭留節刮去青皮開一孔將甘草裝滿仍用木屑塞口融松香封固用繩扎定於臘月初一日投廁缸中一月足取起用水濯洗然後劈開竹筒將甘草曬乾收藏聽用或問香蘇散神朮散芳香藥也人中黃有穢氣者也而皆以之解疫毒消穢氣何也不知邪客上焦乃清虛之所故用芳香以解之邪客中下二焦乃濁陰之所疫毒至此結而為穢則非芳香所能解必須以穢攻穢而穢氣始除此人中黃之用所以切當也夫病有先後有部位有變更而用藥隨之方為活法醫家常須識此不只治疫一端而已虛勞帝曰陰虛生內熱奈何岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱此言氣虛之候也東垣宗其說發補中益氣之論卓立千古朱丹溪從而廣之以為陽常有餘陰常不足人之勞心好色內損腎元者多屬真陰虧損宜用六味湯加知母黃柏補其陰而火自降此又以血虛為言也後人論補氣者則宗東垣論補血者則宗丹溪且曰水為天一之元土為萬物之母其說至為有理然而陽虛易補陰虛難療治虛損者當就其陰血未枯之時而早補之患虛損者當就其真陰未槁之時而重養之亦庶平其可矣凡虛勞之證多見吐血痰湧發熱夢遺經閉以及肺痿肺疽咽痛音啞側臥傳屍鬼注諸疾今照葛仙翁十藥神書例增損方法臚列於下以便觀覽甲字號方止咳嗽為主余見虛損之成多由於吐血吐血之因多由於咳嗽咳嗽之原多起於風寒仲景云咳而喘息有音甚則吐血者用麻黃湯東垣師其意改用人參麻黃芍藥湯可見咳嗽吐紅之症多由於外感者不可不察也余治外感咳嗽用止嗽散加荊防蘇梗以散之散後肺虛即用五味異功散補脾土以生肺金虛中挾邪則用團魚丸解之虛損漸成咳嗽不止乃用紫菀散月華丸清而補之此治虛咳之要訣也余詳本門止嗽散見後咳嗽門五味異功散即四君子湯加陳皮方見後團魚丸治久咳不止恐成勞瘵貝母去心知母前胡柴胡杏仁去皮尖及雙仁者各四錢大團魚重十二兩以上者去腸一個上藥與魚同煮熟取肉連汁食之將藥渣焙乾為末用魚骨煮汁一盞和藥為丸如桐子大每服二十丸麥冬湯下日三服海藏紫菀散潤肺止嗽並治肺痿人參五分紫菀知母蒸貝母去心桔梗茯苓真阿膠蛤粉炒成珠各一錢五味子甘草炙各三分水煎服月華丸滋陰降火消痰祛瘀止咳定喘保肺平肝消風熱殺屍蟲此陰虛發咳之聖藥也天冬去心蒸麥冬去心蒸生地酒洗熟地九蒸曬山藥乳蒸百部蒸沙參蒸川貝母去心蒸真阿膠各一兩茯苓乳蒸獺肝廣三七各五錢用白菊花二兩去蒂桑葉二兩經霜者熬膏將阿膠化入膏內和藥稍加煉蜜為丸如彈子大每服一丸噙化日三服乙字號方止吐血為主凡血症有陽乘陰者有陰乘陽者假如脈數內熱口渴乾燥或平素血虛火旺加以醇酒炙爆之物此乃熱氣騰沸迫血妄行名曰陽乘陰法當清降四生丸等主之吐止後則用六味地黃丸補之又如脈細沉遲口舌清潤平素體質虛寒或兼受風冷之氣此謂天寒地凍水凝成冰名曰陰乘陽法當溫散理中湯主之凡治血症不論陰陽俱以照顧脾胃為收功良策誠以脾胃者吉凶之關也書云自上損下者一損損於肺二損損於肝三損損於脾過於脾則不可治自下損上者一損損於腎二損損於心三損損於胃過於胃則不可治所謂過於脾胃者吐瀉是也古人有言不問陰陽與冷熱先將脾胃與安和丹溪云凡血症須用四君子之類以收功其言深有至理然而補脾養胃不專在藥而在飲食之得宜難經曰損其脾者調其飲食適其寒溫誠以飲食之補遠勝於藥耳世之治損者亦可恍惚悟矣四生丸治陽盛陰虛熱迫血而妄行以致吐血咯血衄血法當清降生地黃生荷葉生側柏葉生艾葉各等分細切同搗極爛為丸如雞子大每服一丸水煎去渣服吐甚者用此丸煎湯調下花蕊散一二錢尤佳花蕊石散能化瘀血為水而不動臟腑真神藥也花蕊石一斤明硫黃四兩入瓦罐內封口鐵線緊扎鹽泥包裹曬乾硬炭圍定煉二炷香研細篩過每服二三錢童便熱酒調服生地黃湯生地三錢牛膝丹皮黑山梔各一錢丹參元參麥冬白芍各一錢五分鬱金廣三七荷葉各七分水煎加陳墨汁清童便各半杯和服六味地黃丸滋益先天生腎水制虛火乃醫門要藥尤紅症之靈丹也見類中理中湯見中寒門治陰盛陽虛不能統血以致陰血走散法當溫補四君子湯人參白朮茯苓炙甘草各一錢大棗二枚生薑一片水煎服丙字號方治大吐血成升斗者先用花蕊散止之隨用獨參湯補之所謂血脫益氣陽生陰長之理貧者以歸脾湯代之人參去蘆一兩水煎服聽其熟睡切勿驚醒則陰血復生矣歸脾湯白朮人參當歸棗仁炒白芍各一錢黃耆一錢五分遠志去心泡七分甘草炙五分元眼肉五枚水煎服丁字號方治咳嗽吐紅漸成骨蒸勞熱之症如人胃強氣盛大便結脈有力此陽盛生熱法當清涼清骨散主之若胃虛脾弱大便溏脈虛細此陰虛發熱法當養陰逍遙散四物湯主之若氣血兩虛而發熱者八珍湯補之若元氣大虛變症百出難以名狀不問其脈不論其病但用人參養榮湯諸症自退經云甘溫能除大熱如或誤用寒涼反伐生氣多致不救清骨散柴胡白芍各一錢秦艽七分甘草五分丹皮地骨皮青蒿鱉甲各一錢二分知母黃芩胡黃連各四分水煎服加童便尤妙凡逍遙四物八珍方內皆可加入逍遙散方見類中治肝經血虛煩躁口渴胸脅刺痛頭眩心悸頰赤口苦發熱盜汗食少嗜臥又治女人經血不調臍腹脹痛寒熱如瘧並治室女經閉痰嗽潮熱肌瘦勞熱等證四物湯大熟地自制當歸白芍各一錢五分川芎五分水煎服加丹皮麥冬玉竹山藥茯苓退虛熱至效八珍湯治氣血虛發熱潮熱人參白朮茯苓甘草炙熟地當歸白芍各一錢川芎五分棗二枚水煎服本方加黃耆肉桂名十全大補湯加丹皮黑山梔柴胡名加味八珍湯人參養榮湯白芍炒二錢人參黃耆蜜當歸白朮熟地各一錢五分甘草炙茯苓遠志去心泡各七分北五味桂心陳皮各四分姜一片棗二枚水煎服戊字號方治肺痿肺癰久咳不止時吐白沫如米粥者名曰肺痿此火盛金傷肺熱而金化也保和湯主之咳嗽吐膿血咳引胸中痛此肺內生毒也名曰肺癰加味桔梗湯主之保和湯治肺痿知母蒸五分貝母二錢天冬去心麥冬去心一錢苡仁五錢北五味十粒甘草桔梗馬兜鈴百合阿膠蛤粉炒成珠各八分薄荷二分水煎入飴糖一匙溫服虛者加人參加味桔梗湯治肺癰桔梗去蘆白芨橘紅甜葶藶微炒各八分甘草節貝母各一錢五分苡仁金銀花各五錢水煎服初起加荊芥防風各一錢潰後加人參黃耆各一錢己字號方治咽痛音啞喉瘡夫勞症至此乃真陰枯涸虛陽上泛之危症多屬難起宜用六味丸滋腎水而以治標之法佐之可也百藥煎散治咽痛百藥煎五錢硼砂一錢五分甘草二錢為末每服一錢米飲調食後細細嚥之通音煎治音啞白蜜一斤川貝母去心為末一兩款冬花去梗為末二兩胡桃肉去衣研爛十二兩上四味和勻飯後蒸熟不拘時開水點服柳華散治喉瘡並口舌生瘡咽喉腫痛諸症真青黛蒲黃炒黃柏炒人中白各一兩冰片三分硼砂五錢共為細末吹喉極效庚字號方治男子夢遺精滑其夢而遺者相火之強也不夢而遺者心腎之衰也宜分別之秘精丸有相火必生濕熱則水不清不清則不固故本方以理脾導濕為先濕祛水清而精自止矣治濁之法亦然白朮山藥茯苓茯神蓮子肉去心蒸各二兩芡實四兩蓮花須牡蠣各一兩五錢黃柏五錢車前子三兩共為末金櫻膏為丸如桐子大每服七八十丸開水下氣虛者加人參一兩十補丸氣旺則能攝精時下體虛者眾服此累效黃耆白朮各二兩茯苓山藥各一兩五錢人參一兩大熟地三兩當歸白芍各一兩山萸肉杜仲續斷各二兩棗仁二兩遠志一兩北五味龍骨牡蠣各七錢五分金櫻膏為丸每服四錢開水下辛字號方治女人經血不調並治室女經閉成損按女人經水不調乃氣血不和其病尤淺室女經閉則水源斷絕其病至深夫所謂天癸者癸生於子天一所生之本也所謂月經者經常也反常則災病至矣室女乃血氣完足之人尤不宜閉閉則鬢髮焦咳嗽發熱諸病蜂起勢難為也澤蘭湯調經通血脈治經閉澤蘭二錢柏子仁當歸白芍熟地牛膝茺蔚子各一錢五分水煎服益母勝金丹熟地當歸各四兩白芍酒炒三兩川芎一兩五錢牛膝二兩白朮香附酒醋薑汁鹽水各炒一次丹參茺蔚子各四兩益母草一斤酒水各半熬膏和煉蜜為丸每早開水下三錢晚用清酒下二錢經水後期而來小腹冷痛為寒加肉桂五錢經水先期妄行自覺血熱加丹皮二兩酒炒條芩五錢凡遇經水作痛乃血凝氣滯加延胡索一兩壬字號方治傳屍勞瘵驅邪殺蟲勞症之有蟲如樹之有蠹去其蠹而後培其根則樹木生長勞症不去蟲而徒恃補養未見其受益者古法具在不可廢也驅蟲丸明雄黃一兩蕪荑雷丸鬼箭羽各五錢獺肝一具丹參一兩五錢麝香二分五釐煉蜜丸如桐子大每食後開水下十丸日三服紫金丹亦效或用真蘇合香丸治之尤佳癸字號方補五臟虛損凡病邪之所湊其氣必虛況由虛致病者乎則補法為最要難經云損其肺者益其氣損其心者和其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精按法主之補天大造丸補五臟虛損人參二兩黃耆蜜炙白朮陳土蒸各三兩當歸酒蒸棗仁去殼炒遠志去心甘草水泡炒白芍酒炒山藥乳蒸茯苓乳蒸各一兩五錢枸杞子酒蒸大熟地九蒸曬各四兩河車一具甘草水洗鹿角一斤熬膏龜板八兩與鹿角同熬膏以龜鹿膠和藥加煉蜜為丸每早開水下四錢陰虛內熱甚者加丹皮二兩陽虛內寒者加肉桂五錢咳嗽咳嗽症虛勞門已言之而未詳及外感諸病因故再言之肺體屬金譬若鍾然鍾非叩不鳴風寒暑濕燥火六淫之邪自外擊之則鳴勞欲情志飲食炙爆之火自內攻之則亦鳴醫者不去其鳴鐘之具而日磨銼其鍾將鍾損聲嘶而鳴之者如故也鍾其能保乎吾願治咳者作如是觀大法風寒初起頭痛鼻塞發熱惡寒而咳嗽者用止嗽散加荊芥防風蘇葉生薑以散邪既散而咳不止專用本方調和肺氣或兼用人參胡桃湯以潤之若汗多食少此脾虛也用五味異功散加桔梗補脾土以生肺金若中寒入里而咳者但溫其中而咳自止若暑氣傷肺口渴煩心溺赤者其症最重用止嗽散加黃連黃芩花粉以直折其火若濕氣生痰痰涎稠黏者用止嗽散加半夏茯苓桑白皮生薑大棗以祛其濕若燥火焚金乾咳無痰者用止嗽散加栝蔞貝母知母柏子仁以潤燥此外感之治法也然外感之邪初病在肺肺咳不已則移於五臟臟咳不已則移於六腑須按內經十二經見證而加減如法則治無不痊經云咳而喘息有音甚則唾血者屬肺臟此即風寒咳血也止嗽散加荊芥紫蘇赤芍丹參咳而兩脅痛不能轉側屬肝臟前方加柴胡枳殼赤芍咳而喉中如梗狀甚則咽腫喉痹屬心臟前方倍桔梗加蒡子咳而右脅痛陰引肩背甚則不可以動動則咳劇屬脾臟前方加葛根秦艽鬱金咳而腰背痛甚則咳涎者屬腎臟前方加附子咳而嘔苦水者屬膽腑前方加黃芩半夏生薑咳而失氣者屬小腸腑前方加芍藥咳而嘔嘔甚則長蟲出屬胃腑前方去甘草加烏梅川椒乾薑有熱佐之以黃連咳而遺屎屬大腸腑前方加白朮赤石脂咳而遺溺屬膀胱腑前方加茯苓半夏久咳不止三焦受之其證腹滿不食令人多涕唾面目浮腫氣逆以止嗽散合五味異功散並用投之對症其效如神又以內傷論前症若七情氣結鬱火上衝者用止嗽散加香附貝母柴胡黑山梔若腎經陰虛水衰不能制火內熱脈細數者宜朝用地黃丸滋腎水午用止嗽散去荊芥加知母貝母以開火鬱仍佐以葳蕤胡桃湯若客邪混合肺經變生虛熱者更佐以團魚丸若病勢深沉變為虛損或屍蟲入肺喉癢而咳者更佐以月華丸若內傷飲食口乾痞悶五更咳甚者乃食積之火至此時流入肺經用止嗽散加連翹山楂麥芽卜子若脾氣虛弱飲食不思此氣弱也用五味異功散加桔梗此內傷之治法也凡治咳嗽貴在初起得法為善經云微寒微咳咳嗽之因屬風寒者十居其九故初治必須發散而又不可以過散不散則邪不去過散則肺氣必虛皆令纏綿難愈薛立齋云肺有火則風邪易入治宜解表兼清肺火肺氣虛則腠理不固治宜解表兼補肺氣又云肺屬辛金生於己土久咳不已必須補脾土以生肺金此誠格致之言也然清火之藥不宜久服無論脈之洪大滑數數劑後即宜捨去但用六味丸頻頻服之而兼以白蜜胡桃潤之其咳自住若脾肺氣虛則用五味異功散六君子等藥補土生肺反掌收功為至捷也治咳者宜細加詳審患咳者宜戒口慎風毋令久咳不除變為肺痿肺疽虛損勞瘵之候慎之戒之止嗽散治諸般咳嗽桔梗炒荊芥紫菀蒸百部蒸白前蒸各二斤甘草炒十二兩陳皮水洗去白一斤共為末每服三錢開水調下食後臨臥服初感風寒生薑湯調下予制此藥普送只前七味服者多效或問藥極輕微而取效甚廣何也予曰藥不貴險峻惟期中病而已此方系予苦心揣摩而得也蓋肺體屬金畏火者也過熱則咳金性剛燥惡冷者也過寒亦咳且肺為嬌臟攻擊之劑既不任受而外主皮毛最易受邪不行表散則邪氣留連而不解經曰微寒微咳寒之感也若小寇然啟門逐之即去矣醫者不審妄用清涼酸澀之劑未免閉門留寇寇欲出而無門必至穿逾而走則咳而見紅肺有二竅一在鼻一在喉鼻竅貴開而不閉喉竅宜閉而不開今鼻竅不通則喉竅將啟能無慮乎本方溫潤和平不寒不熱既無攻擊過當之虞大有啟門驅賊之勢是以客邪易散肺氣安寧宜其投之有效歟附論於此以諮明哲人參胡桃湯止嗽定喘人參五分胡桃肉三錢連衣研生薑三片水煎服本方以葳蕤易生薑名葳蕤胡桃湯治陰虛症又方用白蜜二斤胡桃肉二斤隔湯燉熟開水點服不拘時五味異功散六味丸團魚丸月華丸俱見虛勞六君子湯見類中喘經云諸病喘滿皆屬於熱蓋寒則息微而氣緩熱則息粗而氣急也由是觀之喘之屬火無疑矣然而外感寒邪以及脾腎虛寒皆能令喘未便概以火斷也假如風寒外客而喘者散之直中於寒而喘者溫之熱邪傳裡便閉而喘者攻之暑熱傷氣而喘者清而補之濕痰壅遏而喘者消之燥火入肺而喘者潤之此外感之治法也各詳本門若夫七情氣結鬱火上衝者疏而達之加味逍遙散腎水虛而火上炎者壯水制之知柏八味丸腎經真陽不足而火上泛者引火歸根桂附八味丸若因脾虛不能生肺而喘者五味異功散加桔梗補土生金此內傷之治法也夫外感之喘多出於肺內傷之喘未有不由於腎者經云諸痿喘嘔皆屬於下定喘之法當於腎經責其真水真火之不足而主之如或脾氣大虛則以人參白朮為主參術補脾土以生肺金金旺則能生水乃隔二隔三之治也更有哮症與喘相似呀呷不已喘息有音此表寒束其內熱致成斯疾加味甘桔湯主之止嗽散亦佳古今治喘哮症方論甚繁大意總不出此加味逍遙散見類中知柏八味丸即六味丸加知母黃柏桂附八味丸俱見類中五味異功散見虛證加味甘桔湯治喘定哮甘草五分桔梗川貝母百部白前橘紅茯苓旋覆花各一錢五分水煎服止嗽散見傷寒咳嗽吐血暴吐血以祛瘀為主而兼之降火久吐血以養陰為主而兼之理脾古方四生丸十灰散花蕊散祛瘀降火之法也古方六味湯四物湯四君子湯養陰補脾之法也然血症有外感內傷之不同假如咳而喘息有音甚則吐血者此風寒也加味香蘇散散之務農赤日行旅長途口渴自汗而吐血者此傷暑也益元散清之夏令火炎更乘秋燥發為乾咳脈數大而吐血者此燥火焚金也三黃解毒湯降之此外感之治法也又如陰虛吐血者初用四生丸十灰散以化之兼用生地黃湯以清之吐止則用地黃丸補之陽虛大吐血成升斗者初用花蕊石散以化之隨用獨參湯以補之繼則用四君八珍等以調之臟寒吐血如天寒地凍水凝成冰也用理中湯以溫之其或七情氣結怒動肝火者則用加味逍遙散以疏達之傷力吐血者則用澤蘭湯行之此內傷之治法也夫血以下行為順上行為逆暴吐之時氣血未衰飲食如常大便結實法當導之下行病勢既久氣血衰微飲食漸減大便不實法當養陰血兼補脾氣大凡吐血咯血須用四君子之類以收功蓋陰血生於陽氣脾氣旺則能生血耳治者念之四生丸見虛證十灰散祛瘀生新止血之良劑大薊小薊茅根茜根老絲瓜山梔蒲黃荷葉大黃亂髮燒灰存性每服二三錢藕湯調下花蕊石散六味湯四物湯四君子湯並見虛證加味香蘇散即香蘇散加山梔丹皮丹參方見傷寒太陽證益元散見類中三黃解毒湯見傷寒生地黃湯見虛證獨參湯八珍湯見虛證理中湯見中寒加味逍遙散見類中澤蘭湯見後腰痛頭痛頭為諸陽之會清陽不升則邪氣乘之致令頭痛然有內傷外感之異外感風寒者宜散之熱邪傳入胃腑熱氣上攻者宜清之直中證寒氣上逼者宜溫之治法詳見傷寒門茲不贅然除正風寒外復有偏頭風雷頭風客寒犯腦胃火上衝痰厥頭痛大頭天行破腦傷風眉稜骨痛眼眶痛等證更有真頭痛朝不保暮勢更危急皆宜細辨偏頭風者半邊頭痛有風熱有血虛風熱者筋脈抽搐或鼻塞常流濁涕清空膏主之血虛者晝輕夜重痛連眼角逍遙散主之雷頭風者頭痛而起核塊或頭中雷鳴多屬痰火清震湯主之客寒犯腦者腦痛連齒手足厥冷口鼻氣冷羌活附子湯主之胃火上衝者脈洪大口渴飲冷頭筋扛起者加味升麻湯主之痰厥頭痛者胸膈多痰動則眩暈半夏白朮天麻湯主之腎厥頭痛者頭重足浮腰膝痠軟經所謂下虛上實是也腎氣衰則下虛浮火上泛故上實也然腎經有真水虛者脈必數而無力有真火虛者脈必大而無力水虛六味丸火虛八味丸大頭天行者頭腫大甚如斗時疫之證也輕者名發頤腫在耳前後皆火鬱也普濟消毒飲主之更加針砭以佐之破腦傷風者風從破處而入其症多發搐搦防風散主之眉稜骨痛或眼眶痛俱屬肝經見光則頭痛者屬血虛逍遙散痛不可開者屬風熱清空膏真頭痛者多屬陽衰頭統諸陽而腦為髓海不任受邪若陽氣大虛腦受邪侵則發為真頭痛手足青至節勢難為矣速用補中益氣湯加蔓荊子川芎附子並進八味丸間有得生者不可忽也清空膏羌活防風各六分柴胡五分黃芩半生半炒一錢二分川芎四分甘草炙一錢薄荷三分黃連酒炒六分水煎服逍遙散見虛勞加味清震湯升麻一錢蒼朮一錢青荷葉一個全用甘草炙陳皮各八分蔓荊子荊芥各一錢五分薄荷五分水煎服羌活附子散羌活一錢附子乾薑各五分炙甘草八分水煎服加味升麻湯升麻葛根赤芍甘草各一錢石膏二錢薄荷三分燈心二十節水煎服半夏白朮天麻湯半夏一錢五分白朮天麻陳皮茯苓各一錢甘草炙五分生薑二片大棗三個蔓荊子一錢虛者加人參水煎服六味丸八味丸見類中普濟消毒飲治大頭症腫甚者宜砭之甘草桔梗黃芩酒炒黃連酒炒各一錢馬勃元參橘紅柴胡各五分薄荷六分升麻二分連翹牛蒡子炒各八分水煎服體虛加人參五分便閉加大黃酒煨一錢愚按此症須用貝母人中黃荷葉為妙發頤症倍柴胡加丹皮喉嚨腫痛倍桔梗甘草砭法以上細瓷鋒用竹片夾定緊扎放鋒出半分對患處另以箸敲之遍刺腫處俾紫血多出為善刺畢以精肉貼片時再用雞子清調乳香末潤之此地不宜成膿頭內中空耳前後更多曲折提膿拔毒恆多不便故針砭斷不可少針法以小布針兩枚手法扣定露鋒纖少遍刺腫處血出立松更敷前藥自然消散用針砭時須正心誠意咬定牙齒下手刺之防風散治破腦傷風防風生南星炮等分上為末每服二錢童便沖酒調服補中益氣湯見類中心痛當胸之下岐骨陷處屬心之部位其發痛者則曰心痛然心不受邪受邪則為真心痛旦暮不保矣凡有痛者胞絡受病也胞絡者心主之宮城也寇凌宮禁勢已可危而況犯主乎故治之宜亟亟也心痛有九種一曰氣二曰血三曰熱四曰寒五曰飲六曰食七曰虛八曰蟲九曰疰宜分而治之氣痛者氣壅攻刺而痛遊走不定也沉香降氣散主之血痛者痛有定處而不移轉側若刀錐之刺手拈散主之熱痛者舌燥唇焦溺赤便閉喜冷畏熱其痛或作或止脈洪大有力清中湯主之寒痛者其痛暴發手足厥冷口鼻喜冷喜熱畏寒其痛綿綿不休脈沉細無力姜附湯加肉桂主之飲痛者水飲停積也乾嘔吐涎或咳或噎甚則搖之作水聲脈弦滑小半夏加茯苓湯主之食痛者傷於飲食心胸脹悶手不可按或吞酸噯腐脈緊滑保和湯主之虛痛者心悸怔忡以手按之則痛止歸脾湯主之蟲痛者面白唇紅或唇之上下有白斑點或口吐白沫飢時更甚化蟲丸主之疰痛者觸冒邪祟卒爾心痛面目青暗或昏憒譫語脈來乍大乍小或兩手如出兩人神朮散蔥白酒生薑湯並主之此治心痛之大法也或問久痛無寒暴痛無火然乎否乎答曰此說亦宜斟酌如人宿有積熱或受暑濕之熱或熱食所傷而發則暴痛亦屬火矣豈宜熱藥療之如人本體虛寒經年累月憑發無休是久痛亦屬寒矣豈宜寒藥療之且凡病始受熱中末傳寒中者比比皆是必須臨症審確逐一明辨斯無誤也又或謂諸痛為實痛無補法亦非也如人果屬實痛則不可補若屬虛痛必須補之虛而寒者則宜溫補並行若寒而不虛則專以溫劑主之丹溪云溫即是補若虛而兼火則補劑中須加涼藥此治痛之良法治者宜詳審焉沉香降氣散治氣滯心痛沉香細銼三錢砂仁七錢甘草炙五錢香附鹽水炒五錢元胡索酒炒一兩川楝子煨去肉淨一兩共為末每服二錢淡薑湯下手拈散治血積心痛元胡索醋炒香附酒炒五靈脂去土醋炒沒藥箬上炙乾等分共為細末每服三錢熱酒調下血老者用紅花五分桃仁十粒煎酒調下清中湯治熱厥心痛香附陳皮各一錢五分黑山梔金鈴子即川楝子元胡索各八分甘草炙五分川黃連薑汁炒一錢水煎服姜附湯見諸方補遺治寒厥心痛又真心痛手足青至節宜用本方大劑飲之或救十中之一二若痛時喜手緊按更加人參小半夏加茯苓湯見傷寒咳嗽保和湯治傷食心痛麥芽山楂卜子厚朴香附各一錢甘草連翹各五分陳皮一錢五分水煎服歸脾湯治氣血虛弱以致心痛黃耆一錢五分白朮人參茯神棗仁當歸各一錢遠志七分木香甘草炙各五分元眼肉五枚水煎服若挾肝火加柴胡山梔丹皮各一錢化蟲丸治蟲齧心痛蕪荑去梗白雷丸各五錢檳榔二錢五分雄黃一錢五分木香白朮陳皮各三錢神麯炒四錢以百部二兩熬膏糊丸如桐子大每服一錢五分米飲下如取下蟲積加大黃五錢酒炒神朮散見中食胸痛胸者肺之分野然少陽膽經受病亦令胸痛此邪氣初傳入里而未深入於裡故胸痛也古方用柴胡湯加枳殼治之如未應本方兌小陷胸湯一服其效如神又風寒在肺胸滿痛氣喘宜用甘桔湯加理氣散風之劑又飲食填塞者宜用吐法其肺癰肺痿二證詳見虛勞茲不贅柴胡湯見傷寒少陽證甘桔湯見傷寒咽痛脅痛傷寒脅痛屬少陽經受邪用小柴胡湯雜症脅痛左為肝氣不和用柴胡疏肝七情鬱結用逍遙散若兼肝火痰飲食積瘀血隨症加藥右為肝移邪於肺用推氣散凡治實證脅痛左用枳殼右用鬱金皆為的劑然亦有虛寒作痛得溫則散按之則止者又宜溫補不可拘執也小柴胡湯見傷寒柴胡疏肝散治左脅痛柴胡陳皮各一錢二分川芎赤芍枳殼麩炒香附醋炒各一錢甘草炙五分水煎服唇焦口渴乍痛乍止者火也加山梔黃芩肝經一條扛起者食積也加青皮麥芽山楂痛有定處而不移日輕夜重者瘀血也加歸尾紅花桃仁牡丹皮乾嘔咳引脅下痛者停飲也加半夏茯苓喜熱畏寒欲得熱手按者寒氣也加肉桂吳茱萸逍遙散見虛勞推氣散治右脅痛枳殼一錢鬱金一錢桂心甘草炙各五分桔梗陳皮各八分姜二片棗二枚水煎散栝蔞散治肝氣燥急而脅痛或發水泡大栝蔞連皮搗爛一枚粉甘草二錢紅花七分水煎服按鬱火日久肝氣燥急不得發越故皮膚起泡轉為脹痛經云損其肝者緩其中栝蔞為物甘緩而潤於郁不逆又如油之洗物滑而不滯此其所以奏功也胃脘痛胃脘痛治法與心痛相仿但停食一症其脹痛連胸者吐之脹痛連腹者下之其食積之輕者則用神朮散消之又有胃脘癰症嘔而吐膿血者不得妄治書云嘔家有膿不須治嘔膿儘自愈神朮散方見食中腹痛腹中痛其寒熱食積氣血蟲蠱辨法亦與心痛相符惟有肝木乘脾攪腸痧腹內癰茲三症有不同耳經云諸痛皆屬於肝肝木乘脾則腹痛仲景以芍藥甘草湯主之甘草味甘甘者己也芍藥味酸酸者甲也甲己化土則肝木平而腹痛止矣傷寒症中有由少陽傳入太陰而腹痛者柴胡湯加芍藥有因誤下傳入太陰而腹痛者桂枝湯加芍藥即同此意尋常腹痛全在寒熱食積分別詳明為主凡腹痛乍作乍止脈洪有力熱也以芍藥甘草湯加黃連清之若噯腐吞酸飽悶膨脹腹中有一條扛起者是食積也保和丸消之消之而痛不止便閉不行腹痛拒按者三黃枳朮丸下之設或下後仍痛以手按其腹若更痛者積未盡也仍用平藥再消之若按之痛止者積已去而中氣虛也五味異功散補之若消導攻下之後漸變寒中遂至惡冷喜熱須易溫中之劑此火痛兼食之治法也若腹痛綿綿不減脈遲無力者寒也香砂理中湯溫之若兼飽悶脹痛是有食積不便驟補香砂二陳湯加薑桂楂芽厚朴溫而消之消之而痛不止大便反閉名曰陰結以木香丸熱藥下之下後仍以溫劑和之如寒痛兼食之治法也若因濁氣壅塞走注疼痛木香調氣散散之若因瘀血積聚呆痛不移澤蘭湯行之蟲齧而痛唇有斑點飢時更甚化蟲丸消之傷暑霍亂四味香薷飲解之更有乾霍亂症欲吐不得吐欲瀉不能瀉變在須臾俗名攪腸痧是也更有遍體紫黑者名曰烏痧脹急用燒鹽和陰陽水吐之或用四陳湯服之外用武侯平安散點左右大眼角其人即蘇其腹內癰一症當臍腫痛轉側作水聲小便如淋千金牡丹皮散化之古方治腹痛症多以寒者為虛熱者為實未盡然也蓋寒證亦有實痛者熱證亦有虛痛者如寒痛兼食則為實矣挾熱久痢則為虛矣凡看症之法寒熱虛實互相辨明斯無誤也芍藥甘草湯止腹痛如神白芍藥酒炒三錢甘草炙一錢五分水煎服脈遲為寒加乾薑脈洪為熱加黃連脈緩為濕加蒼朮生薑脈澀傷血加當歸脈弦傷氣加芍藥保和丸見心痛消食積清濕熱腹中有一條扛起者是食積也舌乾口燥是濕熱也本方主之有熱加黃連三黃枳朮丸消熱食除積滯腹痛拒按便閉溺赤名曰陽結宜用本方若冷食所傷宜用木香丸若冷熱互傷須酌其所食冷熱之多寡而並用之此東垣法也黃芩一兩黃連五錢大黃七錢五分神麯白朮枳實陳皮各五錢荷葉一枚煎水迭為丸量虛實用五味異功散見虛寒香砂理中湯見中寒治客寒犯胃其症手足厥冷口鼻氣冷其痛綿綿不止喜熱畏寒脈沉細不比熱痛乍止乍作喜冷畏熱唇焦舌燥口渴脈洪也寒熱之別相隔千里香砂二陳湯見類中即二陳湯加木香砂仁木香丸治寒積冷食腹痛拒按或大便閉結謂之冷閉名曰陰結本方攻之木香丁香各一錢五分乾薑三錢麥芽炒五錢陳皮三錢巴豆去殼炒黑三十粒神麯煮糊為丸每服十丸或二十丸開水下痛甚者倍之所食之物應隨利出如利不止以冷粥飲之即止木香調氣散見類中澤蘭湯見吐血化蟲丸見心痛四味香薷飲見傷暑諸葛武侯平安散硃砂二錢麝香冰片各五釐明雄黃硼砂各五分白硝二分共研極細末用小瓷罐收貯每用清水以骨簪點二三釐在大眼角內如點眼藥法點後忌熱茶飲食半日即愈四陳湯陳皮去白陳香櫞去穰陳枳殼去穰麵炒陳茶葉等分為末每服三錢開水點服千金牡丹皮散治腹內癰牡丹皮三錢苡仁五錢桃仁十粒栝蔞仁去殼去油淨二錢水煎服小腹痛書云大腹屬太陰當臍屬少陰小腹屬厥陰傷寒傳至厥陰少腹痛甚此熱邪也宜下之若熱結在裡蓄血下焦亦宜下之若直中厥陰小腹冷痛則為寒邪宜溫下治法已詳本門尋常少腹痛多屬疝瘕奔豚之類書云男子外結七疝女子帶下瘕聚古人更有痃癖癥瘕之名皆一類也痃如弓弦筋扛起也癖者隱闢沉附著骨也癥則有塊可徵猶積也多屬於血瘕者假也忽聚而忽散氣為之也奔豚者如江豚之上竄冷氣上衝也其癥瘕之氣聚於小腸則曰小腸氣聚於膀胱則曰膀胱氣也小腸氣失氣則快膀胱氣少腹熱若沃以湯澀於小便也凡治少腹痛當用墜降之藥其行氣皆當用核乃能宣達病所以取效也橘核丸奔豚丸並主之橘核丸通治癥瘕痃癖小腸膀胱等氣橘核鹽酒炒二兩川楝子煨去肉山楂子炒香附薑汁浸炒各一兩五錢荔枝核煨研小茴香微炒各一兩神麯四兩煮糊為丸如桐子大每丸三錢淡鹽水下寒甚加附子五錢肉桂三錢當歸一兩有熱加黑山梔七錢又疝氣症表寒束其內熱丹溪以黑山梔吳茱萸並用按此二味若寒熱不調者加入丸中更佳若胞痹小便不利去小茴加茯苓車前子丹參黑山梔身痛身體痛內傷外感均有之如身痛而拘急者外感風寒也身痛如受杖者中寒也身痛而重墜者濕也若勞力辛苦之人一身痠軟無力而痛者虛也治法風則散之香蘇散寒則溫之理中湯濕則燥之蒼白二陳湯虛則補之補中益氣湯大抵身痛多屬於寒蓋熱主流通寒主閉塞也無論風濕與虛挾寒者多挾熱者少治者審之香蘇散見太陽證理中湯見中寒蒼朮二陳湯即二陳湯加蒼朮白朮見類中補中益氣湯見類中肩背臂膊痛肩背痛古方主以茯苓丸謂痰飲為患也而亦有不盡然者凡背痛多屬於風胸痛多屬於氣氣滯則痰凝臟腑之病也背為諸腧之所伏凡風邪襲人必從腧入經絡之病也間有胸痛連背者氣閉其經也亦有背痛連胸者風鼓其氣也治胸痛者理痰氣治背痛者祛風邪此一定之理理痰氣宜用木香調氣散並前丸祛風邪宜用秦艽天麻湯挾寒者加桂附挾虛者以補中益氣加秦艽天麻主之如或風邪痰氣互相鼓煽痰飲隨風走入經絡而肩臂腫痛則煎丸二方須酌量合用治無不效矣茯苓丸茯苓半夏薑汁炒各二兩風化硝枳殼麵炒各五錢薑汁糊丸如桐子大每服二三十丸淡薑湯下木香調氣散見類中秦艽天麻湯秦艽一錢五分天麻羌活陳皮當歸川芎各一錢炙甘草五分生薑三片桑枝酒炒三錢水煎服挾寒加附子桂枝補中益氣湯見類中腰痛腰痛有風有寒有濕有熱有瘀血有氣滯有痰飲皆標也腎虛其本也腰痛拘急牽引腿足脈浮弦者風也腰冷如冰喜得熱手熨脈沉遲或緊者寒也並用獨活湯主之腰痛如坐水中身體沉重腰間如帶重物脈濡細者濕也蒼白二陳湯加獨活主之若腰重疼痛腰間發熱痿軟無力脈弦數者濕熱也恐成痿症前方加黃柏主之若因閃挫跌撲瘀積於內轉側如刀錐之刺大便黑色脈澀或芤者瘀血也澤蘭湯主之走注刺痛忽聚忽散脈弦急者氣滯也橘核丸主之腰間腫按之濡軟不痛脈滑者痰也二陳湯加白朮萆薢白芥子竹瀝薑汁主之腰痛似脫重按稍止脈細弱無力者虛也六君子湯加杜仲續斷主之若兼陰冷更佐以八味丸大抵腰痛悉屬腎虛既挾邪氣必須祛邪如無外邪則惟補腎而已然腎虛之中又須分辨寒熱二證如脈虛軟無力溺清便溏腰間冷痛此為陽虛須補命門之火則用八味丸若脈細數無力便結溺赤虛火時炎此腎氣熱髓減骨枯恐成骨痿斯為陰虛須補先天之水則用六味丸合補陰丸之類不可誤用熱藥以灼其陰治者審之獨活湯治腎虛兼受風寒濕氣獨活桑寄生防風秦艽威靈仙牛膝茯苓各一錢桂心五分細辛甘草炙各三分當歸金毛狗脊各二錢生薑二片水煎服丹溪云久腰痛必用官桂開之方止寒甚者更加附子但有濕熱則二者皆不宜用蒼白二陳湯見類中澤蘭湯治閃挫跌撲瘀血內蓄轉側若刀錐之刺澤蘭三錢丹皮牛膝各二錢桃仁去皮尖研十粒紅花五分當歸尾五錢廣三七一錢赤芍藥一錢五分水煎熱酒沖服如二便不通加酒蒸大黃三錢凡跌撲傷重便溺不通者非大黃不救若大便已通則用廣三七煎酒或山羊血沖酒青木香煎酒隨用一味皆可立止疼痛橘核丸見小腹痛茯苓丸見臂肩痛六君子湯見類中六味丸八味丸見虛勞補陰丸治腎氣熱腰軟無力恐成骨痿熟地三兩丹皮天冬當歸枸杞子牛膝山藥女貞子茯苓龜板杜仲續斷各一兩二錢人參黃柏各五錢石斛四兩熬膏和煉蜜為丸每早淡鹽水下三錢痹鶴膝風蠲痹湯通治風寒濕三氣合而成痹羌活行上力大獨活行下力專各一錢桂心五分秦艽一錢當歸三錢川芎治風先治血七分甘草炙五分海風藤二錢桑枝三錢乳香透明者木香止痛須理氣各八分水煎服風氣勝者更加秦艽防風寒氣勝者加附子濕氣勝者加防己萆薢苡仁痛在上者去獨活加荊芥痛在下者加牛膝間有濕熱者其人舌乾喜冷口渴溺赤腫處熱辣此寒久變熱也去肉桂加黃柏三分松枝酒治白虎歷節風走注疼痛或如蟲行諸般風氣松節桑枝桑寄生鉤藤續斷天麻金毛狗脊虎骨秦艽青木香海風藤菊花五加皮各一兩當歸三兩每藥一兩用生酒二斤煮退火七日飲痛專在下加牛膝虎骨膏丸治鶴膝風並治癱瘓諸症虎骨二斤銼碎洗淨用嫩桑枝金毛狗脊去毛白菊花去蒂各十兩秦艽二兩煎水熬虎骨成膠收起如蜜樣和藥為丸如不足量加煉蜜大熟地四兩當歸三兩牛膝山藥茯苓杜仲枸杞續斷桑寄生各二兩熟附子七錢厚肉桂去皮不見火五錢丹皮澤瀉八錢人參二兩貧者以黃耆四兩代之上為末以虎骨膠為丸每早開水下三錢普救萬全膏治一切風氣走注疼痛以及白虎歷節風鶴膝風寒濕流注癰疽發背疔瘡瘰癧跌打損傷腹中食積痞塊多年瘧母頑痰瘀血停蓄腹痛泄利小兒疳積女人癥瘕諸症並貼患處咳嗽瘧疾貼背脊心第七椎予制此膏普送取效神速倘貼後起泡出水此病氣本深盡為藥力拔出吉兆也不必疑懼記之記之藿香白芷當歸尾貝母大楓子木香白蘞烏藥生地蘿蔔子丁香白芨殭蠶細辛蓖麻子檀香秦艽蜂房防風五加皮苦參肉桂蟬蛻丁皮白鮮皮羌活桂枝全蠍赤芍高良薑元參南星鱉甲荊芥兩頭尖獨活蘇木枳殼連翹威靈仙桃仁牛膝紅花續斷花百頭杏仁蒼朮艾絨藁本骨碎補川芎黃芩麻黃甘草黑山梔川烏附子牙皂半夏草烏紫荊皮青風藤以上各一兩五錢大黃三兩蜈蚣三十五條蛇蛻五條槐枝桃枝柳枝桑枝楝枝榆枝楮枝以上各三十五寸男人血餘三兩以上俱浸油內真麻油十五斤用二十兩秤稱松香棕皮濾淨一百斤百草霜細研篩過十斤冬浸九宿春秋七宿夏五宿分數次入鍋文武火熬以藥枯油黑滴水成珠為度濾去渣重稱每藥油十二兩下濾淨片子松香四斤同熬至滴水不散每鍋下百草霜細末六兩勿住手攪俟火候成則傾入水缸中以棒攪和成塊用兩人扯拔數次瓷缽收貯治一切風寒濕氣瘡疽等症其效如神又法治瘡疽用血丹收更妙每油一斤用丹六兩痿痿大症也諸痿生於肺熱經云五臟因肺熱葉焦發為痿躄肺氣熱則皮毛先痿而為肺鳴心氣熱則脈痿脛縱不任地肝氣熱則筋痿口苦而筋攣脾氣熱則肉痿肌膚不仁腎氣熱則骨痿腰脊不舉丹溪治法瀉南方補北方瀉南方則肺金不受刑補北方則心火自下降俾西方清肅之令下行庶肺氣轉清筋脈骨肉之間濕熱漸消而痿可愈也然經云治痿獨取陽明何也蓋陽明為臟腑之海主潤宗筋宗筋主束骨而利機關也陽明虛則宗筋縱帶脈不引故足痿不用也由前論之則曰五臟有熱由後論之則曰陽明之虛二說似異而實同蓋陽明胃屬濕土土虛而感寒熱之化則母病傳子肺金受傷而痿症作矣是以治痿獨取陽明也取陽明者所以祛其濕瀉南補北者所以清其熱治痿之法不外補中祛濕養陰清熱而已矣五痿湯治五臟痿人參白朮茯苓各一錢甘草炙四分當歸一錢五分苡仁三錢麥冬二錢黃柏炒褐色知母各五分水煎服心氣熱加黃連三分丹參生地各一錢肝氣熱加黃芩丹皮牛膝各一錢脾氣熱加連翹一錢生地一錢五分腎氣熱加生地牛膝石斛各一錢五分肺氣熱加天冬百合各二錢挾痰加川貝竹瀝濕痰加半夏曲瘀血加桃仁紅花如氣血兩虛另用十全大補湯腎肝虛熱髓減骨枯兼用虎潛丸主之十全大補湯見虛勞虎潛丸龜板四兩杜仲熟地各三兩黃柏炒褐色知母各五錢牛膝白芍藥虎骨酒炙酥當歸各二兩陳皮四錢乾薑二錢為末酒糊丸每服二錢淡鹽水下加人參一兩尤妙腳氣腳氣者腳下腫痛即痹症之類也因其痛專在腳故以腳氣名之其腫者名濕腳氣不腫者名乾腳氣濕腳氣水氣勝也檳榔散主之乾腳氣風氣勝也四物湯加牛膝木瓜主之檳榔散腳氣謂之壅疾不宜驟補檳榔牛膝防己獨活秦艽各一錢青木香天麻赤芍各八分桑枝二錢當歸五分水煎服四物湯見虛證癘風癘風癩也俗稱大麻風濕熱在內而為風鼓之則肌肉生蟲白屑重迭搔癢頑麻甚則眉毛脫落鼻柱崩壞事不可為矣治法清濕熱祛風邪以苦參湯地黃酒並主之外以當歸膏塗之往往取效未可遽視為廢疾而忽之也苦參湯苦參一錢五分生地二錢黃柏五分當歸秦艽蒡子赤芍白蒺藜丹參丹皮銀花貝母各一錢加甘菊三錢水煎服地黃酒生地二兩黃柏苦參丹參萆薢菊花銀花丹皮赤芍當歸枸杞子蔓荊子赤茯苓各一兩秦艽獨活威靈仙各五錢桑枝一兩五錢烏梢蛇去頭尾一具上煮好頭生酒五十斤退火七日用加味當歸膏治一切瘡疹並癰腫收口皆效當歸生地各一兩紫草木鱉子肉去殼麻黃大楓子肉去殼研防風黃柏元參各五錢麻油八兩黃蠟二兩先將前九味入油熬枯濾去渣再將油復入鍋內熬至滴水成珠再下黃蠟試水中不散為度傾入蓋碗內坐水中出火三日聽搽噎膈古方治噎膈多以止吐之劑通用不思吐濕症也宜燥噎膈燥症也宜潤經云三陽結謂之隔結結熱也熱甚則物乾凡噎膈症不出胃脘乾槁四字槁在上脘者水飲可行食物難入槁在下脘者食雖可入久而復出夫胃既槁矣而復以燥藥投之不愈益其燥乎是以大小半夏湯在噎膈門為禁劑予嘗用啟膈散開關更佐以四君子湯調理脾胃挾郁者則用逍遙散主之雖然藥逍遙而人不逍遙亦無益也張雞峰云此症乃神思間病法當內觀靜養斯言深中病情然其間有挾蟲挾血挾痰與食而為患者皆當按法兼治不可忽也啟膈散通噎膈開關之劑屢效沙參三錢丹參三錢茯苓一錢川貝母去心一錢五分鬱金五分砂仁殼四分荷葉蒂二個杵頭糠五分水煎服虛者加人參前症若兼蟲積加胡連蕪荑甚則用河間雄黃散吐之若兼血積加桃仁紅花或另以生韭汁飲之若兼痰積加廣橘紅若兼食積加卜子麥芽山楂此症有生蛇𧈭者華佗以醋蒜食之令飽則吐物而出真神法也四君子湯見虛證調中散通噎膈開關和胃北沙參三兩荷葉去筋淨一兩廣陳皮浸去白一兩茯苓一兩川貝母去心黏米拌炒一兩丹參三兩陳倉米炒熟三兩五穀蟲酒炒焦黃一兩共為細末每用米飲調下二錢日二服逍遙散見類中河間雄黃散雄黃瓜蒂赤小豆各一錢共為細末每服五分溫水調滴入狗油數匙服下以吐為度吐去膈間小蟲隨用五味異功散安之續用逍遙散調之痢疾古人治痢多用墜下之品如檳榔枳實厚朴大黃之屬所謂通因通用法非不善矣然而效者半不效者半其不效者每至纏綿難愈或嘔逆不食而成敗症者比比皆是予為此症仔細揣摩不捨置忽見燭光遂恍然有得因思火性炎上者也何以降下於腸間而為痢良由積熱在中或為外感風寒所閉或為飲食生冷所遏以致火氣不得舒伸逼迫於下裡急而後重也醫者不察更用檳榔等藥下墜之則降者愈降而痢愈甚矣予因制治痢散以治痢症初起之時方用葛根為君鼓舞胃氣上行也陳茶苦參為臣清濕熱也麥芽山楂為佐消宿食也赤芍藥廣陳皮為使所謂行血則便膿自愈調氣則後重自除也製藥普送效者極多惟於腹中脹痛不可手按者此有宿食更佐以樸黃丸下之若日久脾虛食少痢多者五味異功散加白芍黃連木香清而補之氣虛下陷者補中益氣湯升提之若邪熱穢氣塞於胃脘嘔逆不食者開噤散啟之若久痢變為虛寒四肢厥冷脈微細飲食不消者附子理中湯加桂溫之夫久痢必傷腎不為溫暖元陽誤事者眾矣可不謹歟治痢散專治痢疾初起之時不論赤白皆效葛根苦參酒炒陳皮陳松蘿茶各一斤赤芍酒炒麥芽炒山楂炒各十二兩上為細末每服四錢水煎連藥末服下小兒減半忌葷腥麵食煎炒閉氣發氣諸物本方加川連四兩尤效樸黃丸治痢疾初起腹中實痛不得手按此有宿食也宜下之陳皮厚朴薑汁炒各十二兩大黃酒蒸一斤四兩廣木香四兩荷葉水迭為丸如綠豆大每服三錢開水下小兒一錢五味異功散即六君子湯除半夏見類中門補中益氣湯見類中開噤散治嘔逆食不入書云食不得入是有火也故用黃連痢而不食則氣益虛故加人參虛人久痢並用此法人參川黃連姜水炒各五分石菖蒲不見鐵七分丹參三錢石蓮子去殼即建蓮中有黑殼者茯苓陳皮陳米一撮冬瓜仁去殼一錢五分荷葉蒂二個水煎服附子理中湯見中寒門泄瀉書云濕多成五瀉瀉之屬濕也明矣然有濕熱有濕寒有食積有脾虛有腎虛皆能致瀉宜分而治之假如口渴溺赤下瀉腸垢濕熱也溺清口和下瀉清穀濕寒也胸滿痞悶噯腐吞酸瀉下臭穢食積也食少便頻面色㿠白脾虛也五更天明依時作瀉腎虛也治瀉神朮散主之寒熱食積隨症加藥脾虛者香砂六君子湯腎虛者加減七神丸凡治瀉須利小便然有食積未消者正不宜利小便必俟食積既消然後利之斯為合法神朮散見類中燥濕理脾消積滯為止瀉之良藥濕熱加連翹濕寒加炮薑木香食積加山楂麥芽神麯香砂六君子湯見類中治脾虛作瀉挾寒者加薑桂甚加附子加味七神丸止腎瀉如神肉豆蔻麵裹煨吳茱萸去梗湯泡七次廣木香各一兩補骨脂鹽酒炒二兩白朮陳土炒四兩茯苓蒸二兩車前子去殼蒸二兩大棗煎湯迭為丸每服三錢開水下瘧疾瘧者暴瘧之狀因形而得名也經曰陰陽相搏而瘧作矣陰搏陽而為寒陽搏陰而為熱如二人交爭此勝則彼負彼勝則此負陰陽互相勝負故寒熱並作也善治瘧者調其陰陽平其爭勝察其相兼之症而用藥得宜應手可愈大法瘧症初起香蘇散散之隨用加減小柴胡湯和之二三發後止瘧丹截之久瘧脾虛六君子湯加柴胡補之中氣下陷補中益氣湯舉之元氣即回瘧症自止書云一日一發者其病淺兩日一發者其病深三日一發者其病尤深然而寒熱往來總在少陽久而不愈總不離乎脾胃蓋胃虛亦惡寒脾虛亦發熱也疏理少陽扶助脾胃治瘧無餘蘊矣香蘇散見傷寒太陽證加減小柴胡湯治瘧症之通劑須按加減法主之柴胡秦艽赤芍各一錢甘草五分陳皮一錢五分生薑一片桑枝二錢水煎服熱多者加黃芩一錢寒多者加黑姜五分口渴甚者加知母一錢貝母一錢五分嘔惡加半夏茯苓各一錢砂仁七分生薑二片汗少者加荊芥一錢川芎五錢汗多者去秦艽減柴胡一半加人參一錢白朮一錢五分飲食停滯胸膈飽悶加麥芽神麯山楂厚朴各一錢如欲止之加白蔻仁八分鱉甲醋炙二錢更另用止瘧丹一二丸截之神效若體虛氣弱加人參黃耆白朮各二錢當歸茯苓各一錢久病成瘧母加白朮一錢木香枳實各五分鱉甲二錢止瘧丹治瘧症二三發後以此止之應手取效常山火酒炒草果仁去殼半夏曲薑汁炒香附米酒炒青皮去穰醋炒各四兩真六神麯十二兩為末用米飲煮糊為丸如彈子大硃砂為衣輕者一丸重者二丸紅棗五六枚煎湯化下清晨面東空腹服六君子湯補中益氣湯俱見類中瘧久變虛宜用前二方主之但真虛者多挾寒須用肉桂附子炮薑砂仁之類溫補元氣甫克收功論水腫鼓脹問曰水腫鼓脹何以別之答曰目窠與足先腫後腹大者水也先腹大後四肢腫者脹也然水腫亦有兼脹者脹亦有兼水者須按其先後多寡而治之今分為兩門治者宜合參焉水腫水腫症有表裡寒熱腎胃之分大抵四肢腫腹不腫者表也四肢腫腹亦腫者里也煩渴口燥溺赤便閉飲食喜涼此屬陽明熱也不煩渴大便自調飲食喜熱此屬陰水寒也先喘而後腫者腎經聚水也先腫而後喘或但腫而不喘者胃經蓄水也經云腎者胃之關也關閉則水積然胃病而關亦自閉矣治胃者五加皮飲加減主之治腎者腎氣丸加減主之或問書云先喘後腫其病在肺何也答曰喘雖肺病其本在腎經云諸痿喘嘔皆屬於下是也若外感致喘或專屬肺經受邪內傷致喘未有不由於腎者治者詳之五皮飲治胃經聚水乃通用之劑華佗中藏經之方也累用累驗大腹皮黑豆汁洗茯苓皮陳皮桑白皮各一錢五分生薑皮八分水煎服仲景云腰以上腫宜發汗加紫蘇秦艽荊芥防風腰以下腫宜利小便加赤小豆赤茯苓澤瀉車前子萆薢防己若大便不通宜下之加大黃葶藶腹中脹滿加卜子厚朴陳皮麥芽山楂體虛者加白朮人參茯苓審是陰水加附子乾薑肉桂審是陽水加連翹黃柏黃芩挾痰者加半夏生薑既消之後宜用理中湯健脾實胃或以金匱丸溫暖命門或以六味加牛膝車前滋腎水清餘熱庶收全功附子理中湯見中寒金匱腎氣丸治腎經聚水小便不利腹脹肢腫或痰喘氣急漸成水蠱其效如神然腎經聚水亦有陰陽之分不可不辨也經云陰無陽無以生陽無陰無以化經又云膀胱者州都之官津液藏焉氣化則能出矣假如腎經陽虛陰無以生真火不能制水者宜用此丸假如腎經陰虛陽無以化真陰不能化氣者宜用本方去附桂主之東垣云土在雨中化為泥陰水之象也河間云夏熱之甚庶土蒸溽陽水之象也知斯意者可以治水矣大熟地八兩山藥四兩山萸肉丹皮澤瀉車前子牛膝各二兩茯苓六兩肉桂一兩附子一兩虛寒甚者倍之用五加皮八兩煮水一大碗濾去渣和藥加煉蜜為丸如梧桐子大每早開水下四錢前症若屬陰虛本方去桂附加文蛤牡蠣各二兩濕熱甚者加黃柏五錢不用五加皮以萆薢八兩熬汁代之論血分水分婦人經水先斷後發腫者名曰血分通經丸主之先發水腫然後經斷者名曰水分五加皮飲送下通經丸主之通經丸當歸尾赤芍藥生地黃川芎牛膝五靈脂各一兩紅花桃紅各五錢香附二兩琥珀七錢五分蘇木屑二兩煎酒和砂糖熬化為丸如桐子大每服三錢酒下體虛者用理中湯送下若血寒加肉桂五錢鼓脹或問方書有鼓脹蠱脹之別何也答曰鼓者中空無物有似於鼓蠱者中實有物非蟲即血也中空無物填實則消經所謂塞因塞用是已中實有物消之則平經所謂堅者削之是已然脹滿有寒熱虛實淺深部位之不同若不細辨何由取效假如溺赤便閉脈數有力色紫黑氣粗厲口渴飲冷唇焦舌燥多屬於熱假如溺清便溏脈細無力色㿠白氣短促喜飲熱湯舌潤口和多屬於寒又如腹脹按之不痛或時脹時減者為虛按之愈痛腹脹不減者為實凡脹滿飲食如常者其病淺飲食減少者其病深且脹有部分縱是通腹脹滿亦必有脹甚之部與病先起處即可知屬何臟腑而用藥必以之為主東坦治脹滿不外枳朮補中二方出入加減寒熱攻補隨症施治予因制和中丸普送效者甚多有力者當修合以濟貧乏又氣虛中滿宜用白朮丸而以六君子湯佐之中空無物不用枳實恐傷氣也枳朮丸除脹消食枳實一兩麵炒白朮二兩陳土炒共為末荷葉包爛飯煨透杵和為丸每服二錢開水下補中益氣湯見類中和中丸白朮陳土炒四兩扁豆炒三兩茯苓一兩五錢枳實麵炒二兩陳皮三兩神麯炒黑麥芽炒山楂炒香附薑汁炒二兩砂仁一兩五錢半夏薑汁炒一兩丹參酒蒸二兩五穀蟲酒拌炒焦黃色三兩荷葉一枚煎水迭為丸每日上午下午開水下二錢此方不寒不熱和平之治法也若寒氣盛加乾薑吳萸肉桂若濕熱盛加黃連連翹若大便閉結先用三黃枳朮丸下之隨用本方漸磨之若兼瘀血加厚朴赤芍若脾氣虛弱用六君子湯吞服此丸或以補中益氣湯送下此醫門之秘法不可不講白朮丸治氣虛中滿白朮茯苓陳皮各二兩砂仁神麯各一兩五錢五穀蟲四兩用荷葉老米煎水迭為丸每服三錢開水下三黃枳朮丸治熱食所傷肚腹脹痛並濕熱脹滿大便閉結者黃芩酒炒一兩黃連酒炒四錢大黃酒蒸七錢五分神麯炒枳實麵炒白朮陳土炒陳皮各五錢荷葉煎水迭為丸如綠豆大每服一錢五分或二三錢量人虛實用六君子湯見類中積聚積者推之不移成於五臟多屬血病聚者推之則移成於六腑多屬氣病治積聚者當按初中末之三法焉邪氣初客積聚未堅宜直消之而後和之若積聚日久邪盛正虛法從中治須以補瀉相兼為用若塊消及半便從末治即住攻擊之藥但和中養胃導達經脈俾榮衛流通而塊自消矣更有虛人患積者必先補其虛理其脾增其飲食然後用藥攻其積斯為善治此先補後攻之法也初治太無神功散主之中治和中丸主之末治理中湯主之予嘗以此三法互相為用往往有功太無神功散治痞積不拘氣血飲食蟲積痰水皆效地萹蓄瞿麥穗大麥芽各五錢神麯二錢五分沉香木香各一錢五分甘草炙五錢大黃酒蒸二兩上為細末每服二三錢燈心竹葉煎湯及無灰酒調服女以燈心紅花當歸煎湯及無灰酒送下忌油膩動氣之物及房室一月藥須黃昏服勿食晚飯大小便見惡物為度和中丸見鼓脹書云肝之積在左脅下名曰肥氣加柴胡鱉甲青皮莪朮肺之積在右脅下名曰息賁加白蔻仁桑白皮鬱金心之積起臍上上至心下大如臂名曰伏梁加石菖蒲厚朴紅花莪朮脾之積在胃脘腹大如盤名曰痞氣加厚朴腎之積在臍下發於小腹上衝心而痛名曰奔豚別用奔豚丸主之熱積加黃連黃芩寒積加肉桂乾薑附子酒積加葛根痰積加半夏水積加桑白皮赤小豆血積加桃仁紅花乾漆肉積加阿魏山楂奔豚丸川楝子煨去肉一兩茯苓橘核鹽酒炒各一兩五錢肉桂三錢附子炮吳茱萸湯泡七次各五錢荔枝子煨八錢小茴香木香各七錢熬砂糖為丸每服二錢淡鹽湯下若有熱者去附桂理中湯見中寒疝氣疝者少腹痛引睪丸也經云任脈為病男子外結七疝女子帶下瘕聚七疝者一曰沖疝氣上衝心二便不通也二曰狐疝臥則入腹立則出腹也三曰㿗疝陰囊腫大如升如斗也四曰厥疝肝氣上逆也五日瘕疝腹有癥痞痛而熱時下白濁也六曰㿉疝內裹膿血也七曰㿉癃疝內裹膿血小便不通也愚按厥疝即沖疝㿉癃疝即㿉疝其名有七其實五者而已疝之根起於各臟而歸併總在厥陰以肝主筋又主痛也治疝之法非一而分別不外氣血氣則遊走不定血則凝聚不散也橘核丸加減主之橘核丸通治七疝橘核二兩鹽酒炒小茴香川楝子煨去肉桃仁去皮尖及雙仁者炒香附醋炒山楂子炒各一兩廣木香紅花各五錢以神麯三兩打糊為丸每服三錢沖疝用白茯苓一錢松子仁三錢煎湯送下狐疝用當歸二錢牛膝一錢五分煎酒送下㿗疝用白茯苓陳皮赤茯苓各一錢煎湯送下厥疝治同沖疝瘕疝用丹參白茯苓各一錢五分煎湯送下㿉疝本方內加五靈脂一兩醋炒赤芍一兩五錢酒炒服時用牛膝一錢五分當歸尾三錢煎酒送下㿉癃疝治法同上此症若寒氣深重本方內加吳茱萸肉桂心各五錢甚則加附子一枚若表寒束其內熱腹痛熱辣或流白濁者本方內加黑山梔五錢川萆薢一兩吳茱萸三錢湯泡七次吳萸散表寒山梔清內熱二者並行丹溪心法也小腸氣者臍下轉痛失氣則快膀胱氣者臍熱痛澀於小便即胞痹也痃者狀如弓弦筋病也癖者隱伏於內疼痛著骨也癥者有塊可癥血病也瘕者假也忽聚忽散氣病也以上諸症雖作痛不引睪丸故不以疝名之然而治法可以彷彿前丸加減或輕或重因時制宜也痰飲凡病未有不發熱不生痰者是痰與熱乃雜病兼見之症似無容專立法門矣然而有雜病輕而痰飲重則專以痰飲為主治書有五痰之名以五臟分主之也五飲之名隨症見也其實猶未確當大抵痰以燥濕為分飲以表裡為別濕痰滑而易出多生於脾脾實則消之二陳湯甚則滾痰丸脾虛則補之六君子湯兼寒兼熱隨症加藥燥痰澀而難出多生於肺肺燥則潤之貝母栝蔞散肺受火刑不能下降以致真水上泛則滋其陰六味丸飲有在表者乾嘔發熱而咳面目四肢浮腫香蘇五皮散飲有在裡者或停心下或伏兩腋咳則相引而痛或走腸間轆轆有聲用小半夏加茯苓湯隨其部位而分治之此治痰飲之大法也書云治痰須理脾以痰屬濕脾土旺則能勝濕耳治痰如此飲亦宜然然脾經痰飲當健脾以祛其濕若腎虛水泛為痰為飲者必滋其腎腎水不足則用六味若命門真火衰微寒痰上泛者則用八味腎氣丸補火生土開胃家之關導泉水下流而痰飲自消矣二陳湯半夏茯苓陳皮去白各一錢甘草炙五分生薑二片大棗二枚煎服加人參白朮各一錢名六君子湯滾痰丸治實熱老痰變生怪症大黃蒸片刻黃芩炒各四兩青礞石硝煅金色沉香細銼各三錢辰砂細研水飛二錢水迭為丸辰砂為衣每服一二錢開水下此藥但取痰積並不刮腸大瀉為老痰要藥貝母栝蔞散貝母一錢五分栝蔞一錢花粉茯苓橘紅桔梗各八分水煎服香蘇散見太陽證五皮飲見水腫小半夏加茯苓湯見傷寒咳嗽六味丸十味腎氣丸即八味丸加車前牛膝並見類中門嘔吐噦呃逆嘔者聲與物俱出吐者有物無聲噦者有聲無物世俗謂之乾嘔東垣以此三者皆因脾胃虛弱或寒氣所客或飲食所傷以致氣逆而食不得下也香砂二陳湯主之然嘔吐多有屬火者經云食不得入是有火也食入反出是有寒也若拒格飲食點滴不入者必用姜水炒黃連以開之累用累效至於食入反出固為有寒若大便閉結須加血藥以潤之潤之不去宜蜜煎導而通之蓋下竅開上竅即入也其有因脾胃虛弱而吐者補中為主理中湯其有因痞積滯礙而吐者消積為主和中丸若命門火衰不能生土者補火為主八味丸復有呃逆之症氣自臍下直衝上多因痰飲所致或氣鬱所發扁鵲丁香散主之若火氣上衝橘皮竹茹湯主之至於大病中見呃逆者是謂土敗木賊為胃絕多難治也二陳湯見痰飲通治嘔吐噦隨症加減前症若脾胃虛弱加人參白朮若寒氣所侵加薑桂甚加附子若飲食所傷加山楂麥芽神麯香附砂仁藿香若飲食衝口而出不得入者是為有火加黃連山梔若大便結燥加當歸黃芩知母若有積滯且兼服和中丸理中湯見中寒和中丸見蠱脹八味丸見類中扁鵲丁香散見傷寒呃逆橘皮竹茹湯陳皮去白二錢竹茹一團半夏人參甘草各一錢水煎服三消經云渴而多飲為上消消穀善飢為中消口渴小水如膏者為下消三消之症皆燥熱結聚也大法治上消者宜潤其肺兼清其胃二冬湯主之治中消者宜清其胃兼滋其腎生地八物湯主之治下消者宜滋其腎兼補其肺地黃湯生脈散並主之夫上消清胃者使胃火不得傷肺也中消滋腎者使相火不得攻胃也下消清肺者滋上源以生水也三消之治不必專執本經而滋其化源則病易痊矣書又云飲一溲一或飲一溲二病勢危急仲景用八味丸主之所以安固腎氣也而河間則用黃耆湯和平之劑大抵肺腎虛而不寒者宜用此法又按仲景少陰篇云腎經虛必頻飲熱湯以自救乃同氣相求之理今腎經虛寒則引水自灌虛寒不能約制故小便頻數似此不必與消症同論宜用理中湯加益智仁主之然予嘗見傷暑發喘之症小便極多不啻飲一而溲二者用六味加知柏而效可見此症又由腎經陰虛而得治宜通變正當臨證制宜未可一途而取也二冬湯治上消天冬去心二錢麥冬去心三錢花粉一錢黃芩一錢知母一錢甘草五分人參五分荷葉一錢水煎服生地八物湯治中消生地三錢山藥一錢五分知母一錢五分麥冬三錢黃芩一錢黃連一錢黃柏一錢丹皮一錢五分荷葉二錢水煎服六味地黃湯見類中生脈散麥冬二錢人參一錢北五味十五粒水煎服八味丸即六味加桂附黃耆湯治肺腎兩虛飲少溲多黃耆三錢五味子一錢人參麥冬枸杞子大熟地各一錢五分水煎服理中湯見中寒熱淋淋者小便頻數不得流通溺已而痛是也大抵由膀胱經濕熱所致然淋有六種一曰石淋下如砂石有似湯瓶久在火中底結白鹼也益元散加琥珀末主之二曰膏淋滴下濁液如脂膏也萆薢飲主之三曰氣淋氣滯不通水道阻塞臍下妨悶脹痛是也假蘇散主之四曰血淋瘀血停蓄莖中割痛難忍是也生地四物湯加紅花桃仁花蕊石主之或兼服代抵當丸五曰勞淋勞力辛苦而發此為氣虛以至氣化不及州都補中益氣湯主之六曰冷淋寒氣堅閉水道不行其症四肢厥冷口鼻氣冷喜飲熱湯是也金匱腎氣丸主之更有過服金石熱藥敗精流注轉而為淋者又老人陰已痿而思色以降其精則精不出而內敗以致大小便牽痛如淋愈痛則愈便愈便則愈痛宜用前萆薢飲去黃柏加菟絲遠志導去其精然後用六味地黃湯補之方為有益淋症多端未可執一而論也益元散見類中萆薢飲治膏淋並治諸淋萆薢三錢文蛤粉研細石葦車前子茯苓各一錢五分燈心二十節蓮子心石菖蒲黃柏各八分假蘇散治氣淋荊芥陳皮香附麥芽炒瞿麥木通赤茯苓各等分為末每服三錢開水下生地四物湯即四物湯以生地易熟地見虛勞代抵當丸生地當歸赤芍各一兩川芎五靈脂各七錢五分大黃酒蒸一兩五錢砂糖為丸每服三錢開水下補中益氣湯見類中金匱腎氣湯見水腫小便不通關格孕婦轉脬小便不通謂之癃閉癃閉與淋症不同淋則便數而莖痛癃閉則小便點滴而難通東垣云渴而小便不利者熱在上焦氣分也宜用四苓散加山梔黃芩等藥以分利之若大便亦閉加大黃元明粉之類不渴而小便不利者熱在下焦血分也宜用滋陰化氣之法若滋腎丸之類是已大法無陽則陰無以生無陰則陽無以化下元真陰不足則陽氣不化必滋其陰若下之真陽不足則陰氣不生必補其陽譬如水腫鼓脹小便不通者服金匱腎氣丸而小便自行陰得陽以生也復有除桂附服之而亦效者陽得陰而化也此陰陽氣化之精義也更有小便不通因而吐食者名曰關格經云關則不得小便格則吐逆關格者不得盡其命矣宜用假蘇散治之又丹溪治孕婦轉脬小便不通者用補中益氣湯隨服而探吐之往往有效譬如滴水之器上竅閉則下竅不通必上竅開然後下竅之水出焉丹溪初試此法以為偶中後來屢用屢驗遂恃為救急良法每見今人治轉脬症投補中益氣而不為探吐且曰古法不效有是理乎予嘗用茯苓升麻湯治此有驗蓋用升麻以舉其胎氣用茯苓以利小便用歸芎以活其胎用苧根理胞系之繚亂此以升劑為通之法也附錄於此以俟明哲四苓散即五苓散去桂枝方見太陽腑病滋腎丸黃柏炒褐色知母蒸各二兩肉桂去皮一錢煉蜜丸如梧桐子大每服七八十丸開水下金匱腎氣丸見水腫假蘇散見淋症補中益氣湯見類中茯苓升麻湯茯苓赤白各五錢升麻一錢五分當歸二錢川芎一錢苧根三錢急流水煎服或琥珀末二錢服更佳大便不通大小腸交遺尿脫肛經曰北方黑色入通於腎開竅於二陰是知腎主二便腎經津液乾枯則大便閉結矣然有實閉虛閉熱閉冷閉之不同如陽明胃實燥渴譫語不大便者實閉也小承氣湯下之若老弱人精血不足新產婦人氣血乾枯以致腸胃不潤此虛閉也四物湯加松子仁柏子仁肉蓯蓉枸杞人乳之類以潤之或以蜜煎導而通之若氣血兩虛則用八珍湯熱閉者口燥唇焦舌苔黃小便赤喜冷惡熱此名陽結宜用清熱攻下之法三黃枳朮丸主之冷閉者唇淡口和舌苔白小便清喜熱惡寒此名陰結宜用溫藥而兼潤燥之法理中湯加歸芍主之凡虛人不大便未可勉強通之大便雖閉腹無所苦但與潤劑積久自行不比傷寒邪熱消爍津液有不容刻緩之勢也予嘗治老人虛閉數至圊而不能便者用四物湯及滋潤藥加升麻屢試屢驗此亦救急之良法也大小腸交陰陽拂逆也大便前出小便後出名曰交腸五苓散主之復有老人陰血乾枯大腸結燥便溺俱自前出此非交腸乃血液枯涸之徵氣血衰敗之候也多服大劑八珍湯或可稍延歲月耳遺尿有二症一因脾胃虛弱倉稟不固腸滑而遺者一因火性急速逼迫而遺者宜分別治之脾虛理中湯火盛芍藥甘草湯加黃連脫肛也有二症一因氣虛下陷而脫者補中益氣湯一因腸胃有火腫脹下脫者四物加升麻黃芩荷葉之屬小承氣湯見傷寒少陰經證四物湯見虛勞蜜煎導法見傷寒八珍湯見虛勞三黃枳朮丸見腹痛理中湯見傷寒中寒門五苓散見太陽腑病芍藥甘草湯見腹痛補中益氣湯見類中小便不禁經云膀胱不利為癃不約為遺溺所以不約者其因有三一曰肝熱肝氣熱則陰挺失職書云肝主疏泄是已加味逍遙散主之二曰氣虛中氣虛則不能統攝以致遺溺十補湯主之大抵老幼多見此症悉屬脬氣不固老人挾寒者多嬰兒挾熱者眾挾寒者用本方挾熱者六味地黃丸三曰腎敗狂言反目溲便自遺者此腎絕也傷寒曰久見之多難救中症見之隨用大劑附子理中湯頻灌間有得生者蓋暴脫者可以暴復若病勢曰深則不可為也然中症亦有陰虛而遺溺者不宜偏用熱藥治者詳之加味逍遙散見類中十全大補湯見虛勞六味地黃丸見虛勞附子理中湯見中寒便血便血症有腸風有臟毒有熱有寒病人臟腑有熱風邪乘之則下鮮血此名腸風清魂散主之若腸胃不清下如魚腸或如豆汁此名臟毒芍藥湯主之凡下血症脈數有力唇焦口燥喜冷畏熱是為有火宜用前方加黃芩丹皮生地之屬若脈細無力唇淡口和喜熱畏寒或四肢厥冷是為有寒宜用溫藥止之理中加歸芍主之若便久不止氣血大虛宜用歸脾十全輩統血歸經血本屬陰生於陽氣治者宜滋其化源清魂散荊芥三錢當歸五錢水煎服芍藥湯見腹痛理中湯見中寒歸脾湯十全大補湯俱見虛勞尿血心主血心氣熱則遺熱於膀胱陰血妄行而溺出焉又肝主疏泄肝火盛亦令尿血清心阿膠散主之平肝加味逍遙散主之若久病氣血俱虛而見此症八珍湯主之凡治尿血不可輕用止澀藥恐積瘀於陰莖痛楚難當也阿膠散阿膠水化開沖服一錢丹參生地各二錢黑山梔丹皮血餘即亂髮燒灰存性麥冬當歸各八分水煎服加味逍遙散見類中八珍湯見虛勞
