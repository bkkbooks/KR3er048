front:
  text: 序昔人云不為良相即為良醫誠以濟人為急相之良則安天下醫之良則自鄉而國罔不獲濟雖隱與顯有殊而名聞於一時眼前收效是亦君子之所用心而不敢忽也第操是術者非探其奧窈有以洞見肺腑詎可輕為嘗試此予少時曾讀靈蘭驚深淵浮雲之喻遽為卻步望洋之嘆有不類河伯初時之溟涬也哉程君鍾齡原字山齡資分高搜討富攻舉子業有聲庠序乃以家貧善養為務問取岐黃書尋繹往復又於張劉李朱四大家貫穿融會一編入手必有所折中不從門面語掩飾時人之耳目由是出而問世踵門者無虛日經年累月每為遠地作信宿客凡有來者多叩門而返自憾無廣長舌化百千身以應人之求也爰著醫學心悟一書授之生徒所言悉有根柢而筆又足以達之故四方從遊者日益進嘗語門弟子曰一壺冰三斛火只在用之適其宜耳然而上工治未病中工治已病昔醫緩兄弟三人其二兄治病治於未形雖名不聞於諸侯而所學益大書中百誤歌以及人參果等篇是又在醫方之外弭忠於未萌而兼為保生計非迂談也一日所獲之錢多合膏散任人取攜投之輒效窮鄉得此有一服而兩人分飲取驗者膏去風毒及百病凡有患處貼膚而消除者嘖嘖有言此豈虛聲動人之聽聞哉頻年以來錢到即散總為此事著力視昔之崔世明李慶嗣不少讓診視之際不論貧富貴賤咸細心處治審症必詳用藥必當眼光所到四面流通無非實地濟人之心所著方書抄閱者眾君虞其不廣及也乃付之剞劂以公同志寧不與調和燮理者均稱其職而無憾也乎君曰書成之後一擔稍釋我無復內顧矣予猶以為不然古之仁聖高賢盡屬救世實地工夫盡有著落當前利益非為空言由親及疏由近及遠君有以自見矣無事他適也至其書之精意愧非越人難窺底裡亦不過從傍覘君之用心與觀其所行而質言之以俟世之識者共相鑑賞而已是為序時雍正壬子上春同學姻弟饒兆熊拜手書於天寧禪院自序古人有言病臥於床委之庸醫比於不慈不孝是以為人父子者不可以不知醫雖然醫豈易知乎哉知其淺而不知其深猶未知也知其偏而不知其全猶未知也以卑鄙管窺之見而自稱神良其差誤殆有甚焉予少多病每遘疾則纏綿難愈因爾酷嗜醫學潛心玩索者有年而四方求治者日益繁四方從遊者日益眾然此衷常慄慄危懼凡書理有未貫徹者則晝夜追思恍然有悟即援筆而識之歷今三十載殊覺此道精微思貴專一不容淺嘗者問津學貴沉潛不容浮躁者涉獵蓋以上奉君親中及僚友下逮卑幼性命攸關其操術不可不工其處心不可不慈其讀書明理不至於豁然大悟不止爰作是書以教吾徒而名之曰醫學心悟蓋警之也然心悟者上達之機言傳者下學之要二三子讀是書而更加博覽群言沉思力索以造詣於精微之域則心如明鏡筆發春花於以拯救蒼生而藥無虛發方必有功仰體天帝好生之心修證菩提普救之念俾閭閻昌熾比戶安和永杜夭札之傷咸登仁壽之域豈非業醫者所深快乎況為父者知此可以言慈為子者知此可以言孝以之保身而裕如以之利人而各足存之心則為仁術見之事則為慈祥尤吾道中所當景慕也二三子識之予日望之時雍正十年孟春月吉旦天都普明子程國彭鍾齡自序
