body:
  text: 凡例一醫道自靈素難經而下首推仲景以其為制方之祖也然仲景論傷寒而溫熱溫疫之旨有未暢河間論溫熱及溫疫而於內傷有未備東垣詳論內傷發補中枳朮等論卓識千古而於陰虛之內傷尚有缺焉朱丹溪從而廣之發陽常有餘陰常不足之論以補前賢所未及而醫道亦大全矣夫復何言不知四子之書合之則見其全分之即見其偏茲集兼總四家而會通其微意以各適於用則庶乎其不偏耳一虛火實火之別相隔霄壤虛火可補實火可瀉若誤治之禍如反掌茲以內出者為子火外至者為賊火分別虛實以定補瀉似千古晦義一旦昭然而於對症用藥之間有畫沙印泥之趣一凡病不外寒熱虛實表裡陰陽茲特著為辨論約之則在指掌之中推之可應無窮之變學者宜究心焉一醫門論治本有八法而方書或言五法或言六法時醫更執偏見各用一二法自以為是遂至治不如法輕病轉重重病轉危而終則至於無法大可傷也予故著為醫門八法反復詳論俾業醫者沉酣於八法之中將以扶危定傾庶幾其有活法矣一傷寒門古稱三百九十七法一百一十三方尚不能盡其變遂謂仲景傷寒論非全書而予獨以四字論括之何其簡也不思傷寒只此表里寒熱四字由四字而敷為八句傷寒實無餘蘊夫傷寒有表寒有裡寒有表熱有裡熱有表裡皆熱有表裡皆寒有表寒裡熱有表熱裡寒精乎此非惟三百九十七法一百一十三方可坐而得即千變萬化亦皆範圍於其中予讀仲景書十數年頗有心得因著傷寒四字論以為後學津梁云一傷寒有經病有腑病有合病並病有直中症有兩感症有傷寒兼症茲集分析清楚綱舉目張辯論詳明毫無矇混治傷寒者取則乎此可漸登仲景之堂而入其室矣一中風寒熱之別實因乎人之臟腑為轉移從此勘破則清涼溫熱之劑各當其可而古今之疑團以釋一風寒暑濕燥火天之六氣也六氣相雜互相為病最宜細辨若概指為傷寒投以散劑為害實甚不可不慎於其初一雜症各有內傷外感之不同須從此分別則治法不至混淆而取效神速一女人之病多於男子因其有行經胎產等事也且性情多郁尤易生病故治法另有變通茲特詳著於後其與男子同病者不載特載其不同者而已非缺也
